<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Exponencial MBA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c12;--bg-p:#111118;--bg-s:#16161f;--bg-t:#1c1c28;
  --t1:#e8eaf0;--t2:#cdd0dc;--t3:#9fa5bb;--t4:#636880;
  --brand:#6d28d9;--brand-h:#a78bfa;--brand-dim:rgba(109,40,217,.2);
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --red:#e53e3e;--red-t:#fc8181;--red-bg:rgba(229,62,62,.14);--red-b:rgba(229,62,62,.4);
  --amber:#d97706;--amber-t:#fbbf24;--amber-bg:rgba(217,119,6,.14);
  --green:#059669;--green-t:#6ee7b7;--green-bg:rgba(5,150,105,.14);
  --fh:'Poppins',sans-serif;--fb:'DM Sans',sans-serif;
  --r:6px;--r2:10px;--r3:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:16px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--fb);outline:none;font-size:14px}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.22);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.38)}
::-webkit-scrollbar-track{background:transparent}

/* ═══ LAYOUT ═══ */
#root{display:flex;height:100vh}
#sidebar{width:220px;min-width:220px;background:var(--bg-p);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ═══ SIDEBAR ═══ */
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{width:32px;height:32px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo svg{width:18px;height:18px}
.sb-brand{font-family:var(--fh);font-weight:600;font-size:13px;line-height:1.3;color:var(--t1)}
.sb-brand small{display:block;font-size:10px;color:var(--t4);font-weight:400;margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-section{font-size:9px;font-weight:600;color:var(--t4);letter-spacing:1.4px;text-transform:uppercase;padding:8px 8px 4px;margin-top:4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-family:var(--fh);font-weight:500;font-size:12.5px;color:var(--t3);transition:all .15s;user-select:none;margin-bottom:1px;position:relative}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--t2)}
.sb-item.active{background:var(--brand-dim);color:var(--brand-h)}
.sb-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.sb-item.active svg{opacity:1}
.sb-badge{background:var(--brand);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:auto}
.sb-badge.red{background:var(--red)}
.sb-badge.amber{background:#d97706;color:#fff}
.sb-foot{padding:12px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--brand-dim);border:1px solid rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:11px;font-weight:600;color:var(--brand-h);flex-shrink:0}
.sb-uname{font-size:12.5px;font-weight:500;color:var(--t2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-out{background:none;border:none;cursor:pointer;color:var(--t4);padding:3px;border-radius:4px;display:flex;align-items:center}
.sb-out:hover{color:var(--t2)}
.sb-divider{height:1px;background:var(--border);margin:6px 8px}

/* ═══ PAGE ═══ */
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:pageIn .18s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-hdr{padding:22px 26px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.page-title{font-family:var(--fh);font-weight:600;font-size:20px;color:var(--t1);letter-spacing:-.3px}
.page-sub{font-size:12px;color:var(--t4);margin-top:3px}
.page-body{flex:1;overflow-y:auto;padding:22px 26px}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--fh);font-weight:500;font-size:12.5px;border:none;cursor:pointer;border-radius:var(--r);transition:all .15s;white-space:nowrap;flex-shrink:0;line-height:1}
.btn-primary{background:var(--brand);color:#fff;padding:8px 16px}
.btn-primary:hover{background:var(--brand-h)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--t2);padding:8px 14px;border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.09);border-color:var(--border2)}
.btn-danger{background:var(--red);color:#fff;padding:8px 14px}
.btn-sm{font-size:11.5px;padding:5px 12px}
.btn-xs{font-size:11px;padding:4px 9px;border-radius:4px}
.btn-icon{width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--t3);transition:all .15s}
.btn-icon:hover{background:rgba(255,255,255,.09);color:var(--t1)}
.btn svg{width:14px;height:14px}

/* ═══ INPUTS ═══ */
.inp{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-size:13px;padding:9px 12px;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--brand);background:rgba(255,255,255,.06)}
.inp::placeholder{color:var(--t4)}
.inp:disabled{opacity:.5;cursor:not-allowed}
select.inp option{background:#1c1c1f;color:var(--t1)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
.lbl{font-family:var(--fh);font-size:11px;font-weight:500;color:var(--t3);margin-bottom:5px;display:block;letter-spacing:.3px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.full{grid-column:1/-1}

/* ═══ CARDS ═══ */
.card{background:var(--bg-s);border:1px solid var(--border);border-radius:var(--r2);transition:border-color .15s}
.card-click{cursor:pointer}
.card-click:hover{border-color:var(--border2);background:rgba(255,255,255,.03)}

/* ═══ MODAL ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-s);border:1px solid var(--border2);border-radius:var(--r3);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-lg{max-width:680px}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:var(--fh);font-weight:600;font-size:16px;color:var(--t1)}
.modal-body{padding:20px 22px}
.modal-body-scroll{padding:20px 22px;overflow-y:auto;max-height:60vh}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px}

/* ═══ TABS ═══ */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 26px;gap:2px;flex-shrink:0;overflow-x:auto}
.tab{font-family:var(--fh);font-size:12.5px;font-weight:500;color:var(--t4);padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--t2)}
.tab.active{color:#c4b5fd;border-bottom-color:#c4b5fd;text-shadow:0 0 8px rgba(196,181,253,.4)}
.inner-tabs{display:flex;gap:2px;margin-bottom:18px}
.inner-tab{font-family:var(--fh);font-size:11.5px;font-weight:500;color:var(--t4);padding:6px 12px;cursor:pointer;border-radius:var(--r);transition:all .15s}
.inner-tab:hover{color:var(--t2);background:rgba(255,255,255,.04)}
.inner-tab.active{color:var(--t1);background:rgba(255,255,255,.07)}

/* ═══ TABLE ═══ */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--fh);font-size:10.5px;font-weight:600;color:var(--t4);letter-spacing:.8px;text-transform:uppercase;padding:8px 14px;text-align:left;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;font-size:13px;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.04)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}

/* ═══ PILLS ═══ */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:99px;border:1px solid}
.pill-green{background:rgba(0,230,118,.22);color:#69ffb4;border-color:rgba(0,230,118,.6)}
.pill-amber{background:rgba(255,184,0,.22);color:#ffe066;border-color:rgba(255,184,0,.6)}
.pill-red{background:rgba(255,45,45,.22);color:#ff8080;border-color:rgba(255,45,45,.6)}
.pill-blue{background:rgba(124,58,237,.25);color:#c4b5fd;border-color:rgba(196,181,253,.6)}
.pill-gray{background:rgba(255,255,255,.1);color:var(--t2);border-color:rgba(255,255,255,.2)}

/* ═══ STATS ═══ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:var(--bg-s);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.stat-val{font-family:var(--fh);font-weight:700;font-size:28px;color:var(--t1);letter-spacing:-.5px;line-height:1}
.stat-lbl{font-size:12px;color:var(--t4);margin-top:5px}

/* ═══ PRESENCE BUTTONS ═══ */
.pres-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--t4);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--fh)}
.pres-btn:hover{border-color:var(--border2);color:var(--t3)}
.pres-btn.sim{background:rgba(0,230,118,.25);border-color:rgba(0,230,118,.7);color:#69ffb4;box-shadow:0 0 8px rgba(0,230,118,.2)}
.pres-btn.nao{background:rgba(255,45,45,.22);border-color:rgba(255,45,45,.6);color:#ff8080;box-shadow:0 0 8px rgba(255,45,45,.2)}
.pres-btn.link{background:rgba(255,184,0,.2);border-color:rgba(255,184,0,.55);color:#ffe066}
.pres-btn.sim2{background:rgba(255,184,0,.22);border-color:rgba(255,184,0,.6);color:#ffe066;box-shadow:0 0 8px rgba(255,184,0,.2)}

/* ═══ PROGRESS BAR ═══ */
.prog-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-fill.hi{background:var(--green)}
.prog-fill.mid{background:var(--amber)}
.prog-fill.lo{background:var(--red)}

/* ═══ CHECKLIST ═══ */
.check-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;background:var(--bg-s);transition:border-color .15s}
.check-item:hover{border-color:var(--border2)}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-box.done{background:var(--brand);border-color:var(--brand)}
.check-box.done svg{display:block}
.check-box svg{display:none;width:11px;height:11px}
.check-label{font-size:13px;color:var(--t2);flex:1}
.check-label.done{color:var(--t4);text-decoration:line-through}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-t);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 18px;font-size:13px;color:var(--t2);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;animation:modalIn .2s ease;max-width:320px}
.toast.ok{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)}
.toast.err{border-color:var(--red-b);background:var(--red-bg)}

/* ═══ LOGIN ═══ */
#login-page{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px}
.login-card{background:var(--bg-s);border:1px solid var(--border2);border-radius:var(--r3);padding:32px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-mark{width:48px;height:48px;border-radius:12px;background:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-logo-mark svg{width:26px;height:26px}
.login-title{font-family:var(--fh);font-weight:700;font-size:20px;color:var(--t1);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--t4)}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.profile-btn{padding:12px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg-t);cursor:pointer;text-align:center;transition:all .15s;font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)}
.profile-btn:hover{border-color:var(--brand-h);background:var(--brand-dim);color:var(--brand-h)}
.login-sep{display:flex;align-items:center;gap:10px;color:var(--t4);font-size:11px;margin:14px 0}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.login-err{background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--r);padding:9px 12px;font-size:12.5px;color:var(--red-t);margin-top:10px}

/* ═══ DETAIL PANEL ═══ */
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:560px;background:var(--bg-p);border-left:1px solid var(--border2);z-index:600;display:flex;flex-direction:column;overflow:hidden;animation:panelIn .2s ease}
@keyframes panelIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.detail-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;overflow-x:auto}
.detail-tab{font-family:var(--fh);font-size:12px;font-weight:500;color:var(--t4);padding:9px 12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;white-space:nowrap}
.detail-tab.active{color:var(--t1);border-bottom-color:var(--brand-h)}
.detail-tab:hover{color:var(--t2)}
.detail-body{flex:1;overflow-y:auto;padding:18px 20px}

/* ═══ MISC ═══ */
.divider{height:1px;background:var(--border);margin:16px 0}
.section-title{font-family:var(--fh);font-size:11px;font-weight:600;color:var(--t4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}
.kv{display:flex;gap:8px;font-size:12.5px;margin-bottom:7px;align-items:flex-start}
.kv-k{color:var(--t4);min-width:140px;flex-shrink:0}
.kv-v{color:var(--t2);font-weight:500}
.empty-state{text-align:center;padding:48px 20px;color:var(--t4)}
.empty-state svg{width:40px;height:40px;margin:0 auto 12px;display:block;opacity:.3}
.empty-state p{font-size:13px;margin-top:4px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;background:var(--bg-s);transition:border-color .15s}
.task-item:hover{border-color:var(--border2)}
.task-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.task-check.done{background:var(--brand);border-color:var(--brand)}
.alert-bar{background:var(--amber-bg);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:10px 14px;font-size:12.5px;color:var(--amber-t);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.note-area{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r2);padding:14px;min-height:120px;color:var(--t2);font-size:13px;line-height:1.7;width:100%;resize:vertical;outline:none;font-family:var(--fb)}
.note-area:focus{border-color:var(--brand)}
.reuniao-card{background:var(--bg-t);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px}
.reuniao-card.first{border-color:rgba(99,102,241,.35);background:var(--brand-dim)}
.badge-count{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:99px;min-width:18px;height:18px;padding:0 5px;margin-left:4px}
.turma-card{background:var(--bg-s);border:1.5px solid rgba(255,255,255,.18);border-radius:var(--r2);padding:18px 20px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.turma-card:hover{border-color:var(--border2);background:rgba(255,255,255,.03)}
.turma-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.turma-tag{font-family:var(--fh);font-weight:700;font-size:22px;color:var(--t1)}
.turma-meta{display:flex;gap:20px;flex-wrap:wrap}
.turma-meta-item{font-size:12px}
.turma-meta-item span{color:var(--t4);display:block;font-size:11px}
.aula-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.aula-row:last-child{border-bottom:none}
.prog-stage{padding:16px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;background:var(--bg-s)}
.prog-stage-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.prog-stage-hdr h3{font-family:var(--fh);font-weight:600;font-size:14px;color:var(--t1)}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════════════
const SB_URL  = 'https://srkgmthbouqnfipkciwc.supabase.co';
const SB_ANON = 'sb_publishable_YZew_N2oQ_Q3NLrH8Wd-dA_30j7Dsj9';

// ── Supabase Auth helpers ────────────────────────────────
let sbSession = null; // { access_token, user: { id, email, user_metadata: { name, role } } }

async function sbRequest(path, method='GET', body=null) {
  const token = sbSession?.access_token || SB_ANON;
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_ANON,
      'Authorization': `Bearer ${token}`,
      'Prefer': 'return=representation',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + path, opts);
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = text; }
  if (!res.ok) throw new Error(data?.message || data?.error_description || text);
  return data;
}

// Login com email+senha
async function sbSignIn(email, password) {
  const data = await sbRequest('/auth/v1/token?grant_type=password', 'POST', { email, password });
  sbSession = data;
  localStorage.setItem('sb_session', JSON.stringify(data));
  return data;
}

// Logout
async function sbSignOut() {
  try { await sbRequest('/auth/v1/logout', 'POST'); } catch {}
  sbSession = null;
  localStorage.removeItem('sb_session');
}

// Refresh token silencioso
async function sbRefreshSession() {
  const stored = localStorage.getItem('sb_session');
  if (!stored) return null;
  try {
    const s = JSON.parse(stored);
    // Check expiry
    if (s.expires_at && Date.now()/1000 < s.expires_at - 60) {
      sbSession = s;
      return s;
    }
    // Refresh
    const data = await sbRequest('/auth/v1/token?grant_type=refresh_token', 'POST', { refresh_token: s.refresh_token });
    sbSession = data;
    localStorage.setItem('sb_session', JSON.stringify(data));
    return data;
  } catch {
    localStorage.removeItem('sb_session');
    return null;
  }
}

// ── Supabase DB helpers ─────────────────────────────────
async function dbSelect(table, params='') {
  return sbRequest(`/rest/v1/${table}?${params}`, 'GET');
}
async function dbUpsert(table, data) {
  const token = sbSession?.access_token || SB_ANON;
  const res = await fetch(SB_URL + `/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_ANON,
      'Authorization': `Bearer ${token}`,
      'Prefer': 'resolution=merge-duplicates,return=representation',
    },
    body: JSON.stringify(data),
  });
  if (!res.ok) {
    const t = await res.text();
    console.error('[supa] dbUpsert error', res.status, t);
    throw new Error(t);
  }
  return res.json();
}
async function dbUpdate(table, data, match) {
  const q = Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join('&');
  return sbRequest(`/rest/v1/${table}?${q}`, 'PATCH', data);
}
async function dbDelete(table, match) {
  const q = Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join('&');
  return sbRequest(`/rest/v1/${table}?${q}`, 'DELETE');
}

// Salvamos o estado inteiro como um JSON numa tabela "app_state"
// com uma única linha { id: 'main', data: {...} }
let _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveStateToDb, 1500);
}

async function saveStateToDb(retryCount = 0) {
  const snapshot = {
    alunos:       state.alunos,
    turmas:       state.turmas,
    tarefas:      state.tarefas,
    presenca:     state.presenca,
    aulasDates:   state.aulasDates,
    etapas:       state.etapas,
    linkEnviado:  state.linkEnviado,
    aulaAberta:   state.aulaAberta,
    faltaLog:     state.faltaLog,
    riscoCriteria:state.riscoCriteria,
    accessLog:    state.accessLog.slice(-500), // mantém só as 500 mais recentes
    accessStats:  state.accessStats || {},
    profiles:     state.profiles,
    reunioes:     state.reunioes,
  };

  try {
    // Verifica se alguém salvou depois que carregamos
    const current = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=updated_at');
    const remoteTs = current?.[0]?.updated_at;

    if (remoteTs && state._loadedAt && remoteTs !== state._loadedAt) {
      // Conflito detectado — recarrega e reaplica mudanças por cima
      if (retryCount >= 2) {
        showToast('Conflito de dados — recarregue a página', 'err');
        return;
      }
      console.warn('[supa] conflito detectado, fazendo merge...');

      // Carrega estado remoto mais recente
      const remoteRows = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=data');
      const remoteData = remoteRows?.[0]?.data || {};

      // Merge: aplica o snapshot local por cima do remoto
      // Campos que o usuário atual pode ter mudado sobrescrevem o remoto
      // Campos que ele não tocou ficam com a versão mais recente do remoto
      const merged = {
        ...remoteData,
        alunos:      snapshot.alunos,
        tarefas:     snapshot.tarefas,
        presenca:    snapshot.presenca,
        etapas:      snapshot.etapas,
        aulasDates:  snapshot.aulasDates,
        linkEnviado: snapshot.linkEnviado,
        aulaAberta:  snapshot.aulaAberta,
        faltaLog:    snapshot.faltaLog,
        riscoCriteria: snapshot.riscoCriteria,
        accessLog:   remoteData.accessLog || [],
        accessStats: (() => {
          // Merge stats: soma os contadores de ambos
          const local  = snapshot.accessStats  || { byUser:{}, byPage:{}, lastAccess:{} };
          const remote = remoteData.accessStats || { byUser:{}, byPage:{}, lastAccess:{} };
          const merged = { byUser: {...remote.byUser}, byPage: {...remote.byPage}, lastAccess: {...remote.lastAccess, ...local.lastAccess} };
          Object.entries(local.byUser || {}).forEach(([uid, data]) => {
            if (!merged.byUser[uid]) { merged.byUser[uid] = data; return; }
            merged.byUser[uid].total = (merged.byUser[uid].total || 0) + (data.total || 0);
            Object.entries(data.pages || {}).forEach(([pg, cnt]) => {
              merged.byUser[uid].pages[pg] = (merged.byUser[uid].pages[pg] || 0) + cnt;
            });
          });
          Object.entries(local.byPage || {}).forEach(([pg, cnt]) => {
            merged.byPage[pg] = (merged.byPage[pg] || 0) + cnt;
          });
          return merged;
        })(),
      };

      state._loadedAt = remoteTs;
      await dbUpsert('mba_exp_presenca_state', { id: 'main', data: merged, updated_at: new Date().toISOString() });
      state._loadedAt = new Date().toISOString();
      showToast('Dados sincronizados com sucesso', 'ok');
      return;
    }

    await dbUpsert('mba_exp_presenca_state', { id: 'main', data: snapshot, updated_at: new Date().toISOString() });
    state._loadedAt = new Date().toISOString();
    console.log('[supa] salvo com sucesso');

  } catch(e) {
    console.error('[supa] ERRO ao salvar:', e.message);
    showToast('Erro ao salvar: ' + e.message, 'err');
  }
}

async function loadStateFromDb() {
  try {
    const rows = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=data,updated_at');
    if (rows && rows[0]?.data) {
      const d = rows[0].data;
      state._loadedAt = rows[0].updated_at; // guarda timestamp para detecção de conflito
      if (d.alunos)       state.alunos       = d.alunos;
      if (d.turmas)       state.turmas       = d.turmas;
      if (d.tarefas)      state.tarefas      = d.tarefas;
      if (d.presenca)     state.presenca     = d.presenca;
      if (d.aulasDates)   state.aulasDates   = d.aulasDates;
      if (d.etapas)       state.etapas       = d.etapas;
      if (d.linkEnviado)  state.linkEnviado  = d.linkEnviado;
      if (d.aulaAberta)   state.aulaAberta   = d.aulaAberta;
      if (d.faltaLog)     state.faltaLog     = d.faltaLog;
      if (d.riscoCriteria) state.riscoCriteria = d.riscoCriteria;
      if (d.accessLog)      state.accessLog    = d.accessLog;
      if (d.accessStats)    state.accessStats   = d.accessStats;
      if (d.profiles) {
        state.profiles = d.profiles;
        // Sync PROFILES global so login screen shows all users
        d.profiles.forEach(p => {
          if (!PROFILES.find(x=>x.id===p.id)) PROFILES.push({id:p.id, name:p.name, email:p.email||''});
          else { const pp=PROFILES.find(x=>x.id===p.id); pp.name=p.name; pp.email=p.email||''; }
        });
      }
      if (d.reunioes)       state.reunioes     = d.reunioes;
    }
  } catch(e) {
    console.warn('loadState error:', e.message);
    state._dbError = true;
  }
}

const GCAL_CLIENT_ID = '108857966505-dohj12kc877ko21ersre2tqdl67ognf6.apps.googleusercontent.com';
const GCAL_SCOPES    = 'https://www.googleapis.com/auth/calendar.events';

// Token store: { userId → {access_token, expiry} }
// Persisted in localStorage so sobrevive ao F5
function gcalGetToken(uid) {
  try {
    const raw = localStorage.getItem('gcal_token_' + uid);
    if (!raw) return null;
    const t = JSON.parse(raw);
    if (Date.now() > t.expiry) { localStorage.removeItem('gcal_token_' + uid); return null; }
    return t.access_token;
  } catch { return null; }
}
function gcalSetToken(uid, access_token, expires_in) {
  localStorage.setItem('gcal_token_' + uid, JSON.stringify({
    access_token,
    expiry: Date.now() + (expires_in - 60) * 1000
  }));
}
function gcalIsConnected(uid) { return !!gcalGetToken(uid); }

// Abre popup OAuth e resolve com o token quando voltar
function gcalConnect(uid) {
  return new Promise((resolve, reject) => {
    const params = new URLSearchParams({
      client_id: GCAL_CLIENT_ID,
      redirect_uri: window.location.origin + window.location.pathname,
      response_type: 'token',
      scope: GCAL_SCOPES,
      prompt: 'consent',
      state: uid,
    });
    const url = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
    const popup = window.open(url, 'gcal_auth', 'width=500,height=650,left=200,top=100');
    if (!popup) { reject(new Error('Popup bloqueado')); return; }

    // Quando o popup redirecionar de volta, lê o hash
    const timer = setInterval(() => {
      try {
        if (popup.closed) { clearInterval(timer); reject(new Error('Popup fechado')); return; }
        const hash = popup.location.hash;
        if (!hash) return;
        const p = new URLSearchParams(hash.slice(1));
        const token = p.get('access_token');
        const exp   = parseInt(p.get('expires_in') || '3600');
        if (token) {
          gcalSetToken(uid, token, exp);
          popup.close();
          clearInterval(timer);
          resolve(token);
        }
      } catch (e) { /* cross-origin — aguarda */ }
    }, 500);
  });
}

// Cria um evento no Google Calendar do usuário
async function gcalCreateEvent(uid, event) {
  let token = gcalGetToken(uid);
  if (!token) {
    showToast('Conecte o Google Calendar primeiro', 'err');
    return null;
  }
  try {
    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(event),
    });
    if (res.status === 401) {
      localStorage.removeItem('gcal_token_' + uid);
      showToast('Token expirado — reconecte o Google Calendar', 'err');
      return null;
    }
    const data = await res.json();
    return data;
  } catch(e) {
    console.error('gcalCreateEvent error', e);
    return null;
  }
}

function getAlunosByTurma(tid) {
  return state.alunos.filter(a => a.turma === tid && a.status !== 'churn' && a.status !== 'inativo');
}
function getTurmaStats(tid) {
  const all    = state.alunos.filter(a => a.turma === tid);
  const ativos = all.filter(a => a.status === 'ativo' || a.status === 'pausado');
  const churnN = all.filter(a => a.status === 'churn').length;
  const pTid   = state.presenca[tid] || {};

  // Compute taxa from live state.presenca
  // Only count aulas that were actually held (at least one aluno has a mark)
  const aulaIds = AULAS_DEF.filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const heldAulas = aulaIds.filter(id => Object.keys(pTid[id]||{}).length > 0);

  let totalPres = 0;
  ativos.forEach(a => {
    if (!heldAulas.length) return;
    const presentes = heldAulas.filter(id => ['sim','sim2','link'].includes((pTid[id]||{})[a.id])).length;
    totalPres += Math.round(presentes / heldAulas.length * 100);
  });
  const taxa = ativos.length ? Math.round(totalPres / ativos.length) : 0;

  // Risco — use isRisco() which reads from state.presenca + faltaLog
  let risco = 0;
  ativos.forEach(a => { if (isRisco(a)) risco++; });

  return {count: ativos.length, churn: churnN, taxa, risco};
}

function isRisco(a) {
  const {maxFaltas=2, maxConsec=2, maxConsecLink=3} = state.riscoCriteria||{};
  const aulaIds = AULAS_DEF.filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const fLog = state.faltaLog[a.id]||{};
  const faltas = aulaIds.filter(id => (fLog[id]||[]).includes('nao')).length;
  const pTid = state.presenca[a.turma]||{};
  const aulaVals = aulaIds.map(id => (pTid[id]||{})[a.id]||null);
  let consec=0, maxC=0;
  aulaVals.forEach(v=>{if(v==='nao'){consec++;maxC=Math.max(maxC,consec);}else consec=0;});
  let linkC=0, maxLink=0;
  aulaVals.forEach(v=>{if(v==='link'||v==='sim2'){linkC++;maxLink=Math.max(maxLink,linkC);}else linkC=0;});
  // Só flagear planilha se a turma tiver alguma atividade registrada (evitar falso positivo em turmas novas)
  const pTidChurn = state.presenca[a.turma] || {};
  const temPresenca = Object.keys(pTidChurn).some(aid => (pTidChurn[aid]||{})[a.id]);
  const semPlanilha = temPresenca && ((a.planilha_fin_ok===false) || (a.planilha_leads_ok===false));
  return faltas>=maxFaltas || maxC>=maxConsec || maxLink>=maxConsecLink || semPlanilha;
}

function riscoMotivos(a) {
  const {maxFaltas=2, maxConsec=2, maxConsecLink=3} = state.riscoCriteria||{};
  const aulaIds = AULAS_DEF.filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const fLog = state.faltaLog[a.id]||{};
  const pTid = state.presenca[a.turma]||{};
  const aulaVals = aulaIds.map(id => (pTid[id]||{})[a.id]||null);
  const motivos = [];
  const faltas = aulaIds.filter(id => (fLog[id]||[]).includes('nao')).length;
  if (faltas>=maxFaltas) motivos.push(`${faltas} falta${faltas!==1?'s':''} registradas (limite: ${maxFaltas})`);
  let consec=0,maxC=0;
  aulaVals.forEach(v=>{if(v==='nao'){consec++;maxC=Math.max(maxC,consec);}else consec=0;});
  if (maxC>=maxConsec) motivos.push(`${maxC} falta${maxC!==1?'s':''} consecutivas (limite: ${maxConsec})`);
  let linkC=0,maxLink=0;
  aulaVals.forEach(v=>{if(v==='link'||v==='sim2'){linkC++;maxLink=Math.max(maxLink,linkC);}else linkC=0;});
  if (maxLink>=maxConsecLink) motivos.push(`${maxLink} últimas aulas via link/vídeo (limite: ${maxConsecLink})`);
  if (a.planilha_fin_ok===false)   motivos.push('Planilha financeira não enviada');
  if (a.planilha_leads_ok===false) motivos.push('Planilha de leads não enviada');
  return motivos;
}

function showToast(msg, type='ok') {
  state.toast = {msg, type};
  render();
  setTimeout(()=>{state.toast=null; renderToast();}, 3000);
}

function addTarefa(t) {
  t.id = 'tk_' + Date.now() + Math.random().toString(36).slice(2,6);
  t.done = false;
  t.criada = now();
  state.tarefas.push(t);
}

function getMinhasTarefas() {
  if (!state.user) return [];
  const uid = state.user.id;
  return state.tarefas.filter(t => t.responsavel === uid || t.colab === uid);
}

// RENDER ENGINE
// ═══════════════════════════════════════════════════════
let _rafPending = false;
function render() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => {
    _rafPending = false;
    // Save scroll positions of all scrollable containers before re-render
    const scrolls = {};
    document.querySelectorAll('.page-body, .detail-body, .db, .page').forEach(el => {
      if (el.scrollTop > 0) scrolls[el.className.split(' ')[0]] = el.scrollTop;
    });
    document.getElementById('root').innerHTML = buildApp();
    attachEvents();
    // Restore scroll positions after render
    document.querySelectorAll('.page-body, .detail-body, .db, .page').forEach(el => {
      const key = el.className.split(' ')[0];
      if (scrolls[key]) el.scrollTop = scrolls[key];
    });
  });
}

function renderToast() {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  if (state.toast) {
    const el = document.createElement('div');
    el.className = 'toast ' + state.toast.type;
    el.textContent = state.toast.msg;
    document.body.appendChild(el);
  }
}

function buildApp() {
  if (state._dbError) return `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
      <div style="text-align:center;max-width:380px;padding:40px 24px">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <div style="font-family:var(--fh);font-weight:700;font-size:20px;color:var(--t1);margin-bottom:10px">Não foi possível conectar ao banco de dados</div>
        <div style="font-size:14px;color:var(--t4);margin-bottom:28px;line-height:1.6">O Supabase pode estar temporariamente indisponível. Aguarde alguns instantes e tente novamente.</div>
        <button class="btn btn-primary" onclick="location.reload()">Tentar novamente</button>
      </div>
    </div>`;
  if (!state.user) return buildLoginPage();
  return `
    <div id="sidebar">${buildSidebar()}</div>
    <div id="main">${buildMain()}</div>
    ${state.modal ? buildModal() : ''}
    ${state.selAluno ? buildDetailPanel() : ''}
    ${state.toast ? `<div class="toast ${state.toast.type}">${state.toast.msg}</div>` : ''}
  `;
}

          : `<span class="pill ${taxaCls}">${s.taxa}% presença</span>`
        }

          <button class="btn btn-xs" style="background:${t.concluida?'var(--red-bg)':'var(--green-bg)'};color:${t.concluida?'var(--red-t)':'var(--green-t)'};border:1px solid ${t.concluida?'var(--red-b)':'rgba(34,197,94,.3)'};z-index:2"
            data-toggle-turma-concluida="${t.id}" onclick="event.stopPropagation()">
            ${t.concluida ? 'Reabrir' : 'Concluir turma'}
          </button>
        ` : ''}
      </div>
    </div>
    <div class="turma-meta">
      <div class="turma-meta-item"><span>Início</span>${t.inicio ? fmt(t.inicio) : '—'}</div>
      <div class="turma-meta-item"><span>Fim previsto</span>${t.fim_previsto ? fmt(t.fim_previsto) : '—'}</div>
      ${!t.concluida ? `
      <div class="turma-meta-item"><span>Próxima aula</span>${proxAula}</div>
      <div class="turma-meta-item"><span>Risco churn</span><span style="color:var(--amber-t)">${s.risco}</span></div>
      <div class="turma-meta-item"><span>Churn</span><span style="color:var(--red-t)">${s.churn}</span></div>
      ` : `<div class="turma-meta-item"><span>Alunos</span>${s.count + s.churn}</div>`}
    </div>
  </div>`;
}

function getProxAula(tid) {
  // Find first aula not yet marked for this turma
  const marcadas = state.presenca[tid] || {};
  for (const ad of AULAS_DEF) {
    if (ad.bloco !== '11' && !marcadas[ad.id]) return ad.label.split('—')[0].trim();
  }
  return 'Concluída';
}

function buildCronograma(t, alunos) {
  // Determine which items are "done"
  function isAulaDone(ad) {
    if (ad.bloco === '11') {
      // 1:1 done = all active alunos have a realizada reuniao of this tipo
      if (!alunos.length) return false;
      return alunos.every(a => (a.reunioes||[]).some(r=>r.realizada && r.tipo===ad.label));
    }
    const pMap = (state.presenca[t.id]||{})[ad.id] || {};
    // Done = every aluno has SOME mark (sim/nao/link/reset) — aula was held
    return alunos.length > 0 && alunos.every(a => ['sim','sim2','nao','link'].includes(pMap[a.id]));
  }

  // Determine if bloco0 is done (all 5 etapas done for all alunos)
  function isBloco0Done() {
    if (!alunos.length) return false;
    const etapas = ['forms','onb','ind','fin','sec'];
    return alunos.every(a => {
      const et = state.etapas[a.id] || {};
      return etapas.every(e => et[e+'_done']);
    });
  }

  const bloco0Done = isBloco0Done();
  const aulasDone = AULAS_DEF.map(ad => ({ad, done: isAulaDone(ad)}));

  // Find index of first not-done item (bloco0 counts as index -1)
  let nextIdx = bloco0Done ? 0 : -1;
  if (nextIdx === 0) {
    const firstNotDone = aulasDone.findIndex(x => !x.done);
    nextIdx = firstNotDone; // -1 if all done
  }

  // Build collapsed summary for a done aula
  function buildDoneSummary(ad) {
    const pMap = (state.presenca[t.id]||{})[ad.id] || {};
    const is11 = ad.bloco === '11';
    let summary = '';
    if (is11) {
      const done = alunos.filter(a=>(a.reunioes||[]).some(r=>r.realizada&&r.tipo===ad.label)).length;
      summary = `${done}/${alunos.length} realizados`;
    } else {
      const presentes = alunos.filter(a=>['sim','sim2','link'].includes(pMap[a.id])).length;
      const taxa = alunos.length ? Math.round(presentes/alunos.length*100) : 0;
      summary = `${taxa}% presença`;
    }
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;
      border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;
      background:rgba(255,255,255,.02);opacity:.65;cursor:pointer" data-expand-aula="${ad.id}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="color:var(--green);font-size:13px">✓</span>
        <span style="font-size:13px;color:var(--t3);font-family:var(--fh);font-weight:500">${ad.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11.5px;color:var(--t4)">${summary}</span>
        <span style="font-size:11px;color:var(--t4)">▼</span>
      </div>
    </div>`;
  }

  // Expanded aulas = next item + any that were manually expanded
  if (!state.expandedAulas) state.expandedAulas = {};
  const expandedKey = t.id;
  if (!state.expandedAulas[expandedKey]) state.expandedAulas[expandedKey] = {};

  function shouldExpand(idx, ad) {
    // Manually toggled always wins
    if (state.expandedAulas[expandedKey][ad.id]) return true;
    // If all done, nothing auto-expands (only manual)
    if (nextIdx === -1) return false;
    // Auto-expand the next undone item
    return idx === nextIdx;
  }

  // Render aulas — full controls for Bruna/god, read-only for others
  const canEditPresenca = isBruna() || isGod();
  const aulasHtml = aulasDone.map(({ad, done}, idx) => {
    if (!canEditPresenca) return buildAulaReadOnly(t, alunos, ad);
    if (done && !shouldExpand(idx, ad)) return buildDoneSummary(ad);
    return buildAulaSection(t, alunos, ad);
  }).join('');

  return `<div>${aulasHtml}</div>`;
}

function buildAulaSection(t, alunos, ad) {
  const marcadas = state.presenca[t.id] || {};
  const pMap = marcadas[ad.id] || {};
  const is11 = ad.bloco === '11';

  // For 1:1s, presence is tracked per aluno via reunioes, show status
  if (is11) {
    return `
    <div class="prog-stage" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

        <span class="pill pill-blue" style="font-size:10px">1:1 Individual</span>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Aluno</th><th>Responsável</th><th style="text-align:center">Realizado</th><th>Data</th></tr></thead>
          <tbody>
            ${alunos.map(a => {
              const reu = (a.reunioes||[]).find(r=>r.realizada && r.tipo===ad.label);
              const agendada = (a.reunioes||[]).find(r=>!r.realizada && r.tipo===ad.label);
              const done = !!reu;
              return `<tr>
                <td style="font-weight:500;color:var(--t1)">${a.nome}</td>
                <td style="color:var(--t4);font-size:12px">${a.responsavel||'—'}</td>
                <td style="text-align:center">
                  <div class="check-box ${done?'done':''}" data-tick-11="${ad.id}" data-aluno-id="${a.id}" style="margin:0 auto">
                    ${done ? '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                  </div>
                </td>
                <td style="font-size:12px;color:var(--t4)">
                  ${reu ? reu.data : agendada ? `<span class="pill pill-blue" style="font-size:9.5px">Agendado ${agendada.data}</span>` : '—'}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }
  // Regular aula — full presence table
  const isAdmin = isGod() || isBruna();
  // canEditPres: god/bruna always; others only if aula not yet done
  const allMarked = alunos.length > 0 && alunos.every(a => ['sim','sim2','nao','link'].includes(pMap[a.id]));
  const canEditPres = isAdmin || !allMarked;
  const presentes = alunos.filter(a=>['sim','sim2','link'].includes(pMap[a.id])).length;
  const total = alunos.length;
  const taxa = total ? Math.round(presentes/total*100) : 0;
  const taxaCls = taxa>=75?'pill-green':taxa>=50?'pill-amber':'pill-red';
  const aInfo = state.turmas.find(x=>x.id===t.id);
  const aulaDate = (state.aulasDates||{})[t.id]?.[ad.id] || '';

  return `
  <div class="prog-stage" data-aula-section="${ad.id}" style="margin-bottom:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <h3 style="font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)">${ad.label}</h3>
        ${aulaDate ? `<span style="font-size:11px;color:var(--t4)">${aulaDate}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${marcada ? `<span class="pill ${taxaCls}">${taxa}% · ${presentes}/${total}</span>` : `<span class="pill pill-gray" style="font-size:10px">Não realizada</span>`}
        ${allMarked && !isAdmin ? `<span class="pill pill-gray" style="font-size:9.5px;opacity:.7">🔒 Fechada</span>` : ''}
        ${allMarked && isAdmin  ? `<span class="pill pill-blue"  style="font-size:9.5px">✏️ Editável</span>` : ''}
        ${(isBruna()||isGod()) && !marcada ? `
          <button class="pres-btn ${(state.aulaAberta||{})[t.id+ad.id]?'sim':''}" style="font-size:11px;padding:3px 10px" data-abrir-aula="${ad.id}" data-turma-id="${t.id}">
            ${(state.aulaAberta||{})[t.id+ad.id] ? '✓ Aula aberta' : 'Abrir presenças'}
          </button>
        ` : ''}
      </div>
    </div>
    ${alunos.length === 0 ? '<div style="color:var(--t4);font-size:13px">Nenhum aluno nesta turma</div>' : ((!marcada && (isBruna()||isGod()) && !(state.aulaAberta||{})[t.id+ad.id]) ? '<div style="font-size:12.5px;color:var(--t4);padding:8px 0">Clique em &quot;Abrir presenças&quot; para iniciar o controle.</div>' : `
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr>
          <th>Aluno</th>
          <th>Responsável</th>
          <th style="text-align:center">Presença</th>
        </tr></thead>
        <tbody>
          ${alunos.map(a => {
            const pres = pMap[a.id];
            return `<tr>
              <td style="font-weight:500;color:var(--t1)">${a.nome}</td>
              <td style="color:var(--t4);font-size:12px">${a.responsavel||'—'}</td>
              <td>
                ${(canEditPres) ? `
                <div style="display:flex;gap:4px;justify-content:center">
                  <button class="pres-btn ${pres==='sim'?'sim':pres==='sim2'?'sim2':''}" data-pres-cycle data-aula="${ad.id}" data-aluno-id="${a.id}" data-turma="${t.id}">${pres==='sim'?'P ✓':pres==='sim2'?'P ●':'Presente'}</button>
                  <button class="pres-btn ${pres==='nao'?'nao':''}" data-presenca="nao" data-aula="${ad.id}" data-aluno-id="${a.id}" data-turma="${t.id}">Faltou</button>
                  <button class="pres-btn ${((state.linkEnviado||{})[t.id]||{})[ad.id]?.[a.id]?'link':''}" data-link-toggle data-aula="${ad.id}" data-aluno-id="${a.id}" data-turma="${t.id}">Link</button>
                </div>` : `
                <div style="text-align:center">
                  <span class="pill ${pres==='sim'?'pill-green':pres==='nao'?'pill-red':pres==='link'?'pill-amber':pres==='reset'?'pill-blue':'pill-gray'}" style="font-size:10px">
                    ${pres==='sim'?'Presente':pres==='nao'?'Faltou':pres==='link'?'Link':pres==='reset'?'Reset':'—'}
                  </span>
                </div>`}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    `)}
    ${marcada ? `
      <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
        <div class="prog-bar" style="flex:1">
          <div class="prog-fill ${taxa>=75?'hi':taxa>=50?'mid':'lo'}" style="width:${taxa}%"></div>
        </div>
        <span style="font-size:12px;color:var(--t4);min-width:32px">${taxa}%</span>

}

function buildBloco(t, alunos, blocoNum, titulo, aulaIds, prox11Id) {

        const pMap = marcadas[ad.id] || {};

        return `<td style="text-align:center">

    {ids:['a10_1'], titulo:'Aula 10.1'},
    {ids:['11_3'], titulo:'1:1 — 3'},
    {ids:['a10_2'], titulo:'Aula 10.2'},
    {ids:['a11'], titulo:'Aula 11'},
    {ids:['11_4'], titulo:'1:1 — 4'},
    {ids:['a12'], titulo:'Aula 12 — Finalização'},
  ];
  return etapas.map(e => {
    const defs = AULAS_DEF.filter(a=>e.ids.includes(a.id));

    const rows = alunos.map(a => `
      <tr>
        <td style="font-weight:500;color:var(--t1)">${a.nome}</td>
        <td style="color:var(--t4);font-size:12px">${a.responsavel||'—'}</td>

          const pMap = marcadas[ad.id] || {};

    <div class="prog-stage" style="margin-bottom:12px">

            <th>Responsável</th>
            ${aulasComPresenca.map(ad=>`<th style="text-align:center;font-size:9px;max-width:80px;white-space:normal">${ad.label.split('—')[0].trim()}</th>`).join('')}
            <th style="text-align:center">Total</th>
          </tr></thead>
          <tbody>
            ${alunos.map(a => {
              const vals = aulasComPresenca.map(ad => (marcadas[ad.id]||{})[a.id]);
              const presentes = vals.filter(v=>v==='sim').length;
              const realizadas = vals.filter(v=>v&&v!=='').length;
              const taxa = realizadas ? Math.round(presentes/realizadas*100) : 0;
              const taxaCls = taxa>=75?'var(--green)':taxa>=50?'var(--amber)':'var(--red)';
              return `<tr>
                <td style="font-weight:500;color:var(--t1)">${a.nome}</td>
                <td style="color:var(--t4);font-size:12px">${a.responsavel||'—'}</td>
                ${vals.map(v => {
                  const icon = v==='sim'?'✓':v==='sim2'?'●':v==='nao'?'✗':v==='link'?'L':'—';
                  const col = v==='sim'?'var(--green-t)':v==='sim2'?'var(--amber-t)':v==='nao'?'var(--red-t)':v==='link'?'var(--amber-t)':'var(--t4)';
                  return `<td style="text-align:center;font-size:13px;font-weight:600;color:${col}">${icon}</td>`;
                }).join('')}
                <td style="text-align:center">
                  <span style="font-family:var(--fh);font-weight:600;font-size:12.5px;color:${taxaCls}">${taxa}%</span>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-title">Por Aula</div>
    ${aulasComPresenca.map(ad => {
      const pMap = marcadas[ad.id] || {};
      const presentes = alunos.filter(a=>['sim','sim2','link'].includes(pMap[a.id])).length;
      const taxa = alunos.length ? Math.round(presentes/alunos.length*100) : 0;
      return `
      <div style="margin-bottom:10px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg-s)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-family:var(--fh);font-weight:600;font-size:13px">${ad.label}</span>
          <span class="pill ${taxa>=75?'pill-green':taxa>=50?'pill-amber':'pill-red'}">${taxa}% · ${presentes}/${alunos.length}</span>
        </div>
        <div class="prog-bar"><div class="prog-fill ${taxa>=75?'hi':taxa>=50?'mid':'lo'}" style="width:${taxa}%"></div></div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildAlunosTurma(t, alunos) {
  const rc = state.riscoCriteria||{maxFaltas:2, maxConsec:2, maxConsecLink:3};
  return `
  <div>
    <!-- Critérios de risco -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:13px;color:var(--t4)">${alunos.length} aluno${alunos.length!==1?'s':''} na turma</div>
      <div style="display:flex;gap:8px">
        ${isGod() || isBruna() ? `<button class="btn btn-ghost btn-sm" data-action="alocar-existente-turma">${I.userIcon} Adicionar existente</button>` : ''}
        ${isGod() ? `<button class="btn btn-primary btn-sm" data-action="novo-medico-turma">${I.plus} Novo Médico</button>` : ''}
      </div>
    </div>
    ${alunos.length===0 ? `<div class="empty-state"><p>Nenhum aluno nesta turma</p></div>` : ''}

}

// ═══════════════════════════════════════════════════════
// TAREFAS PAGE
// ═══════════════════════════════════════════════════════
function buildTarefasPage() {
  if (!state.tarefaFilter) state.tarefaFilter = 'pendentes';
  const minhas = getMinhasTarefas();
  const pendentes = minhas.filter(t=>!t.done);
  const feitas    = minhas.filter(t=>t.done);
  const urgentes   = pendentes.filter(t=>t.prazo&&t.prazo<=addDays(now(),3));
  const showing   = state.tarefaFilter === 'pendentes' ? pendentes : state.tarefaFilter === 'urgentes' ? urgentes : minhas;

  // Group pending by type for Bruna
  const linkTasks  = pendentes.filter(t=>t.tipo==='enviar-link');
  const videoTasks = pendentes.filter(t=>t.tipo==='cobrar-video');
  const outrasTasks= pendentes.filter(t=>!t.tipo||!['enviar-link','cobrar-video'].includes(t.tipo));

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Tarefas</div>
        <div class="page-sub">${pendentes.length} pendente${pendentes.length!==1?'s':''}</div>
      </div>
      <button class="btn btn-primary" data-action="nova-tarefa">${I.plus} Nova Tarefa</button>
    </div>
    <div style="padding:0 26px 10px;display:flex;gap:6px;flex-shrink:0">
      <div class="inner-tab ${state.tarefaFilter==='pendentes'?'active':''}" data-tarefa-filter="pendentes" style="cursor:pointer">Pendentes (${pendentes.length})</div>
      <div class="inner-tab ${state.tarefaFilter==='urgentes'?'active':''}" data-tarefa-filter="urgentes" style="cursor:pointer">Urgentes (${pendentes.filter(t=>t.prazo&&t.prazo<=addDays(now(),3)).length})</div>
      <div class="inner-tab ${state.tarefaFilter==='todas'?'active':''}" data-tarefa-filter="todas" style="cursor:pointer">Todas (${minhas.length})</div>
    </div>
    <div class="page-body" style="padding-top:8px">
      ${state.tarefaFilter==='pendentes' && pendentes.length===0 ? `<div class="empty-state" style="padding:32px 0">${I.tasks}<p>Nenhuma tarefa pendente </p></div>` : ''}
      ${state.tarefaFilter==='pendentes' && isBruna() && (linkTasks.length||videoTasks.length) ? `
        ${linkTasks.length ? `
          <div style="font-size:11px;font-weight:600;color:var(--amber-t);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px"> Enviar Link (${linkTasks.length})</div>
          ${linkTasks.map(t=>buildTarefaItem(t,false)).join('')}
          <div class="divider"></div>` : ''}
        ${videoTasks.length ? `
          <div style="font-size:11px;font-weight:600;color:var(--brand-h);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px"> Cobrar Vídeo (${videoTasks.length})</div>
          ${videoTasks.map(t=>buildTarefaItem(t,false)).join('')}
          <div class="divider"></div>` : ''}
        ${outrasTasks.length ? `
          <div style="font-size:11px;font-weight:600;color:var(--t4);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Outras (${outrasTasks.length})</div>
          ${outrasTasks.map(t=>buildTarefaItem(t,false)).join('')}` : ''}
      ` : state.tarefaFilter==='pendentes' ? pendentes.map(t=>buildTarefaItem(t,false)).join('') : ''}
      ${state.tarefaFilter==='todas' ? `
        ${pendentes.map(t=>buildTarefaItem(t,false)).join('')}
        ${feitas.length>0 ? `<div class="divider"></div><div class="section-title" style="margin-bottom:10px">Concluídas</div>${feitas.slice(0,20).map(t=>buildTarefaItem(t,true)).join('')}` : ''}
      ` : ''}
    </div>
  </div>`;
}

function buildTarefaItem(t, done) {
  const prioColor = t.prio==='alta'?'var(--red-t)':t.prio==='media'?'var(--amber-t)':'var(--t4)';
  return `
  <div class="task-item" style="${done?'opacity:.55':''}">
    <div class="task-check ${done?'done':''}" data-toggle-task="${t.id}">
      ${done ? `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:500;font-size:13px;color:var(--t1);${done?'text-decoration:line-through;color:var(--t4)':''}">
        ${t.alunoNome ? `<span style="color:var(--brand-h);cursor:pointer" data-open-aluno="${t.alunoId}" data-open-tab="reunioes">${t.alunoNome}</span> — ` : ''}${t.titulo}
      </div>
      <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
        ${t.prazo ? `<span style="font-size:11.5px;color:${t.prazo<=now()?'var(--red-t)':t.prazo<=addDays(now(),3)?'var(--amber-t)':'var(--t4)'}">${I.cal} ${fmt(t.prazo)}${t.hora?' · '+t.hora:''}${t.prazo<=now()?' !':''}` + '</span>' : ''}
        ${t.colab && t.colab!==state.user?.id ? `<span style="font-size:11.5px;color:var(--brand-h)">👥 Conjunto com ${PROFILES.find(p=>p.id===t.colab)?.name||t.colab}</span>` : ''}
        ${t.responsavel!==state.user?.id ? `<span style="font-size:11.5px;color:var(--amber-t)">↩ de ${PROFILES.find(p=>p.id===t.responsavel)?.name||t.responsavel}</span>` : ''}
        ${t.prio ? `<span style="font-size:11px;color:${prioColor}">${t.prio}</span>` : ''}
      </div>
      ${t.descricao ? `<div style="font-size:12px;color:var(--t4);margin-top:4px">${t.descricao}</div>` : ''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// MÉDICOS PAGE
// ═══════════════════════════════════════════════════════
function buildMedicosPage() {
  // Default to 'meus' for consultores/medicos so they see their alunos first
  if (!state.filtroMedicosSet && !isGod() && !isBruna()) {
    state.filtroMedicos = 'meus';
    state.filtroMedicosSet = true;
  }
  let lista = [...state.alunos];
  const uid = state.user?.id;

  // Filter
  if (state.filtroMedicos === 'meus') {
    if (isMedInt()) {
      // Médicos internos: veem alunos onde têm reuniões como responsável
      lista = lista.filter(a => (a.reunioes||[]).some(r => r.responsavelId === state.user?.id));
    } else {
      lista = lista.filter(a => a.responsavel?.toLowerCase() === state.user?.name?.toLowerCase());
    }
  } else if (state.filtroMedicos === 'risco') {
    lista = lista.filter(a => a.status==='ativo' && isRisco(a));
  } else if (state.filtroMedicos === 'churn') {
    lista = lista.filter(a => a.status==='churn');
  } else if (state.filtroMedicos === 'novos') {
    lista = lista.filter(a => a.status==='ativo' && !a.responsavel);
  }

  // Search applies to all tabs
  if (state.searchMedicos) {
    const q = state.searchMedicos.toLowerCase();
    lista = lista.filter(a =>
      a.nome.toLowerCase().includes(q) ||
      (a.especialidade||'').toLowerCase().includes(q) ||
      (a.turma||'').toLowerCase().includes(q) ||
      (a.cidade||'').toLowerCase().includes(q) ||
      (a.responsavel||'').toLowerCase().includes(q)
    );
  }

  const novosCount = state.alunos.filter(a => a.status==='ativo' && !a.responsavel).length;

  const filtros = [
    {id:'todos', label:'Todos'},
    {id:'meus', label:'Meus'},
    {id:'novos', label:`Novos${novosCount>0?' ('+novosCount+')':''}`},
    {id:'risco', label:'Em risco'},
    {id:'churn', label:'Churn'},
  ];

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Médicos</div>
        <div class="page-sub">${lista.length} de ${state.alunos.length} alunos</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" data-action="importar-planilha">${I.upload} Importar Planilha</button>
        ${isGod() ? `<button class="btn btn-primary" data-action="novo-medico">${I.plus} Novo Médico</button>` : ''}
      </div>
    </div>
    <div style="padding:0 26px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0">
      <div class="inner-tabs" style="margin:0">
        ${filtros.map(f=>`<div class="inner-tab ${state.filtroMedicos===f.id?'active':''}" data-filtro="${f.id}">${f.label}</div>`).join('')}
      </div>
      <div style="margin-left:auto;position:relative">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t4);display:flex">${I.search}</span>
        <input class="inp" id="search-medicos" placeholder="Buscar..." value="${state.searchMedicos}" style="padding-left:32px;width:200px;padding-top:7px;padding-bottom:7px">
      </div>
    </div>
    <div class="page-body" style="padding-top:8px">
      ${lista.length > 0 ? `
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;padding:8px 16px;margin-bottom:2px;border-bottom:1px solid var(--border);background:var(--bg-s);border-radius:var(--r) var(--r) 0 0">
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Nome</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Turma</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Resp. Médico</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Resp. Eng.</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Presença</div>
      </div>` : ''}
      ${lista.length === 0 ? `<div class="empty-state">${I.medicos}<p>Nenhum médico encontrado</p></div>` : ''}
      ${lista.map(a => buildMedicoCard(a, true)).join('')}
    </div>
  </div>`;
}

function buildMedicoCard(a, clickable=true) {
  const r = a.status==='ativo' && isRisco(a);
  const nc = a.status==='churn'?'#c084fc':r?'var(--amber-t)':'var(--t1)';
  const taxaCls = a.taxa_presenca>=75?'pill-green':a.taxa_presenca>=50?'pill-amber':'pill-red';
  // Find médico interno responsável (from reunioes)
  const reuIndiv = (a.reunioes||[]).find(r=>r.tipo==='Reunião Individual'||r.tipo==='Reunião de Onboarding');
  const medInt = reuIndiv?.responsavelId ? (PROFILES.find(p=>p.id===reuIndiv.responsavelId)?.name||'') : '';
  // Responsável engenheiro = a.responsavel
  const respEng = a.responsavel||'—';
  return `
  <div class="card ${clickable?'card-click':''}" style="margin-bottom:6px;padding:12px 16px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;align-items:center;gap:12px" ${clickable?`data-open-aluno="${a.id}"`:''}">
    <div>
      <div style="font-family:var(--fh);font-weight:600;font-size:14px;color:${nc}">${a.nome}</div>
      <div style="font-size:12px;color:var(--t4);margin-top:2px">${a.especialidade||'—'}</div>
    </div>
    <div style="font-size:13px;color:var(--brand-h);font-weight:500">${a.turma||'—'}</div>
    <div style="font-size:12.5px;color:var(--t2)">${medInt||'—'}</div>
    <div style="font-size:12.5px;color:var(--t2)">${respEng}</div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <span class="pill ${taxaCls}" style="font-size:10.5px">${a.taxa_presenca}%</span>
      ${a.status!=='ativo'?`<span class="pill ${a.status==='churn'?'pill-red':a.status==='pausado'?'pill-amber':'pill-gray'}" style="font-size:10px">${a.status}</span>`:''}
      ${r?`<span class="pill pill-amber" style="font-size:10px">!</span>`:''}
    </div>
  </div>`;
}

// DETAIL PANEL (ALUNO)
// ═══════════════════════════════════════════════════════
function buildDetailPanel() {
  const a = state.alunos.find(x=>x.id===state.selAluno);
  if (!a) return '';
  const tabs = ['info','etapas','aulas','reunioes','okrs','notas'];
  const tabLabels = {info:'Informações',etapas:'Etapas Iniciais',aulas:'Aulas',reunioes:'Reuniões',okrs:'OKRs & KPIs',notas:'Notas'};
  return `
  <div class="detail-panel">
    <div class="detail-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:13px;color:var(--brand-h)">${ini(a.nome)}</div>
        <div>
          <div style="font-family:var(--fh);font-weight:600;font-size:15px;color:var(--t1)">${a.nome}</div>
          <div style="font-size:11.5px;color:var(--t4);margin-top:1px;display:flex;gap:6px;align-items:center">
            ${a.turma?`<span style="color:var(--brand-h)">${a.turma}</span>`:''}
            <span class="pill ${a.status==='ativo'?'pill-green':a.status==='churn'?'pill-red':a.status==='pausado'?'pill-amber':'pill-gray'}" style="font-size:10px">${a.status}</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-icon" data-action="editar-aluno" title="Editar">${I.edit}</button>
        <button class="btn-icon" data-close-panel title="Fechar">${I.x}</button>
      </div>
    </div>
    <div class="detail-tabs">
      ${tabs.map(t=>`<div class="detail-tab ${state.alunoTab===t?'active':''}" data-aluno-tab="${t}">${tabLabels[t]}</div>`).join('')}
    </div>
    <div class="detail-body">
      ${state.alunoTab==='info' ? buildDetailInfo(a) : ''}
      ${state.alunoTab==='etapas' ? buildDetailEtapas(a) : ''}
      ${state.alunoTab==='aulas' ? buildDetailAulas(a) : ''}
      ${state.alunoTab==='reunioes' ? buildDetailReunioes(a) : ''}
      ${state.alunoTab==='okrs'  ? buildDetailOKRs(a)  : ''}
      ${state.alunoTab==='notas' ? buildDetailNotas(a) : ''}
    </div>
  </div>`;
}

function buildDetailEtapas(a) {
  const et = state.etapas[a.id] || {};
  const canEdit = isGod() || isBruna();
  const etapas = [
    {id:'forms', label:'Formulário de Onboarding enviado', desc:'Médico preencheu o formulário de diagnóstico'},
    {id:'onb',   label:'Reunião de Onboarding',            desc:'Reunião inicial realizada com o consultor'},
    {id:'fin',   label:'Reunião Fin/Leads',                desc:'Acesso às planilhas financeira e de leads'},
    {id:'sec',   label:'Treinamento da Secretária',        desc:'Secretária treinada e integrada ao processo'},
  ];
  const totalDone = etapas.filter(e => et[e.id+'_done']).length;
  const pct = Math.round((totalDone / etapas.length) * 100);

  return `
  <div>
    <div style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;color:var(--t4)">${totalDone} de ${etapas.length} etapas concluídas</span>
        <span style="font-size:12px;font-weight:600;color:${pct===100?'var(--green)':'var(--brand-h)'}">${pct}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':'var(--brand-h)'};border-radius:3px;transition:width .3s"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${etapas.map((e,i) => {
        const done = !!et[e.id+'_done'];
        return `
        <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r2);border:1px solid ${done?'rgba(34,197,94,.25)':'var(--border)'};background:${done?'rgba(34,197,94,.05)':'var(--bg-s)'}">
          <div style="width:28px;height:28px;border-radius:50%;background:${done?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:${done?'#fff':'var(--t4)'}">
            ${done ? '✓' : (i+1)}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13.5px;font-weight:600;color:${done?'var(--t1)':'var(--t2)'}">${e.label}</div>
            <div style="font-size:11.5px;color:var(--t4);margin-top:2px">${e.desc}</div>
          </div>
          ${canEdit ? `
          <button class="btn btn-sm ${done?'btn-ghost':''}" 
            style="${done?'color:var(--t4)':''}"
            data-etapa="${e.id}" data-aluno-id="${a.id}">
            ${done ? 'Desfazer' : 'Marcar'}
          </button>` : `
          <span style="font-size:11px;color:${done?'var(--green)':'var(--t4)'}">
            ${done ? 'Concluído' : 'Pendente'}
          </span>`}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function buildDetailInfo(a) {
  const ed = state.editandoAluno;
  const ef = state.editForm;

  if (ed) {
    return `
    <div>
      <div class="field-row">
        <div class="field"><label class="lbl">Nome</label><input class="inp" id="ef-nome" value="${ef.nome||a.nome}"></div>
        <div class="field"><label class="lbl">Especialidade</label><input class="inp" id="ef-esp" value="${ef.especialidade||a.especialidade||''}"></div>
        <div class="field"><label class="lbl">Turma</label>
          <select class="inp" id="ef-turma">
            <option value="">—</option>
            ${state.turmas.map(t=>`<option value="${t.id}" ${(ef.turma||a.turma)===t.id?'selected':''}>${t.nome}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label class="lbl">Responsável</label>
          <select class="inp" id="ef-resp">
            <option value="">—</option>
            ${RESPONSAVEIS.map(r=>`<option value="${r}" ${(ef.responsavel||a.responsavel)===r?'selected':''}>${r}</option>`).join('')}

function buildDetailAulas(a) {
  const taxa = a.taxa_presenca;
  const taxaCls = taxa>=75?'pill-green':taxa>=50?'pill-amber':'pill-red';
  const marcadas = state.presenca;

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin:0">Histórico de Aulas</div>
      <span class="pill ${taxaCls}">Presença: ${taxa}%</span>
    </div>
    ${AULAS_DEF.filter(ad=>ad.bloco!=='11').map(ad=>{
      // Find presenca for this aluno in any turma
      let pres = null;
      Object.entries(marcadas).forEach(([tid,aulaMap])=>{
        if (aulaMap[ad.id] && aulaMap[ad.id][a.id]) pres = aulaMap[ad.id][a.id];
      });
      const lbl = pres==='sim'?'Presente':pres==='nao'?'Faltou':pres==='link'?'Link':pres==='reset'?'Reset':'Não realizada';
      const cls = pres==='sim'?'pill-green':pres==='nao'?'pill-red':pres==='link'?'pill-amber':'pill-gray';
      return `<div class="aula-row">
        <div style="flex:1;font-size:13px;color:var(--t2)">${ad.label}</div>
        <span class="pill ${cls}" style="font-size:10.5px">${lbl}</span>
      </div>`;
    }).join('')}
    <div class="divider"></div>
    <div class="section-title">1:1s</div>
    ${AULAS_DEF.filter(ad=>ad.bloco==='11').map(ad=>{
      const r = (a.reunioes||[]).find(r=>r.tipo===ad.label);
      return `<div class="aula-row">
        <div style="flex:1;font-size:13px;color:var(--t2)">${ad.label}</div>
        ${r ? `<span class="pill pill-green" style="font-size:10.5px">${fmt(r.data)}</span>` : `<span class="pill pill-gray" style="font-size:10.5px">—</span>`}
      </div>`;
    }).join('')}
  </div>`;
}

function buildDetailReunioes(a) {
  const reunioes = (a.reunioes || []).slice().sort((x,y)=>y.data.localeCompare(x.data));
  // Last realizada with proxPassos
  const ultRealizada = reunioes.find(r=>r.realizada && r.proxPassos);
  return `
  <div>
    ${ultRealizada ? `
      <div style="background:var(--brand-dim);border:1px solid rgba(99,102,241,.3);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px">
        <div style="font-size:10.5px;font-weight:600;color:var(--brand-h);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">Próximos Passos — ${ultRealizada.tipo}</div>
        <div style="font-size:13px;color:var(--t1);line-height:1.6">${ultRealizada.proxPassos}</div>
      </div>
    ` : ''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-title" style="margin:0">Reuniões</div>
      <button class="btn btn-primary btn-sm" data-action="nova-reuniao">${I.plus} Agendar Reunião</button>
    </div>
    ${(!isBruna()&&!isGod()) ? `<div style="font-size:12px;color:var(--t4);margin-bottom:10px;padding:8px 10px;background:var(--brand-dim);border-radius:var(--r);color:var(--brand-h)">Mostrando apenas seus 1:1s</div>` : ''}
    ${(() => {
      const visivel = (!isBruna()&&!isGod())
        ? reunioes.filter(r=>r.tipo&&r.tipo.includes('1:1'))
        : reunioes;
      return visivel.length===0
        ? `<div class="empty-state" style="padding:24px 0"><p>Nenhuma reunião agendada</p></div>`
        : visivel.map((r,i) => `
      <div class="reuniao-card" style="border-color:${r.realizada ? 'var(--border)' : 'rgba(99,102,241,.3)'};background:${r.realizada ? 'var(--bg-t)' : 'var(--brand-dim)'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <span style="font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)">${r.tipo}</span>
            <span style="font-size:11.5px;color:var(--t4);margin-left:10px">${fmt(r.data)}${r.hora?' · '+r.hora:''}</span>
            ${!r.realizada ? `<span class="pill pill-blue" style="font-size:9.5px;margin-left:8px">Agendada</span>` : `<span class="pill pill-green" style="font-size:9.5px;margin-left:8px">Realizada</span>`}
          </div>
          <div style="display:flex;gap:5px">
            ${!r.realizada ? `<button class="btn btn-primary btn-xs" data-realizar="${r.id}" data-aluno-id="${a.id}">Realizar</button>` : `<button class="btn btn-xs" style="background:var(--red-bg);color:var(--red-t);border:1px solid var(--red-b)" data-desmarcar="${r.id}" data-aluno-id="${a.id}">Desmarcar</button>`}
            <button class="btn btn-ghost btn-xs" data-reagendar="${r.id}" data-aluno-id="${a.id}">Reagendar</button>
            <button class="btn btn-xs" style="background:var(--red-bg);color:var(--red-t);border:1px solid var(--red-b)" onclick="event.stopPropagation();delReuniao('${r.id}','${a.id}')">${I.trash}</button>
          </div>
        </div>
        ${r.realizada && r.notas ? `<div style="font-size:12.5px;color:var(--t3);margin:6px 0;line-height:1.6">${r.notas}</div>` : ''}
        ${r.realizada && r.proxPassos ? `
          <div style="margin-top:8px;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:4px;font-size:12px;color:var(--t3)">
            <strong style="color:var(--t2)">Próximos passos:</strong> ${r.proxPassos}
          </div>
        ` : ''}
      </div>
    `).join('');})()}
  </div>`;
}

function buildModal() {
  const m = state.modal;
  if (!m) return '';
  if (m.type === 'switch-profile')  return buildModalSwitchProfile();
  if (m.type === 'change-password') return buildModalChangePwd();
  if (m.type === 'alocar-turma')           return buildModalAlocarTurma();
  if (m.type === 'alocar-existente-turma') return buildModalAlocarExistente();
  if (m.type === 'importar-planilha')        return buildModalImportarPlanilha();
  if (m.type === 'importar-planilha-turmas') return buildModalImportarPlanilhaTurmas();
  if (m.type === 'novo-okr')               return buildModalNovoOKR();
  if (m.type === 'novo-kpi')               return buildModalNovoKPI();
  if (m.type === 'edit-profile')    return buildModalEditProfile(m.profile);
  if (m.type === 'novo-usuario')    return buildModalNovoUsuario();
  if (m.type === 'edit-turma')      return buildModalEditTurma(m.turma);
  if (m.type === 'nova-turma') return buildModalNovaTurma();
  if (m.type === 'novo-medico') return buildModalNovoMedico();
  if (m.type === 'nova-tarefa') return buildModalNovaTarefa();
  if (m.type === 'nova-reuniao') return buildModalNovaReuniao();
  if (m.type === 'marcar-aula') return buildModalMarcarAula();
  if (m.type === 'nova-reuniao-calendario') return buildModalNovaReuniaoCalendario();
  if (m.type === 'reagendar') return buildModalReagendar();
  if (m.type === 'realizar')  return buildModalRealizarReuniao();
  return '';
}

function addDays(dateStr, n) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}

function logAccess(page) {
  if (!state.user) return;
  const userId   = state.user.id;
  const userName = state.user.name;
  const ts       = new Date().toISOString();

  if (!state.accessStats) state.accessStats = { byUser: {}, byPage: {}, lastAccess: {} };

  if (!state.accessStats.byUser[userId]) state.accessStats.byUser[userId] = { name: userName, total: 0, pages: {} };
  state.accessStats.byUser[userId].total++;
  state.accessStats.byUser[userId].pages[page] = (state.accessStats.byUser[userId].pages[page] || 0) + 1;
  state.accessStats.byUser[userId].name = userName;

  if (page !== 'login') {
    state.accessStats.byPage[page] = (state.accessStats.byPage[page] || 0) + 1;
  }

  state.accessStats.lastAccess[userId] = ts;
}

function attachEvents() {
  // Login — clique no perfil
  document.querySelectorAll('[data-login]').forEach(el => {

      const pid = el.dataset.login;
      const p = state.profiles.find(x=>x.id===pid) || {id:pid, name:pid};
      state.user = p;
      await loadStateFromDb();
      logAccess('login');
      render();
    });
  });

  // Admin bypass
  document.getElementById('btn-admin-bypass')?.addEventListener('click', async () => {
    state.user = { id: 'admin', name: 'Admin', role: 'admin' };
    state.page = 'admin';
    if (!PROFILES.find(p=>p.id==='admin')) PROFILES.push({id:'admin', name:'Admin'});
    await loadStateFromDb();

    render();
  });

  // Logout


  document.querySelector('[data-logout]')?.addEventListener('click', () => {
    state.user = null; state.selAluno = null; state.selTurma = null; state.filtroMedicosSet = false; state.filtroMedicos = 'todos';

      if (a === 'editar-aluno') { state.editandoAluno=true; state.editForm={}; state.alunoTab='info'; render(); }
      if (a === 'cancelar-edicao') { state.editandoAluno=false; state.editForm={}; render(); }
      if (a === 'back-turmas') { state.selTurma = null; render(); }
      if (a === 'editar-turma') { const t=state.turmas.find(x=>x.id===state.selTurma); state.modal={type:'edit-turma', turma:t}; render(); }
      if (a === 'salvar-turma') salvarTurma();
      if (a === 'salvar-medico') salvarMedico();
      if (a === 'salvar-tarefa') salvarTarefa();
      if (a === 'salvar-reuniao') salvarReuniao();
      if (a === 'salvar-aula') salvarAula();
      if (a === 'salvar-edicao')      salvarEdicaoAluno();
      if (a === 'salvar-agenda')      salvarAgenda();
      if (a === 'alocar-turma')           { state.modal={type:'alocar-turma'}; render(); }
      if (a === 'alocar-existente-turma') { state.modal={type:'alocar-existente-turma'}; render(); }
      if (a === 'importar-planilha')       { state.modal={type:'importar-planilha'}; render(); }
      if (a === 'processar-import')         processarImport();
      if (a === 'salvar-alocar-turma') salvarAlocarTurma();
      if (a === 'salvar-logcs') salvarLogCS();
      if (a === 'salvar-notas') salvarNotas();
      if (a === 'salvar-reuniao-calendario') salvarReuniaoCalendario();
      if (a === 'salvar-reagendar')    salvarReagendar();
      if (a === 'novo-okr')  { state.modal={type:'novo-okr', alunoId:el.dataset.alunoId}; render(); }
      if (a === 'salvar-okr') salvarOKR();
      if (a === 'salvar-kpi')          salvarKPI();
      if (a === 'salvar-risco-criteria') {
        const f=parseInt(document.getElementById('rc-faltas')?.value)||2;
        const co=parseInt(document.getElementById('rc-consec')?.value)||2;

        state.riscoCriteria={maxFaltas:f,maxConsec:co,maxConsecLink:lk};
        showToast('Critérios atualizados');
  scheduleSave();
        render();
      }
      if (a === 'salvar-realizar')     salvarRealizar();
      if (a === 'salvar-edit-profile') salvarEditProfile(el);
      if (a === 'salvar-novo-usuario') salvarNovoUsuario();

      if (a === 'novo-usuario')          { state.modal={type:'novo-usuario'}; render(); }
