<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Exponencial MBA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ExpMed brand */
  --expindigo:#60009C;--expgray:#898989;--expteal:#06D4D4;
  /* Backgrounds (light theme) */
  --bg:#F7F7F7;--bg-p:#ffffff;--bg-s:#f0f0f5;--bg-t:#e8e8f0;
  /* Text */
  --t1:#0f0a1a;--t2:#2d2540;--t3:#3d3550;--t4:#6b7280;
  /* Brand */
  --brand:#60009C;--brand-h:#8200d4;--brand-dim:rgba(96,0,156,.08);
  /* Borders */
  --border:rgba(96,0,156,.12);--border2:rgba(96,0,156,.22);
  /* Semantic */
  --red:#c0392b;--red-t:#e74c3c;--red-bg:rgba(192,57,43,.1);--red-b:rgba(192,57,43,.35);
  --amber:#d97706;--amber-t:#b45309;--amber-bg:rgba(217,119,6,.1);
  --green:#059669;--green-t:#047857;--green-bg:rgba(5,150,105,.1);
  /* Fonts */
  --fh:'Sora',sans-serif;--fb:'DM Sans',sans-serif;
  --r:6px;--r2:10px;--r3:14px;
}

.manual-section{margin-bottom:28px}
.manual-h2{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--brand);margin-bottom:8px}
.manual-p{font-size:13.5px;color:var(--t2);line-height:1.75}
.manual-list{margin:8px 0 0 16px;display:flex;flex-direction:column;gap:6px}
.manual-list li{font-size:13.5px;color:var(--t2);line-height:1.6}
.manual-tip{margin-top:10px;padding:10px 14px;background:#f5f0ff;border-left:3px solid var(--brand);border-radius:0 var(--r) var(--r) 0;font-size:12.5px;color:#3d1a6e;line-height:1.6}
.manual-badge{display:inline-flex;align-items:center;padding:1px 8px;border-radius:99px;font-size:11px;font-weight:600;margin-right:4px}
.manual-badge.green{background:#dcfce7;color:#166534;border:1px solid #86efac}
.manual-badge.yellow{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
.manual-badge.red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.manual-badge.gray{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:16px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--fb);outline:none;font-size:14px}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-thumb{background:#c4b5fd;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#a78bfa}
::-webkit-scrollbar-track{background:transparent}

/* ═══ LAYOUT ═══ */
#root{display:flex;height:100vh}
#sidebar{width:220px;min-width:220px;background:#1a0a2e;border-right:none;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ═══ SIDEBAR ═══ */
.sb-head{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-logo{display:none}
.sb-logo img{width:54px;height:42px;object-fit:contain}
.sb-brand{font-family:var(--fh);font-weight:700;font-size:14px;line-height:1.3;color:#fff}
.sb-brand small{display:block;font-size:10px;color:rgba(255,255,255,.5);font-weight:400;margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-section{font-size:9px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:1.4px;text-transform:uppercase;padding:8px 8px 4px;margin-top:4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-family:var(--fh);font-weight:500;font-size:12.5px;color:rgba(255,255,255,.55);transition:all .15s;user-select:none;margin-bottom:1px;position:relative}
.sb-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.sb-item.active{background:rgba(96,0,156,.5);color:#fff}
.sb-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.sb-item.active svg{opacity:1}
.sb-badge{background:#60009C;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:auto}
.sb-badge.red{background:var(--red)}
.sb-badge.amber{background:#d97706;color:#fff}
.sb-foot{padding:12px 12px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;border-radius:50%;background:rgba(96,0,156,.4);border:1px solid rgba(96,0,156,.6);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.sb-uname{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.8);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-out{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);padding:3px;border-radius:4px;display:flex;align-items:center}
.sb-out:hover{color:#fff}
.sb-divider{height:1px;background:rgba(255,255,255,.1);margin:6px 8px}

/* ═══ PAGE ═══ */
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:pageIn .18s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-hdr{padding:22px 26px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.page-title{font-family:var(--fh);font-weight:600;font-size:20px;color:var(--t1);letter-spacing:-.3px}
.page-sub{font-size:12px;color:var(--t4);margin-top:3px}
.page-body{flex:1;overflow-y:auto;padding:22px 26px}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--fh);font-weight:500;font-size:12.5px;border:none;cursor:pointer;border-radius:var(--r);transition:all .15s;white-space:nowrap;flex-shrink:0;line-height:1}
.btn-primary{background:var(--brand);color:#fff;padding:8px 16px}
.btn-primary:hover{background:var(--brand-h)}
.btn-ghost{background:#fff;color:var(--t2);padding:8px 14px;border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-s);border-color:var(--border2)}
.btn-danger{background:var(--red);color:#fff;padding:8px 14px}
.btn-sm{font-size:11.5px;padding:5px 12px}
.btn-xs{font-size:11px;padding:4px 9px;border-radius:4px}
.btn-icon{width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:#f3f0f8;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:#2d2540;transition:all .15s}
.btn-icon:hover{background:var(--bg-s);color:#60009C}
.btn svg{width:14px;height:14px}

/* ═══ INPUTS ═══ */
.inp{background:#fff;border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-size:13px;padding:9px 12px;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--brand);background:#fff}
.inp::placeholder{color:#aaa}
.inp:disabled{opacity:.5;cursor:not-allowed}
select.inp option{background:#fff;color:var(--t1)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
.lbl{font-family:var(--fh);font-size:11px;font-weight:500;color:var(--t3);margin-bottom:5px;display:block;letter-spacing:.3px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.full{grid-column:1/-1}

/* ═══ CARDS ═══ */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);transition:border-color .15s}
.card-click{cursor:pointer}
.card-click:hover{border-color:var(--border2);background:var(--bg-s)}

/* ═══ MODAL ═══ */
.overlay{position:fixed;inset:0;background:rgba(96,0,156,.15);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border:1px solid var(--border2);border-radius:var(--r3);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(96,0,156,.15);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-lg{max-width:680px}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:var(--fh);font-weight:600;font-size:16px;color:var(--t1)}
.modal-body{padding:20px 22px}
.modal-body-scroll{padding:20px 22px;overflow-y:auto;max-height:60vh}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px}

/* ═══ TABS ═══ */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 26px;gap:2px;flex-shrink:0;overflow-x:auto}
.tab{font-family:var(--fh);font-size:12.5px;font-weight:500;color:var(--t4);padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.inner-tabs{display:flex;gap:2px;margin-bottom:18px}
.inner-tab{font-family:var(--fh);font-size:11.5px;font-weight:500;color:var(--t4);padding:6px 12px;cursor:pointer;border-radius:var(--r);transition:all .15s}
.inner-tab:hover{color:var(--t2);background:var(--bg-s)}
.inner-tab.active{color:var(--brand);background:var(--brand-dim)}

/* ═══ TABLE ═══ */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--fh);font-size:10.5px;font-weight:600;color:var(--t4);letter-spacing:.8px;text-transform:uppercase;padding:8px 14px;text-align:left;background:var(--bg-s);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;font-size:13px;color:var(--t2);border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f9f5ff}
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;background:#fff}

/* ═══ PILLS ═══ */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;border:1px solid}
.pill-green{background:#dcfce7;color:#166534;border-color:#86efac}
.pill-amber{background:#fef9c3;color:#854d0e;border-color:#fde047}
.pill-red{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.pill-blue{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
.pill-gray{background:#f3f4f6;color:#374151;border-color:#d1d5db}

/* ═══ STATS ═══ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.stat-val{font-family:var(--fh);font-weight:700;font-size:28px;color:var(--brand);letter-spacing:-.5px;line-height:1}
.stat-lbl{font-size:12px;color:var(--t4);margin-top:5px}

/* ═══ PRESENCE BUTTONS ═══ */
.pres-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:#fff;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--fh)}
.pres-btn:hover{border-color:var(--brand);color:var(--brand)}
.pres-btn.sim{background:#dcfce7;border-color:#86efac;color:#166534}
.pres-btn.nao{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.pres-btn.link{background:#fef9c3;border-color:#fde047;color:#854d0e}
.pres-btn.sim2{background:#fef9c3;border-color:#fde047;color:#854d0e}

/* ═══ PROGRESS BAR ═══ */
.prog-bar{height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-fill.hi{background:var(--green)}
.prog-fill.mid{background:var(--amber)}
.prog-fill.lo{background:var(--red)}

/* ═══ CHECKLIST ═══ */
.check-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;background:#fff;transition:border-color .15s}
.check-item:hover{border-color:var(--border2)}
.check-box{width:18px;height:18px;border-radius:4px;border:2px solid #60009C;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}.check-box svg{pointer-events:none}
.check-box.done{background:#60009C;border-color:#60009C}
.check-box.done svg{display:block}
.check-box svg{display:none;width:11px;height:11px}
.check-label{font-size:13px;color:var(--t2);flex:1}
.check-label.done{color:var(--t4);text-decoration:line-through}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:24px;right:24px;background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:12px 18px;font-size:13px;color:var(--t2);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;animation:modalIn .2s ease;max-width:320px}
.toast.ok{border-color:#86efac;background:#dcfce7;color:#166534}
.toast.err{border-color:var(--red-b);background:var(--red-bg)}

/* ═══ LOGIN ═══ */
#login-page{position:fixed;inset:0;background:linear-gradient(135deg,#1a0535 0%,#2d0a5e 50%,#1a0535 100%);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px}
.login-card{background:#fff;border:none;box-shadow:none;border-radius:var(--r3);padding:36px;width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-mark{width:48px;height:48px;border-radius:12px;background:transparent;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-logo-mark img{width:120px;height:80px;object-fit:contain}
.login-title{font-family:var(--fh);font-weight:700;font-size:20px;color:#60009C;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--t4)}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.profile-btn{padding:12px;border-radius:var(--r2);border:1px solid var(--border);background:#fff;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)}
.profile-btn:hover{border-color:var(--brand-h);background:var(--brand-dim);color:var(--brand-h)}
.login-sep{display:flex;align-items:center;gap:10px;color:var(--t4);font-size:11px;margin:14px 0}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.login-err{background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--r);padding:9px 12px;font-size:12.5px;color:var(--red-t);margin-top:10px}

/* ═══ DETAIL PANEL ═══ */
.detail-overlay{position:fixed;inset:0;background:rgba(96,0,156,.12);z-index:590;animation:fadeIn .15s ease}
.detail-panel{position:fixed;top:24px;right:24px;bottom:24px;left:24px;max-width:1100px;margin:0 auto;background:var(--bg-p);border:1px solid var(--border2);border-radius:14px;z-index:600;display:flex;flex-direction:column;overflow:hidden;animation:panelIn .2s ease;box-shadow:0 8px 40px rgba(96,0,156,.15)}
@keyframes panelIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.detail-hdr{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0;overflow-x:auto}
.detail-tab{font-family:var(--fh);font-size:12.5px;font-weight:500;color:var(--t4);padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;white-space:nowrap}
.detail-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.detail-tab:hover{color:var(--t2)}
.detail-body{flex:1;overflow-y:auto;padding:24px 28px;max-width:920px;width:100%;margin:0 auto}
.detail-body>div{animation:tabFade .18s ease}
@keyframes tabFade{from{opacity:0}to{opacity:1}}

/* ═══ MISC ═══ */
.divider{height:1px;background:var(--border);margin:16px 0;opacity:.7}
.section-title{font-family:var(--fh);font-size:11px;font-weight:600;color:var(--t4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}
.kv{display:flex;gap:8px;font-size:12.5px;margin-bottom:7px;align-items:flex-start}
.kv-k{color:var(--t4);min-width:140px;flex-shrink:0}
.kv-v{color:var(--t2);font-weight:500}
.empty-state{text-align:center;padding:48px 20px;color:var(--t4)}
.empty-state svg{width:40px;height:40px;margin:0 auto 12px;display:block;opacity:.3}
.empty-state p{font-size:13px;margin-top:4px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;background:#fff;transition:border-color .15s}
.task-item:hover{border-color:var(--border2)}
.task-check{width:18px;height:18px;border-radius:4px;border:2px solid #60009C;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.task-check.done{background:var(--brand);border-color:var(--brand)}
.alert-bar{background:var(--amber-bg);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:10px 14px;font-size:12.5px;color:var(--amber-t);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.note-area{background:#fafafa;border:1px solid var(--border);border-radius:var(--r2);padding:14px;min-height:120px;color:var(--t2);font-size:13px;line-height:1.7;width:100%;resize:vertical;outline:none;font-family:var(--fb)}
.note-area:focus{border-color:var(--brand)}
.reuniao-card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px}
.reuniao-card.first{border-color:rgba(99,102,241,.35);background:var(--brand-dim)}
.badge-count{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:99px;min-width:18px;height:18px;padding:0 5px;margin-left:4px}
.turma-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r2);padding:18px 20px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.turma-card:hover{border-color:var(--brand);background:#fdf9ff}
.turma-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.turma-tag{font-family:var(--fh);font-weight:700;font-size:22px;color:var(--t1)}
.turma-meta{display:flex;gap:20px;flex-wrap:wrap}
.turma-meta-item{font-size:12px}
.turma-meta-item span{color:var(--t4);display:block;font-size:11px}
.aula-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e5e7eb}
.aula-row:last-child{border-bottom:none}
.prog-stage{padding:16px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;background:#fff}
.prog-stage-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.prog-stage-hdr h3{font-family:var(--fh);font-weight:600;font-size:14px;color:var(--t1)}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════════════
const SB_URL  = 'https://srkgmthbouqnfipkciwc.supabase.co';
const SB_ANON = 'sb_publishable_YZew_N2oQ_Q3NLrH8Wd-dA_30j7Dsj9';

// ── Supabase Auth helpers ────────────────────────────────
let sbSession = null; // { access_token, user: { id, email, user_metadata: { name, role } } }

async function sbRequest(path, method='GET', body=null) {
  const token = sbSession?.access_token || SB_ANON;
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_ANON,
      'Authorization': `Bearer ${token}`,
      'Prefer': 'return=representation',
    },
  };
  if (body) opts.body = JSON.stringify(body);

async function dbUpsert(table, data) {
  const token = sbSession?.access_token || SB_ANON;
  const res = await fetch(SB_URL + `/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',

      'Authorization': `Bearer ${token}`,

  return res.json();

// Salvamos o estado inteiro como um JSON numa tabela "app_state"
// com uma única linha { id: 'main', data: {...} }
let _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveStateToDb, 1500);
}

async function saveStateToDb(retryCount = 0) {
  const snapshot = {
    alunos:       state.alunos,
    turmas:       state.turmas,
    tarefas:      state.tarefas,
    presenca:     state.presenca,
    aulasDates:   state.aulasDates,
    etapas:       state.etapas,
    linkEnviado:  state.linkEnviado,
    aulaAberta:   state.aulaAberta,
    faltaLog:     state.faltaLog,
    riscoCriteria:state.riscoCriteria,
    aulasCustom:  state.aulasCustom || {},
    accessLog:    state.accessLog.slice(-500), // mantém só as 500 mais recentes
    accessStats:  state.accessStats || {},
    profiles:     state.profiles,
    reunioes:     state.reunioes,
    expandedAulas: state.expandedAulas || {},
    passwordSet:  state.passwordSet || {},
  };

  try {
    // Verifica se alguém salvou depois que carregamos
    const current = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=updated_at');
    const remoteTs = current?.[0]?.updated_at;

    if (remoteTs && state._loadedAt && remoteTs !== state._loadedAt) {
      // Conflito detectado — recarrega e reaplica mudanças por cima
      if (retryCount >= 2) {
        showToast('Conflito de dados — recarregue a página', 'err');
        return;
      }
      console.warn('[supa] conflito detectado, fazendo merge...');

      // Carrega estado remoto mais recente
      const remoteRows = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=data');
      const remoteData = remoteRows?.[0]?.data || {};

      // Merge: aplica o snapshot local por cima do remoto
      // Campos que o usuário atual pode ter mudado sobrescrevem o remoto
      // Campos que ele não tocou ficam com a versão mais recente do remoto
      const merged = {
        ...remoteData,
        alunos:      snapshot.alunos,
        tarefas:     snapshot.tarefas,
        presenca:    snapshot.presenca,
        etapas:      snapshot.etapas,
        aulasDates:  snapshot.aulasDates,
        linkEnviado: snapshot.linkEnviado,
        aulaAberta:  snapshot.aulaAberta,
        faltaLog:    snapshot.faltaLog,
        riscoCriteria: snapshot.riscoCriteria,
        accessLog:   remoteData.accessLog || [],
        accessStats: (() => {
          // Merge stats: soma os contadores de ambos
          const local  = snapshot.accessStats  || { byUser:{}, byPage:{}, lastAccess:{} };
          const remote = remoteData.accessStats || { byUser:{}, byPage:{}, lastAccess:{} };
          const merged = { byUser: {...remote.byUser}, byPage: {...remote.byPage}, lastAccess: {...remote.lastAccess, ...local.lastAccess} };
          Object.entries(local.byUser || {}).forEach(([uid, data]) => {
            if (!merged.byUser[uid]) { merged.byUser[uid] = data; return; }
            merged.byUser[uid].total = (merged.byUser[uid].total || 0) + (data.total || 0);
            Object.entries(data.pages || {}).forEach(([pg, cnt]) => {
              merged.byUser[uid].pages[pg] = (merged.byUser[uid].pages[pg] || 0) + cnt;
            });
          });
          Object.entries(local.byPage || {}).forEach(([pg, cnt]) => {
            merged.byPage[pg] = (merged.byPage[pg] || 0) + cnt;
          });
          return merged;
        })(),
      };

      state._loadedAt = remoteTs;
      await dbUpsert('mba_exp_presenca_state', { id: 'main', data: merged, updated_at: new Date().toISOString() });
      state._loadedAt = new Date().toISOString();
      showToast('Dados sincronizados com sucesso', 'ok');
      return;
    }

    await dbUpsert('mba_exp_presenca_state', { id: 'main', data: snapshot, updated_at: new Date().toISOString() });
    state._loadedAt = new Date().toISOString();
    console.log('[supa] salvo com sucesso');

  } catch(e) {
    console.error('[supa] ERRO ao salvar:', e.message);
    showToast('Erro ao salvar: ' + e.message, 'err');
  }
}

async function loadStateFromDb() {
  try {
    const rows = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=data,updated_at');
    if (rows && rows[0]?.data) {
      const d = rows[0].data;
      state._loadedAt = rows[0].updated_at; // guarda timestamp para detecção de conflito
      if (d.alunos)       state.alunos       = d.alunos;
      if (d.turmas)       state.turmas       = d.turmas;
      if (d.tarefas)      state.tarefas      = d.tarefas;
      if (d.presenca)     state.presenca     = d.presenca;
      if (d.aulasDates)   state.aulasDates   = d.aulasDates;
      if (d.etapas)       state.etapas       = d.etapas;
      if (d.linkEnviado)  state.linkEnviado  = d.linkEnviado;
      if (d.aulaAberta)   state.aulaAberta   = d.aulaAberta;
      if (d.expandedAulas) state.expandedAulas = d.expandedAulas;
      if (d.faltaLog)     state.faltaLog     = d.faltaLog;
      if (d.riscoCriteria) state.riscoCriteria = d.riscoCriteria;
      if (d.accessLog)      state.accessLog    = d.accessLog;
      if (d.accessStats)    state.accessStats   = d.accessStats;
      if (d.profiles) {
        state.profiles = d.profiles;
        d.profiles.forEach(p => {
          // Usar passwordSet como fonte de verdade secundária
          const hasPwd = p.hasPassword === true || !!(d.passwordSet||{})[p.id];
          if (!PROFILES.find(x=>x.id===p.id)) PROFILES.push({id:p.id, name:p.name, email:p.email||'', hasPassword:hasPwd});
          else { const pp=PROFILES.find(x=>x.id===p.id); pp.name=p.name; pp.email=p.email||''; pp.hasPassword=hasPwd; }
          if (hasPwd) p.hasPassword = true; // garantir no state.profiles também
        });
      }
      if (d.passwordSet) state.passwordSet = d.passwordSet;
      if (d.reunioes)       state.reunioes     = d.reunioes;
      if (d.aulasCustom)    state.aulasCustom  = d.aulasCustom;
    }
  } catch(e) {
    console.warn('loadState error:', e.message);
    state._dbError = true;
  }
  aplicarAulasCustom();
  ensureOnboardingTasks();
}

// Garante que todo médico NOVO (ativo, sem responsável designado — mesmo critério da aba "Novos")
// que ainda não teve onboarding iniciado tenha a tarefa pra Bruna enviar o forms.
// Restrito a "Novos" para não gerar tarefas em massa para a base antiga já em andamento.
function ensureOnboardingTasks() {
  try {
    (state.alunos||[]).forEach(a => {
      if (a.status !== 'ativo') return;
      if (a.responsavel) return; // já tem responsável → não é "novo", não engatilha
      const et = state.etapas[a.id] || {};
      const formsIniciado = et.forms_status || et.forms_done;
      if (formsIniciado) return; // já foi enviado/recebido, não precisa lembrar
      const titulo = 'Mandar forms de onboarding para ' + (a.nome||'').split(' ')[0];
      const jaTem = state.tarefas.some(t => t.alunoId===a.id && t.titulo===titulo);
      if (!jaTem) {
        addTarefa({titulo, responsavel:'bruna', alunoId:a.id, alunoNome:a.nome, prio:'alta',
                   descricao:'Novo médico cadastrado — enviar formulário de onboarding'});
      }
      // Tarefa para o Ygor: designar um responsável ao médico novo (que entrou sem responsável)
      const tituloResp = 'Designar responsável para ' + (a.nome||'').split(' ')[0];
      const jaTemResp = state.tarefas.some(t => t.alunoId===a.id && t.titulo===tituloResp);
      if (!jaTemResp) {
        addTarefa({titulo:tituloResp, responsavel:'ygor', alunoId:a.id, alunoNome:a.nome, prio:'alta',
                   descricao:'Novo médico cadastrado sem responsável — atribuir um consultor'});
      }
    });
  } catch(e) { console.warn('ensureOnboardingTasks erro:', e.message); }
}

// Quando um responsável é atribuído a um médico, conclui a tarefa "Designar responsável" pendente
function concluirTarefaDesignarResp(alunoId) {
  try {

        t.done = true;

}

// Persisted in localStorage so sobrevive ao F5
function gcalGetToken(uid) {
  try {
    const raw = localStorage.getItem('gcal_token_' + uid);
    if (!raw) return null;
    const t = JSON.parse(raw);
    if (Date.now() > t.expiry) { localStorage.removeItem('gcal_token_' + uid); return null; }
    return t.access_token;
  } catch { return null; }
}
function gcalSetToken(uid, access_token, expires_in) {

  }));
}

      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },

// Aplica customizações de aulas salvas (state.aulasCustom) sobre o AULAS_DEF base.
// - renames: { aulaId: 'novo label' }  → renomeia (preserva id, logo preserva presença)
// - extras:  [{id, bloco, label}]      → aulas adicionadas pelo admin (entram no fim)
// É chamada após carregar do Supabase. Muta o array AULAS_DEF in-place (é const, mas o conteúdo é mutável),
// assim os ~39 pontos que leem AULAS_DEF já enxergam os nomes/itens novos sem precisar mudar nada.
function aplicarAulasCustom() {
  try {
    const c = state.aulasCustom;
    if (!c) return;
    // Renomeações
    if (c.renames) {
      AULAS_DEF.forEach(ad => { if (c.renames[ad.id]) ad.label = c.renames[ad.id]; });
    }
    // Aulas extras (adicionadas pelo admin) — evita duplicar se já estiverem no array
    if (Array.isArray(c.extras)) {
      c.extras.forEach(ex => {
        if (!ex || !ex.id) return;
        const blocoNorm = ex.bloco === '11' ? '11' : Number(ex.bloco) || 3;
        if (!AULAS_DEF.some(ad => ad.id === ex.id)) {
          AULAS_DEF.push({ id: ex.id, bloco: blocoNorm, label: ex.label || ex.id,
                           pre:false, pos:false, preName:'', posName:'' });
        } else {
          // já existe → só atualiza label
          const ad = AULAS_DEF.find(a=>a.id===ex.id);
          if (ad && ex.label) ad.label = ex.label;
        }
      });
    }
    // Aulas excluídas pelo admin — remove do array base
    if (Array.isArray(c.deleted)) {
      c.deleted.forEach(id => {
        const idx = AULAS_DEF.findIndex(a=>a.id===id);
        if (idx >= 0) AULAS_DEF.splice(idx, 1);
      });
    }
  } catch(e) { console.warn('aplicarAulasCustom erro:', e.message); }
}

// Renomeia uma aula (preserva id → preserva presença). Persiste em state.aulasCustom.renames.
function renomearAula(id, novoLabel) {
  if (!state.aulasCustom) state.aulasCustom = { renames:{}, extras:[] };
  if (!state.aulasCustom.renames) state.aulasCustom.renames = {};
  state.aulasCustom.renames[id] = novoLabel;
  const ad = AULAS_DEF.find(a=>a.id===id);
  if (ad) ad.label = novoLabel;
  // se for uma aula extra, atualiza o label lá também
  if (state.aulasCustom.extras) {
    const ex = state.aulasCustom.extras.find(e=>e.id===id);
    if (ex) ex.label = novoLabel;
  }
  scheduleSave();
  showToast('Nome atualizado');
  render();
}

// Adiciona uma nova aula no fim da lista. Gera um id único e persiste em state.aulasCustom.extras.
function adicionarAula(label, bloco) {
  if (!state.aulasCustom) state.aulasCustom = { renames:{}, extras:[] };
  if (!Array.isArray(state.aulasCustom.extras)) state.aulasCustom.extras = [];
  // bloco '11' (reunião 1:1) fica string; blocos 1/2/3 viram número, p/ bater com o AULAS_DEF base
  const blocoNorm = bloco === '11' ? '11' : Number(bloco);
  const novoId = 'ax_' + Date.now().toString(36);
  state.aulasCustom.extras.push({ id: novoId, bloco: blocoNorm, label });
  AULAS_DEF.push({ id: novoId, bloco: blocoNorm, label, pre:false, pos:false, preName:'', posName:'' });
  scheduleSave();
  showToast('Aula adicionada');
  render();
}

// Exclui uma aula da lista global. Só permite se NÃO houver presença registrada em nenhuma turma.
// Persiste em state.aulasCustom.deleted para a exclusão sobreviver ao reload.
function excluirAula(id) {
  // trava de segurança: revalida presença
  let comPresenca = 0;
  Object.values(state.presenca||{}).forEach(pt => { if (pt[id]) comPresenca += Object.keys(pt[id]).length; });
  if (comPresenca > 0) { showToast('Não é possível excluir: há presença registrada', 'err'); return; }

  if (!state.aulasCustom) state.aulasCustom = { renames:{}, extras:[], deleted:[] };
  if (!Array.isArray(state.aulasCustom.deleted)) state.aulasCustom.deleted = [];
  if (!state.aulasCustom.deleted.includes(id)) state.aulasCustom.deleted.push(id);
  // se era uma aula extra, remove de extras também
  if (Array.isArray(state.aulasCustom.extras)) state.aulasCustom.extras = state.aulasCustom.extras.filter(e=>e.id!==id);
  // remove do array em memória
  const idx = AULAS_DEF.findIndex(a=>a.id===id);
  if (idx >= 0) AULAS_DEF.splice(idx, 1);
  scheduleSave();
  showToast('Aula excluída');
  render();
}
// Cada turma usa o catálogo global AULAS_DEF, menos as aulas em turma.aulasRemovidas,
// mais as aulas próprias em turma.aulasExtras. Turma sem customização = catálogo global idêntico.
// A presença histórica nunca é apagada (só deixa de ser exibida quando a aula é removida).
function getAulasDaTurma(tid) {
  const t = (typeof tid === 'object') ? tid : state.turmas.find(x=>x.id===tid);
  if (!t) return AULAS_DEF.slice();
  const removidas = t.aulasRemovidas || [];
  const extras = t.aulasExtras || [];
  // base global sem as removidas, preservando a ordem
  let lista = AULAS_DEF.filter(ad => !removidas.includes(ad.id));
  // adiciona as extras da turma (no fim), evitando duplicar ids já presentes
  extras.forEach(ex => {
    if (!ex || !ex.id) return;
    if (!lista.some(a=>a.id===ex.id)) {
      lista.push({ id: ex.id, bloco: (ex.bloco==='11'?'11':Number(ex.bloco)||3), label: ex.label||ex.id,
                   pre:false, pos:false, preName:'', posName:'' });
    }
  });
  // aplica nomes próprios da turma (não muda o id → preserva presença), sem alterar o AULAS_DEF base
  const labels = t.aulasLabels || {};
  if (Object.keys(labels).length) {
    lista = lista.map(ad => labels[ad.id] ? { ...ad, label: labels[ad.id] } : ad);
  }
  return lista;
}
function removerAulaDaTurma(tid, aulaId) {
  const t = state.turmas.find(x=>x.id===tid); if (!t) return;
  if (!t.aulasRemovidas) t.aulasRemovidas = [];
  // se for uma extra da própria turma, remove de extras; senão marca como removida do global
  if (t.aulasExtras && t.aulasExtras.some(e=>e.id===aulaId)) {
    t.aulasExtras = t.aulasExtras.filter(e=>e.id!==aulaId);
  } else if (!t.aulasRemovidas.includes(aulaId)) {
    t.aulasRemovidas.push(aulaId);
  }
  scheduleSave();
}
function restaurarAulaNaTurma(tid, aulaId) {
  const t = state.turmas.find(x=>x.id===tid); if (!t) return;
  if (t.aulasRemovidas) t.aulasRemovidas = t.aulasRemovidas.filter(id=>id!==aulaId);
  scheduleSave();
}
function adicionarAulaNaTurma(tid, label, bloco) {
  const t = state.turmas.find(x=>x.id===tid); if (!t) return;
  if (!t.aulasExtras) t.aulasExtras = [];
  const blocoNorm = bloco === '11' ? '11' : Number(bloco)||3;
  const novoId = 'at_' + Date.now().toString(36);
  t.aulasExtras.push({ id: novoId, bloco: blocoNorm, label });
  scheduleSave();
}
// Renomeia uma aula SÓ nesta turma (preserva id → preserva presença). Persiste em turma.aulasLabels.
function renomearAulaNaTurma(tid, aulaId, novoLabel) {
  const t = state.turmas.find(x=>x.id===tid); if (!t) return;
  if (!t.aulasLabels) t.aulasLabels = {};
  const lbl = (novoLabel||'').trim();
  if (lbl) t.aulasLabels[aulaId] = lbl;
  else delete t.aulasLabels[aulaId]; // vazio → volta ao nome global
  scheduleSave();
}

const ini = n => n.trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
const fmt = d => { if(!d) return '—'; try { return new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'}); } catch { return d; }};
const now = () => new Date().toISOString().slice(0,10);

function getAlunosByTurma(tid) {
  return state.alunos.filter(a => a.turma === tid && a.status !== 'churn' && a.status !== 'inativo');
}
function getTurmaStats(tid) {
  const all    = state.alunos.filter(a => a.turma === tid);
  const ativos = all.filter(a => a.status === 'ativo' || a.status === 'pausado');
  const churnN = all.filter(a => a.status === 'churn').length;
  const pTid   = state.presenca[tid] || {};

  // Compute taxa from live state.presenca
  // Only count aulas that were actually held (at least one aluno has a mark)
  const aulaIds = getAulasDaTurma(tid).filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const heldAulas = aulaIds.filter(id => Object.keys(pTid[id]||{}).length > 0);

  let totalPres = 0;
  ativos.forEach(a => {
    if (!heldAulas.length) return;
    const presentes = heldAulas.filter(id => ['sim','sim2','link'].includes((pTid[id]||{})[a.id])).length;
    totalPres += Math.round(presentes / heldAulas.length * 100);
  });
  const taxa = ativos.length ? Math.round(totalPres / ativos.length) : 0;

  // Risco — use isRisco() which reads from state.presenca + faltaLog
  let risco = 0;
  ativos.forEach(a => { if (isRisco(a)) risco++; });

  return {count: ativos.length, churn: churnN, taxa, risco};
}

function isRisco(a) {
  const {maxFaltas=2, maxConsec=2, maxConsecLink=3} = state.riscoCriteria||{};
  const aulaIds = getAulasDaTurma(a.turma).filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const fLog = state.faltaLog[a.id]||{};
  const faltas = aulaIds.filter(id => (fLog[id]||[]).includes('nao')).length;
  const pTid = state.presenca[a.turma]||{};
  const aulaVals = aulaIds.map(id => (pTid[id]||{})[a.id]||null);
  let consec=0, maxC=0;
  aulaVals.forEach(v=>{if(v==='nao'){consec++;maxC=Math.max(maxC,consec);}else consec=0;});
  let linkC=0, maxLink=0;
  aulaVals.forEach(v=>{if(v==='link'||v==='sim2'){linkC++;maxLink=Math.max(maxLink,linkC);}else linkC=0;});
  // Só flagear planilha se a turma tiver alguma atividade registrada (evitar falso positivo em turmas novas)
  const pTidChurn = state.presenca[a.turma] || {};
  const temPresenca = Object.keys(pTidChurn).some(aid => (pTidChurn[aid]||{})[a.id]);
  const semPlanilha = temPresenca && ((a.planilha_fin_ok===false) || (a.planilha_leads_ok===false));
  return faltas>=maxFaltas || maxC>=maxConsec || maxLink>=maxConsecLink || semPlanilha;
}

function riscoMotivos(a) {
  const {maxFaltas=2, maxConsec=2, maxConsecLink=3} = state.riscoCriteria||{};
  const aulaIds = getAulasDaTurma(a.turma).filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const fLog = state.faltaLog[a.id]||{};
  const pTid = state.presenca[a.turma]||{};
  const aulaVals = aulaIds.map(id => (pTid[id]||{})[a.id]||null);
  const motivos = [];
  const faltas = aulaIds.filter(id => (fLog[id]||[]).includes('nao')).length;
  if (faltas>=maxFaltas) motivos.push(`${faltas} falta${faltas!==1?'s':''} registradas (limite: ${maxFaltas})`);
  let consec=0,maxC=0;
  aulaVals.forEach(v=>{if(v==='nao'){consec++;maxC=Math.max(maxC,consec);}else consec=0;});
  if (maxC>=maxConsec) motivos.push(`${maxC} falta${maxC!==1?'s':''} consecutivas (limite: ${maxConsec})`);
  let linkC=0,maxLink=0;
  aulaVals.forEach(v=>{if(v==='link'||v==='sim2'){linkC++;maxLink=Math.max(maxLink,linkC);}else linkC=0;});
  if (maxLink>=maxConsecLink) motivos.push(`${maxLink} últimas aulas via link/vídeo (limite: ${maxConsecLink})`);
  if (a.planilha_fin_ok===false)   motivos.push('Planilha financeira não enviada');
  if (a.planilha_leads_ok===false) motivos.push('Planilha de leads não enviada');
  return motivos;
}

function showToast(msg, type='ok') {
  state.toast = {msg, type};
  render();
  setTimeout(()=>{state.toast=null; renderToast();}, 3000);
}

// Define o prazo (em dias a partir de hoje) conforme o tipo de tarefa, pelo título.
// Só se aplica quando a tarefa não foi criada com um prazo explícito.
function prazoPorTitulo(t) {
  const tit = (t.titulo || '').toLowerCase();
  // dias a partir de hoje para cada tipo
  let dias = null;
  if (t.tipo === 'enviar-link' || /enviar link/.test(tit))                 dias = 2;   // link → 2 dias
  else if (t.tipo === 'cobrar-video' || /cobrar v[íi]deo|viu a aula|aula online/.test(tit)) dias = 7; // cobrar vídeo → 1 semana
  else if (/^designar respons[áa]vel/.test(tit))                            dias = 10;  // designar responsável → 10 dias
  else if (/mandar forms de onboarding|forms de onboarding/.test(tit))      dias = 3;   // enviar forms → 3 dias
  else if (/marcar 1:1|marcar treinamento da secret/.test(tit))             dias = 3;   // qualquer 1:1 e treinamento secretária → 3 dias
  else if (/marcar reuni[ãa]o/.test(tit))                                    dias = 3;   // reunião individual / onboarding / fin-leads → 3 dias
  if (dias === null) return undefined;
  return addDays(now(), dias);
}

function addTarefa(t) {
  t.id = 'tk_' + Date.now() + Math.random().toString(36).slice(2,6);
  t.done = false;
  t.criada = now();
  // se não veio com prazo, aplica o prazo padrão pelo tipo de tarefa
  if (!t.prazo) {
    const p = prazoPorTitulo(t);
    if (p) t.prazo = p;
  }
  state.tarefas.push(t);
}

// Adia o prazo da tarefa: define novo prazo a partir de HOJE + N dias
function adiarTarefa(taskId, dias) {
  const t = state.tarefas.find(x=>x.id===taskId);
  if (!t) return;
  t.prazo = addDays(now(), parseInt(dias));
  showToast(`Tarefa adiada para ${fmt(t.prazo)}`);
  scheduleSave();
  render();
}

function getMinhasTarefas() {
  if (!state.user) return [];
  const uid = state.user.id;
  return state.tarefas.filter(t => t.responsavel === uid || t.colab === uid);
}

// ═══════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════
let _rafPending = false;
function render() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => {
    _rafPending = false;
    // Save scroll positions of all scrollable containers before re-render
    const scrolls = {};
    document.querySelectorAll('.page-body, .detail-body, .db, .page').forEach(el => {
      if (el.scrollTop > 0) scrolls[el.className.split(' ')[0]] = el.scrollTop;
    });
    document.getElementById('root').innerHTML = buildApp();
    attachEvents();
    // Restore scroll positions after render
    document.querySelectorAll('.page-body, .detail-body, .db, .page').forEach(el => {
      const key = el.className.split(' ')[0];
      if (scrolls[key]) el.scrollTop = scrolls[key];
    });
  });
}

function renderToast() {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  if (state.toast) {
    const el = document.createElement('div');
    el.className = 'toast ' + state.toast.type;
    el.textContent = state.toast.msg;
    document.body.appendChild(el);
  }
}

function buildApp() {

function buildMain() {
  if (state.selTurma) return buildTurmaDetail();
  if (state.page === 'central') return buildCentralPage();
  if (state.page === 'turmas') return buildTurmasPage();
  if (state.page === 'tarefas') return buildTarefasPage();
  if (state.page === 'medicos') return buildMedicosPage();
  if (state.page === 'calendario') return buildCalendarioPage();
  if (state.page === 'admin')          return buildAdminPage();
  if (state.page === 'monitoramento')  return buildMonitoramentoPage();
  if (state.page === 'minhas-reunioes') return buildMinhasReunioesPage();
  if (state.page === 'kanban')  return buildKanbanPage();
  if (state.page === 'turmas-antigas') return buildTurmasAntigasPage();
  if (state.page === 'manual') return buildManualPage();
  return '<div class="page"><div class="empty-state">Página não encontrada</div></div>';
}

function buildTurmasPage() {
  const ativas     = state.turmas.filter(t=>!t.concluida);
  const concluidas = state.turmas.filter(t=> t.concluida);
  const turmasConcluidasIds = new Set(state.turmas.filter(t=>t.concluida).map(t=>t.id));
  const totalAtivos = state.alunos.filter(a=>a.status==='ativo' && !turmasConcluidasIds.has(a.turma)).length;
  const totalChurn  = state.alunos.filter(a=>a.status==='churn').length;
  const totalRisco  = state.alunos.filter(a=>a.status==='ativo'&&isRisco(a)).length;

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Turmas</div>
        <div class="page-sub">${ativas.length} ativa${ativas.length!==1?'s':''}${concluidas.length?` · ${concluidas.length} concluída${concluidas.length!==1?'s':''}`:''}  · ${totalAtivos} alunos ativos</div>
      </div>
      ${isGod() ? `
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" data-action="nova-turma">${I.plus} Nova Turma</button>
        </div>
      ` : ''}
    </div>
    <div class="page-body">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${ativas.length}</div><div class="stat-lbl">Turmas ativas</div></div>
        <div class="stat-card"><div class="stat-val">${totalAtivos}</div><div class="stat-lbl">Alunos ativos</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--amber-t)">${totalRisco}</div><div class="stat-lbl">Em risco de churn</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--red-t)">${totalChurn}</div><div class="stat-lbl">Churn</div></div>
      </div>
      ${ativas.length === 0 ? `<div class="empty-state">${I.turmas}<p>Nenhuma turma ativa</p></div>` : ''}
      ${ativas.map(t => buildTurmaCard(t)).join('')}
      ${concluidas.length > 0 ? `
        <div class="divider"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer" data-toggle-concluidas>
          <div class="section-title" style="margin:0">Concluídas (${concluidas.length})</div>
          <span style="font-size:11px;color:var(--t4)">${state.showConcluidas ? '▲ ocultar' : '▼ mostrar'}</span>
        </div>
        ${state.showConcluidas ? concluidas.map(t => buildTurmaCard(t)).join('') : ''}
      ` : ''}
    </div>
  </div>`;
}

function buildTurmaCard(t) {
  const s = getTurmaStats(t.id);
  const taxaCls = s.taxa>=75?'pill-green':s.taxa>=50?'pill-amber':'pill-red';
  const proxAula = getProxAula(t.id);
  return `
  <div class="turma-card ${t.concluida?'turma-concluida':''}" data-open-turma="${t.id}" style="${t.concluida?'opacity:.7;border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.03)':''}">
    <div class="turma-hdr">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:10px;background:${t.concluida?'rgba(34,197,94,.15)':'var(--brand-dim)'};border:1px solid ${t.concluida?'rgba(34,197,94,.3)':'rgba(99,102,241,.3)'};display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:15px;color:${t.concluida?'var(--green-t)':'var(--brand-h)'}">
          ${t.concluida ? '✓' : t.nome}
        </div>
        <div>
          <div style="font-family:var(--fh);font-weight:600;font-size:16px;color:${t.concluida?'var(--t3)':'var(--t1)'}">Turma ${t.nome}</div>
          <div style="font-size:11.5px;color:var(--t4);margin-top:2px">${s.count} aluno${s.count!==1?'s':''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${t.concluida
          ? `<span class="pill pill-green" style="font-size:11px">✓ Concluída</span>`
          : `<span class="pill ${taxaCls}">${s.taxa}% presença</span>`
        }
        ${isGod() ? `
          <button class="btn btn-xs" style="background:${t.concluida?'var(--red-bg)':'var(--green-bg)'};color:${t.concluida?'var(--red-t)':'var(--green-t)'};border:1px solid ${t.concluida?'var(--red-b)':'rgba(34,197,94,.3)'};z-index:2"
            data-toggle-turma-concluida="${t.id}" onclick="event.stopPropagation()">
            ${t.concluida ? 'Reabrir' : 'Concluir turma'}
          </button>
        ` : ''}
      </div>
    </div>
    <div class="turma-meta">
      <div class="turma-meta-item"><span>Início</span>${t.inicio ? fmt(t.inicio) : '—'}</div>
      <div class="turma-meta-item"><span>Fim previsto</span>${t.fim_previsto ? fmt(t.fim_previsto) : '—'}</div>
      ${!t.concluida ? `
      <div class="turma-meta-item"><span>Próxima aula</span>${proxAula}</div>
      <div class="turma-meta-item"><span>Risco churn</span><span style="color:var(--amber-t)">${s.risco}</span></div>

}

function getProxAula(tid) {
  const marcadas = state.presenca[tid] || {};
  for (const ad of getAulasDaTurma(tid)) {
    if (ad.bloco !== '11' && !Object.keys(marcadas[ad.id]||{}).length) {
      const dateInfo = ((state.aulasDates||{})[tid]||{})[ad.id];
      const label = ad.label.split('—')[0].trim();
      return dateInfo?.data ? `${label} · ${dateInfo.data}` : label;
    }
  }
  return 'Concluída';
}

// Retorna array de 12 meses {ano, mes(0-11), label} a partir do início da turma do médico
// Salva snapshot de presença antes de mudança (para undo)
function pushUndo() {
  const snap = JSON.stringify(state.presenca);
  state._undoStack = state._undoStack || [];
  state._undoStack.push(snap);
  if (state._undoStack.length > 20) state._undoStack.shift(); // máx 20 passos
}

function undoPresenca() {
  if (!state._undoStack || !state._undoStack.length) {
    showToast('Nada para desfazer', 'err');
    return;
  }
  state.presenca = JSON.parse(state._undoStack.pop());
  // Recalcular taxa de todos os alunos
  state.turmas.forEach(t => recalcTaxaPresenca(t.id));
  scheduleSave();
  render();
  showToast('Presença desfeita ✓');
}

function getMesesPlanilha(aluno) {
  const INICIOS_TURMA = {
    T1:'2025-04-16', T2:'2025-06-10', T3:'2025-07-28',
    T4:'2025-09-09', T5:'2025-10-13', T6:'2025-11-11',
    T7:'2026-01-12', T8:'2026-02-10', T9:'2026-03-03',
    T10:'2026-04-13', T11:'2026-06-16'
  };
  // Usar inicio da turma do aluno (via turmaObj ou lookup)
  const turmaObj = (state.turmas||[]).find(t=>t.id===aluno.turma);
  let inicioStr = turmaObj?.inicio || INICIOS_TURMA[aluno.turma] || '';
  if (!inicioStr) return null;
  const d = new Date(inicioStr);
  if (isNaN(d)) return null;
  const MESES_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const meses = [];
  for (let i = 0; i < 12; i++) {
    const m = new Date(d.getFullYear(), d.getMonth() + i, 1);
    meses.push({ ano: m.getFullYear(), mes: m.getMonth(), label: MESES_PT[m.getMonth()] + '/' + String(m.getFullYear()).slice(2) });
  }
  return meses;
}

// Verifica se o médico tem 2+ meses consecutivos sem ok em qualquer planilha
// SÓ dispara se já houve pelo menos 1 ok antes (evita flood ao criar a funcionalidade)
function planilhaEmAlerta(aluno) {
  const ok = aluno.planilhaOk || {};
  const meses = getMesesPlanilha(aluno);
  if (!meses) return false;
  const hoje = new Date();
  for (const tipo of ['fin','leads']) {
    const arr = ok[tipo] || Array(12).fill(false);
    // Só considera se já houve pelo menos 1 ok em algum mês
    const tevePeloMenos1Ok = arr.some(v => v === true);
    if (!tevePeloMenos1Ok) continue;
    let consec = 0;
    for (let i = 0; i < meses.length; i++) {
      const m = meses[i];
      const dataM = new Date(m.ano, m.mes + 1, 1);
      if (dataM > hoje) break;
      if (!arr[i]) {
        consec++;
        if (consec >= 2) return true;
      } else {
        consec = 0;
      }
    }
  }
  return false;
}

function buildCronograma(t, alunos) {
  // Determine which items are "done"
  function isAulaDone(ad) {
    if (ad.bloco === '11') {
      // 1:1 done = all active alunos have a realizada reuniao of this tipo
      // OR have an agendada reuniao cuja data+hora já passou
      if (!alunos.length) return false;
      const nowStr = new Date().toISOString().slice(0,16); // YYYY-MM-DDTHH:MM
      return alunos.every(a => (a.reunioes||[]).some(r => r.tipo===ad.label && (
        r.realizada ||
        (!r.realizada && r.data && r.hora && (r.data + 'T' + r.hora) < nowStr)
      )));
    }
    const pMap = (state.presenca[t.id]||{})[ad.id] || {};
    // Done = every aluno has SOME mark (sim/nao/link/reset) — aula was held
    return alunos.length > 0 && alunos.every(a => ['sim','sim2','nao','link'].includes(pMap[a.id]));
  }

  // Determine if bloco0 is done (todas etapas iniciais para todos os alunos)
  function isBloco0Done() {
    if (!alunos.length) return false;
    const etapas = ['forms','onb','fin'];
    return alunos.every(a => {
      const et = state.etapas[a.id] || {};
      return etapas.every(e => et[e+'_done']);
    });
  }

  const bloco0Done = isBloco0Done();
  const aulasDone = getAulasDaTurma(t.id).map(ad => ({ad, done: isAulaDone(ad)}));

  // Find index of first not-done item (bloco0 counts as index -1)
  let nextIdx = bloco0Done ? 0 : -1;
  if (nextIdx === 0) {
    const firstNotDone = aulasDone.findIndex(x => !x.done);
    nextIdx = firstNotDone; // -1 if all done
  }

  // Build collapsed summary for a done aula
  function buildDoneSummary(ad) {
    const pMap = (state.presenca[t.id]||{})[ad.id] || {};
    const is11 = ad.bloco === '11';
    let summary = '';
    if (is11) {
      const done = alunos.filter(a=>(a.reunioes||[]).some(r=>r.realizada&&r.tipo===ad.label)).length;
      summary = `${done}/${alunos.length} realizados`;
    } else {
      const presentes = alunos.filter(a=>['sim','sim2','link'].includes(pMap[a.id])).length;
      const taxa = alunos.length ? Math.round(presentes/alunos.length*100) : 0;
      summary = `${taxa}% presença`;
    }
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;
      border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;
      background:#fafafa;opacity:.65;cursor:pointer" data-expand-aula="${ad.id}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="color:var(--green);font-size:13px">✓</span>
        <span style="font-size:13px;color:var(--t3);font-family:var(--fh);font-weight:500">${ad.label}</span>
        ${((state.aulasDates||{})[t.id]?.[ad.id]||{}).data ? `<span style="font-size:11px;color:var(--t4)">${((state.aulasDates||{})[t.id][ad.id]||{}).data}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11.5px;color:var(--t4)">${summary}</span>
        <span style="font-size:11px;color:var(--t4)">▼</span>
      </div>
    </div>`;
  }

  // Expanded aulas = next item + any that were manually expanded
  if (!state.expandedAulas) state.expandedAulas = {};
  const expandedKey = t.id;
  if (!state.expandedAulas[expandedKey]) state.expandedAulas[expandedKey] = {};

  function shouldExpand(idx, ad) {
    // Manually toggled always wins
    if (state.expandedAulas[expandedKey][ad.id]) return true;
    // Se a aula foi aberta via botão "Abrir presenças", manter expandida
    if ((state.aulaAberta||{})[t.id+ad.id]) return true;
    // If all done, nothing auto-expands (only manual)
    if (nextIdx === -1) return false;
    // Auto-expand the next undone item
    return idx === nextIdx;
  }

  // Render aulas — full controls for Bruna/god, read-only for others
  const canEditPresenca = true; // todos podem marcar presença
  const aulasHtml = aulasDone.map(({ad, done}, idx) => {
    if (done && !shouldExpand(idx, ad)) return buildDoneSummary(ad);
    return buildAulaSection(t, alunos, ad);
  }).join('');

  const legenda = `
    <div style="background:var(--bg-t);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">Como funciona a presença</div>
      <div style="display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--t3);line-height:1.5">
        <div><span style="display:inline-block;min-width:54px;font-weight:600;color:var(--green-t)">Presente</span> 1 clique = presente ao vivo (P ✓) · 2 cliques = assistiu pela gravação (P ●) · 3 cliques = desmarca</div>
        <div><span style="display:inline-block;min-width:54px;font-weight:600;color:var(--red-t)">Faltou</span> registra a falta (gera tarefa pra Bruna enviar o link da aula)</div>
        <div><span style="display:inline-block;min-width:54px;font-weight:600;color:var(--amber-t)">Link</span> marca que o link da aula foi enviado ao médico</div>
      </div>
    </div>`;

  return `<div>${legenda}${aulasHtml}</div>`;
}
