// KANBAN — Situação das Turmas
// ═══════════════════════════════════════════════════════
function buildKanbanPage() {
  // Find the next undone aula for a turma
  function getNextAula(tid) {
    const pTid = state.presenca[tid] || {};
    const alunos = getAlunosByTurma(tid);
    if (!alunos.length) return null;
    for (const ad of AULAS_DEF) {
      if (ad.bloco === '11') {
        // 1:1s: only block if at least ONE aluno has a scheduled/done reuniao of this type
        // i.e. they are actively in this 1:1 phase
        const anyScheduled = alunos.some(a =>
          (a.reunioes||[]).some(r => r.tipo === ad.label)
        );
        const allDone = alunos.every(a =>
          (a.reunioes||[]).some(r => r.tipo === ad.label && r.realizada)
        );
        // Only show this column if some alunos have it scheduled/done
        // If no one has it, skip (1:1s don't auto-block)
        if (anyScheduled && !allDone) return ad;
        continue;
      }
      // Regular aula: check presença marks
      const pMap = pTid[ad.id] || {};
      const hasAnyMark = alunos.some(a => pMap[a.id]);
      const allDone = hasAnyMark && alunos.every(a => ['sim','sim2','nao','link'].includes(pMap[a.id]));
      const hasNoMark = !hasAnyMark;
      // Next aula = first one with no marks at all (not yet held)
      if (hasNoMark) return ad;
    }
    return null; // all aulas held
  }

  // Map each turma to its next aula id
  const EMPTY_KEY = '__empty__';
  const DONE_KEY  = '__done__';
  const groups = {};

  state.turmas.forEach(t => {
    if (t.concluida) {
      groups[DONE_KEY] = groups[DONE_KEY]||[]; groups[DONE_KEY].push(t); return;
    }
    const alunos = getAlunosByTurma(t.id);
    if (!alunos.length) {
      groups[EMPTY_KEY] = groups[EMPTY_KEY]||[]; groups[EMPTY_KEY].push(t); return;
    }
    const next = getNextAula(t.id);
    const key  = next ? next.id : DONE_KEY;
    groups[key] = groups[key]||[];
    groups[key].push(t);
  });

  const getColor = (ad) =>
    !ad          ? '#64748b' :
    ad.bloco==='11' ? '#a78bfa' :
    ad.bloco===1    ? '#60a5fa' :
    ad.bloco===2    ? '#34d399' : '#fb923c';

  // Build ALL columns in order
  const cols = [
    ...(groups[EMPTY_KEY]?.length ? [{key:EMPTY_KEY, label:'Sem alunos', ad:null}] : []),
    ...AULAS_DEF.map(ad => ({key:ad.id, label:ad.label, ad})),
    {key:DONE_KEY, label:'Concluidas', ad:null},
  ];

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Situação das Turmas</div>
        <div class="page-sub">${state.turmas.length} turmas · próxima aula por turma</div>
      </div>
    </div>
    <div class="page-body" style="padding:20px">
      <div style="display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:12px">
        ${cols.map(col => {
          const turmas = groups[col.key]||[];
          const color  = getColor(col.ad);
          const bg     = color + '18';
          const border = color + '44';
          const hasPre = col.ad?.pre;
          const hasPos = col.ad?.pos;
          return `
          <div style="min-width:190px;width:190px;flex-shrink:0">
            <!-- Header -->
            <div style="padding:10px 12px;border-radius:var(--r2) var(--r2) 0 0;background:${color}28;border:1.5px solid ${border};border-bottom:none">
              <div style="font-family:var(--fh);font-weight:700;font-size:13px;color:${color};line-height:1.35">${col.label}</div>
              ${(hasPre||hasPos) ? `<div style="margin-top:5px;display:flex;flex-direction:column;gap:3px">
                ${hasPre ? `<span style="font-size:10.5px;color:#c7d2fe;display:flex;align-items:center;gap:4px"><span style="font-weight:700">pre:</span> ${col.ad.preName||'material pre-aula'}</span>` : ''}
                ${hasPos ? `<span style="font-size:10.5px;color:#fde68a;display:flex;align-items:center;gap:4px"><span style="font-weight:700">pos:</span> ${col.ad.posName||'material pos-aula'}</span>` : ''}
              </div>` : ''}
              <div style="font-size:11px;color:${color};opacity:.65;margin-top:4px">${turmas.length} turma${turmas.length!==1?'s':''}</div>
            </div>
            <!-- Cards -->
            <div style="background:${bg};border:1.5px solid ${border};border-top:none;border-radius:0 0 var(--r2) var(--r2);padding:8px;min-height:80px">
              ${turmas.length===0
                ? `<div style="font-size:12px;color:var(--t4);text-align:center;padding:18px 0">—</div>`
                : turmas.map(t => {
                    const s = getTurmaStats(t.id);
                    const taxaColor = s.taxa>=75?'#4ade80':s.taxa>=50?'#fde68a':'#fca5a5';
                    const aulaDate = col.ad ? ((state.aulasDates||{})[t.id]?.[col.key]||{}).data : '';
                    return `
                    <div style="background:var(--bg-s);border:1.5px solid ${color}44;border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s"
                         data-open-turma="${t.id}">
                      <div style="font-family:var(--fh);font-weight:800;font-size:20px;color:${color};line-height:1">${t.nome}</div>
                      <div style="font-size:12px;color:var(--t3);margin-top:5px">${s.count} aluno${s.count!==1?'s':''}</div>
                      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">
                        <span style="font-size:14px;font-weight:700;color:${taxaColor}">${s.taxa}%</span>
                        ${s.risco>0?`<span style="font-size:11px;color:#fde68a;font-weight:600">${s.risco} risco</span>`:''}
                      </div>
                      ${(() => {
                        const info = col.ad ? ((state.aulasDates||{})[t.id]?.[col.key]||{}) : {};
                        return `
                          ${info.data ? `<div style="font-size:11px;color:var(--t4);margin-top:5px">${info.data}</div>` : ''}
                          ${info.resp ? `<div style="font-size:11.5px;color:var(--t2);margin-top:4px;font-weight:500">${info.resp}</div>` : ''}
                        `;
                      })()}
                      ${t.inicio?`<div style="font-size:11px;color:var(--t4);margin-top:3px;opacity:.7">${fmt(t.inicio)} → ${t.fim_previsto?fmt(t.fim_previsto):'?'}</div>`:''}
                    </div>`;
                  }).join('')
              }
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}


</script>
</body>
</html>
