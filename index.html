function buildCalendarioPage() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const monthShort = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dayNames = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

  // Init state
  if (!state.calYear)  state.calYear  = today.getFullYear();
  if (!state.calMonth) state.calMonth = today.getMonth();
  if (!state.calView)  state.calView  = 'month';
  if (state.calWeek === undefined) state.calWeek = 0;
  if (!state.calTurmaFilter) state.calTurmaFilter = 'todas';

  const year  = state.calYear;
  const month = state.calMonth;
  const view  = state.calView;

  // Collect all aulas across all turmas
  let allAulas = [];
  state.turmas.forEach(t => {
    const datesMap = state.aulasDates[t.id] || {};
    Object.entries(datesMap).forEach(([aulaId, info]) => {
      if (!info.data) return;
      const def = getAulasDaTurma(t.id).find(a => a.id === aulaId);
      if (!def) return;
      allAulas.push({...def, ...info, turma: t.id, turmaName: t.nome});
    });
  });

  // Apply turma filter
  const filteredAulas = state.calTurmaFilter === 'todas'
    ? allAulas
    : allAulas.filter(a => a.turma === state.calTurmaFilter);

  // Build day→events map
  function buildByDate(aulasList) {
    const map = {};
    aulasList.forEach(a => {
      const d = new Date(a.data + 'T12:00');
      if (d.getFullYear() === year && d.getMonth() === month) {
        const key = d.getDate();
        if (!map[key]) map[key] = [];
        map[key].push(a);
      }
    });
    return map;
  }

  function eventChip(a, size='sm') {
    const fs = size==='lg' ? '11px' : '9.5px';
    const pad = size==='lg' ? '4px 8px' : '2px 5px';
    return `<div style="font-size:${fs};background:${turmaColor(a.turma).bg};color:${turmaColor(a.turma).text};border-radius:3px;padding:${pad};margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.label} — ${a.turmaName}">
      <b>${a.turmaName}</b> ${a.label.split('—')[0].trim()}
    </div>`;
  }

  // ── MONTH VIEW ──────────────────────────────────────────
  function renderMonth() {
    const byDate = buildByDate(filteredAulas);
    const daysInMonth = new Date(year, month+1, 0).getDate();
    let firstDay = new Date(year, month, 1).getDay();
    const pad = firstDay === 0 ? 6 : firstDay - 1;

    let cells = '';
    for (let i = 0; i < pad; i++) cells += '<div style="min-height:80px"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const events  = byDate[d] || [];
      const isPast  = dateStr < todayStr;
      cells += `<div style="min-height:80px;padding:5px 6px;border-radius:6px;border:1px solid ${isToday?'var(--brand-h)':events.length?'rgba(99,102,241,.3)':'var(--border)'};background:${isToday?'var(--brand-dim)':events.length?'rgba(99,102,241,.04)':'transparent'};opacity:${isPast&&!events.length?'.4':'1'}">
        <div style="font-size:11px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--brand-h)':'var(--t4)'};margin-bottom:3px;text-align:right">${d}</div>
        ${events.map(a => eventChip(a)).join('')}
      </div>`;
    }

    return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>`;
  }

  // ── WEEK VIEW ───────────────────────────────────────────
  function renderWeek() {
    const byDate = buildByDate(filteredAulas);
    const daysInMonth = new Date(year, month+1, 0).getDate();
    let firstDay = new Date(year, month, 1).getDay();
    const pad = firstDay === 0 ? 6 : firstDay - 1;

    const allCells = [];
    for (let i = 0; i < pad; i++) allCells.push(null);
    for (let d = 1; d <= daysInMonth; d++) allCells.push(d);
    const totalWeeks = Math.ceil(allCells.length / 7);
    const wk = Math.min(state.calWeek||0, totalWeeks-1);
    const weekCells = allCells.slice(wk*7, wk*7+7);

    const cells = weekCells.map(d => {
      if (!d) return '<div style="min-height:120px;border-radius:6px;border:1px solid var(--border);opacity:.3"></div>';
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const events  = byDate[d] || [];
      const isPast  = dateStr < todayStr;
      return `<div style="min-height:120px;padding:8px;border-radius:6px;border:1px solid ${isToday?'var(--brand-h)':events.length?'rgba(99,102,241,.3)':'var(--border)'};background:${isToday?'var(--brand-dim)':events.length?'rgba(99,102,241,.04)':'transparent'};opacity:${isPast&&!events.length?'.4':'1'}">
        <div style="font-size:13px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--brand-h)':'var(--t2)'};margin-bottom:6px">${d}</div>
        ${events.map(a => eventChip(a,'lg')).join('')}
        ${!events.length?'<div style="font-size:10px;color:var(--t4);margin-top:4px">—</div>':''}
      </div>`;
    }).join('');

    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <button class="btn btn-ghost btn-sm" data-cal-week="-1" ${wk<=0?'disabled':''}>← Anterior</button>
        <span style="font-size:12px;color:var(--t3)">Semana ${wk+1} de ${totalWeeks}</span>
        <button class="btn btn-ghost btn-sm" data-cal-week="1" ${wk>=totalWeeks-1?'disabled':''}>Próxima →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>`;
  }

  // ── DAY VIEW ────────────────────────────────────────────
  function renderDay() {
    if (!state.calDay) state.calDay = todayStr;
    const d = new Date(state.calDay + 'T12:00');
    const events = filteredAulas.filter(a => a.data === state.calDay);
    const dayNames2 = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button class="btn btn-ghost btn-sm" data-cal-day="-1">← Anterior</button>
        <div style="text-align:center">
          <div style="font-family:var(--fh);font-weight:700;font-size:22px;color:var(--t1)">${d.getDate()}</div>
          <div style="font-size:12px;color:var(--t4)">${dayNames2[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getFullYear()}</div>
        </div>
        <button class="btn btn-ghost btn-sm" data-cal-day="1">Próximo →</button>
      </div>
      ${events.length ? events.map(a => `
        <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r2);border:1px solid ${turmaColor(a.turma).bg}44;background:${turmaColor(a.turma).bg}18;margin-bottom:10px">
          <div style="width:44px;height:44px;border-radius:var(--r);background:${turmaColor(a.turma).bg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:13px;font-weight:700;color:${turmaColor(a.turma).text}">${a.turmaName}</span>
          </div>
          <div>
            <div style="font-family:var(--fh);font-weight:600;font-size:14px;color:var(--t1)">${a.label}</div>
            <div style="font-size:12px;color:var(--t4);margin-top:2px">${a.turmaName}</div>
          </div>
        </div>`).join('')
      : `<div class="empty-state">${I.calendar}<p>Nenhuma aula neste dia</p></div>`}`;
  }

  // ── TURMA FILTER OPTIONS ────────────────────────────────
  const turmaOptions = state.turmas.filter(t => {
    const hasDates = Object.values(state.aulasDates[t.id]||{}).some(v=>v.data);
    return hasDates;
  });

  const upcomingAll = filteredAulas.filter(a => a.data >= todayStr).sort((a,b)=>a.data.localeCompare(b.data));

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Calendário de Aulas</div>
        <div class="page-sub">${filteredAulas.length} aula${filteredAulas.length!==1?'s':''} agendada${filteredAulas.length!==1?'s':''}</div>
      </div>
    </div>
    <div class="page-body">

      <!-- Controls -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">

        <!-- Nav + Month title -->
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost btn-sm" data-cal-nav="-1">${I.back}</button>
          <span style="font-family:var(--fh);font-weight:600;font-size:15px;color:var(--t1);min-width:140px;text-align:center">${monthNames[month]} ${year}</span>
          <button class="btn btn-ghost btn-sm" data-cal-nav="1">›</button>
          <button class="btn btn-ghost btn-sm" data-cal-today title="Ir para o mês atual">Hoje</button>
        </div>

        <!-- View toggle -->
        <div class="inner-tabs" style="margin:0">
          <div class="inner-tab ${view==='day'?'active':''}" data-cal-view="day" style="font-size:12px;padding:4px 12px">Dia</div>
          <div class="inner-tab ${view==='week'?'active':''}" data-cal-view="week" style="font-size:12px;padding:4px 12px">Semana</div>
          <div class="inner-tab ${view==='month'?'active':''}" data-cal-view="month" style="font-size:12px;padding:4px 12px">Mês</div>
        </div>

        <!-- Turma filter -->
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--t4)">Turma:</span>
          <select id="cal-turma-filter" class="inp" style="padding:4px 8px;font-size:12px;width:auto">
            <option value="todas" ${state.calTurmaFilter==='todas'?'selected':''}>Todas</option>
            ${turmaOptions.map(t=>`<option value="${t.id}" ${state.calTurmaFilter===t.id?'selected':''}>${t.nome}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- Day headers (not for day view) -->
      ${view !== 'day' ? `
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
        ${dayNames.map(d=>`<div style="font-size:10px;font-weight:600;color:var(--t4);text-align:center;padding:4px 0">${d}</div>`).join('')}
      </div>` : ''}

      <!-- Grid -->
      ${view==='month' ? renderMonth() : view==='week' ? renderWeek() : renderDay()}

      <!-- Upcoming list -->
      ${upcomingAll.length > 0 ? `
      <div class="divider" style="margin-top:24px"></div>
      <div class="section-title" style="margin-bottom:12px">Próximas Aulas</div>
      ${upcomingAll.slice(0,8).map(a => {
        const d = new Date(a.data + 'T12:00');
        return `<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid ${turmaColor(a.turma).bg}44;border-radius:var(--r2);margin-bottom:8px;background:${turmaColor(a.turma).bg}11">
          <div style="width:44px;height:44px;border-radius:var(--r);background:${turmaColor(a.turma).bg};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:16px;font-weight:700;font-family:var(--fh);color:${turmaColor(a.turma).text};line-height:1">${d.getDate()}</span>
            <span style="font-size:9px;color:${turmaColor(a.turma).text};opacity:.8;text-transform:uppercase">${monthShort[d.getMonth()]}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)">${a.label}</div>
            <div style="font-size:12px;color:var(--brand-h);margin-top:2px">${a.turmaName}</div>
          </div>
          <span style="font-size:12px;color:var(--t4);flex-shrink:0">${a.data}</span>
        </div>`;
      }).join('')}
      ${upcomingAll.length > 8 ? `<div style="text-align:center;font-size:12.5px;color:var(--t4);padding:8px">+ ${upcomingAll.length-8} mais</div>` : ''}
      ` : `<div class="divider" style="margin-top:24px"></div><div class="empty-state" style="padding:24px 0">${I.calendar}<p>Nenhuma aula agendada</p></div>`}

    </div>
  </div>`;
}

function buildAdminPage() {
  const tabs = [
    {id:'visao-geral',  label:'Visão Geral'},
    {id:'perfis',       label:'Perfis & Usuários'},
    {id:'turmas-adm',   label:'Turmas'},
    {id:'medicos-adm',  label:'Médicos'},
    ...(isYgor()   ? [{id:'relatorio',    label:'Relatório de Acesso'}] : []),
    ...(isYgor()   ? [{id:'aulas-adm',    label:'Aulas'}] : []),
    ...(isBruna()  ? [{id:'monitoramento',label:'Monitoramento de Status'}] : []),
    ...(isMedInt() ? [{id:'minhas-reunioes',label:'Minhas Reuniões'}] : []),
  ];
  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Administração</div>
        <div class="page-sub">Controle total da plataforma</div>
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(t=>`<div class="tab ${state.adminTab===t.id?'active':''}" data-admin-tab="${t.id}">${t.label}</div>`).join('')}
    </div>
    <div class="page-body">
      ${state.adminTab==='visao-geral'  ? buildAdminGeral()    : ''}
      ${state.adminTab==='perfis'       ? buildAdminPerfis()   : ''}
      ${state.adminTab==='turmas-adm'   ? buildAdminTurmas()   : ''}
      ${state.adminTab==='medicos-adm'  ? buildAdminMedicos()  : ''}
      ${state.adminTab==='relatorio'      ? buildAdminRelatorio()   : ''}
      ${state.adminTab==='aulas-adm'       ? buildAdminAulas()       : ''}
      ${state.adminTab==='monitoramento'   ? buildAdminMonitoramento(): ''}
    </div>
  </div>`;
}

// ── Visão Geral ──
function buildAdminGeral() {
  const totalAlunos  = state.alunos.length;
  const ativos       = state.alunos.filter(a=>a.status==='ativo').length;
  const churn        = state.alunos.filter(a=>a.status==='churn').length;
  const pausado      = state.alunos.filter(a=>a.status==='pausado').length;
  const semPlanilha  = state.alunos.filter(a=>!a.link_fin||!a.link_leads).length;
  const turmasCount  = state.turmas.length;
  const tarefasPend  = state.tarefas.filter(t=>!t.done).length;

  // Last access per user from stats
  const recentUsers = Object.entries(state.accessStats?.lastAccess || {})
    .map(([uid, ts]) => ({ uid, ts, name: (state.accessStats?.byUser?.[uid]?.name || uid) }))
    .sort((a, b) => b.ts.localeCompare(a.ts))
    .slice(0, 5);

  return `
  <div>
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-val">${totalAlunos}</div><div class="stat-lbl">Total alunos</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${ativos}</div><div class="stat-lbl">Ativos</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${pausado}</div><div class="stat-lbl">Pausados</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${churn}</div><div class="stat-lbl">Churn</div></div>
    </div>
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-val">${turmasCount}</div><div class="stat-lbl">Turmas</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${tarefasPend}</div><div class="stat-lbl">Tarefas pendentes</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${semPlanilha}</div><div class="stat-lbl">Sem planilhas</div></div>
    </div>

    <div class="divider"></div>
    <div class="section-title">Último Acesso por Pessoa</div>
    ${recentUsers.length===0 ? '<div style="color:var(--t4);font-size:13px">Nenhuma atividade registrada ainda.</div>' : ''}
    ${recentUsers.map(u => {
      const dt = new Date(u.ts);
      const time = dt.toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:var(--brand-h);flex-shrink:0">${u.name.charAt(0)}</div>
        <div style="flex:1">
          <span style="font-weight:500;color:var(--t1)">${u.name}</span>
        </div>
        <span style="font-size:11.5px;color:var(--t4)">${time}</span>
      </div>`;
    }).join('')}

  </div>`;
}

// ── Médicos Admin ──
function buildAdminMedicos() {
  const rc = state.riscoCriteria||{maxFaltas:2, maxConsec:2, maxConsecLink:3};
  const q = (state.searchAdminMedicos||'').toLowerCase();
  const lista = q
    ? state.alunos.filter(a =>
        a.nome.toLowerCase().includes(q) ||
        (a.turma||'').toLowerCase().includes(q) ||
        (a.responsavel||'').toLowerCase().includes(q) ||
        (a.status||'').toLowerCase().includes(q)
      )
    : state.alunos;
  return `
  <div>

function buildAdminRelatorio() {
  const stats    = state.accessStats || { byUser: {}, byPage: {}, lastAccess: {} };
  const userStats = Object.entries(stats.byUser || {})
    .map(([id, d]) => ({ id, ...d }))
    .filter(u => u.total > 0)
    .sort((a, b) => b.total - a.total);
  const totalAcessos = userStats.reduce((s, u) => s + u.total, 0) || 1;

  const pageStats = Object.entries(stats.byPage || {}).sort((a, b) => b[1] - a[1]);
  const totalPages = pageStats.reduce((s, [, v]) => s + v, 0) || 1;

  const pageLabels = {
    turmas: 'Turmas', tarefas: 'Tarefas', medicos: 'Médicos',
    calendario: 'Calendário', admin: 'Admin', monitoramento: 'Monitoramento',
    'minhas-reunioes': 'Minhas Reuniões', kanban: 'Kanban', login: 'Login'
  };

  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div class="section-title" style="margin:0">Relatório de Uso</div>
      <span class="pill pill-gray" style="font-size:11px">${totalAcessos} acessos registrados</span>
    </div>

    ${userStats.length === 0 ? `<div class="empty-state" style="padding:24px 0"><p>Nenhum acesso registrado ainda</p></div>` : `

    <!-- Por usuário -->
    <div class="section-title" style="margin-bottom:12px">Uso por pessoa</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:28px">
      ${userStats.map(u => {
        const pct = Math.round(u.total / totalAcessos * 100);
        const topPage = Object.entries(u.pages||{}).sort((a,b)=>b[1]-a[1])[0];
        return `
        <div style="padding:12px 16px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg-s)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:30px;height:30px;border-radius:50%;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--brand-h)">${u.name.charAt(0)}</div>
              <span style="font-weight:600;color:var(--t1)">${u.name}</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              ${topPage ? `<span style="font-size:11px;color:var(--t4)">Mais usa: <b style="color:var(--t2)">${pageLabels[topPage[0]]||topPage[0]}</b></span>` : ''}
              <span style="font-size:13px;font-weight:700;color:var(--brand-h)">${pct}%</span>
            </div>
          </div>
          <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--brand-h);border-radius:3px;transition:width .3s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Por aba -->
    <div class="section-title" style="margin-bottom:12px">Uso por funcionalidade</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${pageStats.map(([page, cnt]) => {
        const pct = Math.round(cnt / totalPages * 100);
        return `
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:13px;color:var(--t2);width:140px;flex-shrink:0">${pageLabels[page]||page}</span>
          <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--brand-h);border-radius:3px"></div>
          </div>
          <span style="font-size:12px;color:var(--t4);width:40px;text-align:right">${pct}%</span>
        </div>`;
      }).join('')}
    </div>
    `}
  </div>`;
}

function buildModalEditTurma(t) {
  const datas = state.aulasDates[t.id] || {};
  const aulasT = getAulasDaTurma(t.id);
  // ponto de corte: Etapa 1 vai até a "Aula 9" (id a9) inclusive; depois é Etapa 2.
  let idxCorte = aulasT.findIndex(ad => ad.id === 'a9');
  if (idxCorte === -1) idxCorte = aulasT.length - 1; // se a turma não tem a9, joga tudo na Etapa 1

  const linhaAula = (ad) => {
    const info = datas[ad.id] || {};

    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">

    </div>`;
  };

  const etapa1 = aulasT.slice(0, idxCorte + 1).map(linhaAula).join('');

  const linhasAulas = `

      <div class="modal-body-scroll">
        <div class="field"><label class="lbl">Nome</label><input class="inp" id="et-nome" value="${t.nome}"></div>
        <div class="field-row">
          <div class="field"><label class="lbl">Início</label><input class="inp" type="date" id="et-inicio" value="${t.inicio||''}"></div>
          <div class="field"><label class="lbl">Término previsto</label><input class="inp" type="date" id="et-fim" value="${t.fim_previsto||''}"></div>
        </div>

        <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;font-weight:600;color:var(--t1)">Cronograma de aulas</div>
          <button class="btn btn-ghost btn-xs" data-recalc-cronograma="${t.id}" title="Reagenda todas a cada 2 semanas a partir do Início">↻ Recalcular automático</button>

async function salvarEditProfile(el) {
  const pid = el.dataset.profileId;
  const p = state.profiles.find(x=>x.id===pid);
  if (!p) return;
  p.name  = document.getElementById('ep-nome')?.value.trim()  || p.name;
  p.email = document.getElementById('ep-email')?.value.trim() || p.email;
  const senha = document.getElementById('ep-senha')?.value;
  const pp = PROFILES.find(x=>x.id===pid);
  if (pp) { pp.name = p.name; pp.email = p.email; }

  if (senha && senha.length >= 6 && p.email) {
    try {
      await sbRequest('/auth/v1/signup', 'POST', { email: p.email, password: senha });
      p.hasPassword = true;
      if (pp) pp.hasPassword = true;
      showToast(`Senha definida para ${p.name}`, 'ok');
    } catch(e) {
      if (e.message?.includes('already registered')) {
        showToast(`Email já cadastrado — senha não alterada`, 'err');
      } else {
        showToast('Erro ao definir senha: ' + e.message, 'err');
      }
    }
  }

  state.modal = null;
  scheduleSave();
  if (!senha) showToast('Usuário atualizado');
  render();
}

async function salvarNovoUsuario() {
  const nome  = document.getElementById('nu-nome')?.value.trim();
  const email = document.getElementById('nu-email')?.value.trim();
  const senha = document.getElementById('nu-senha')?.value;
  const role  = document.getElementById('nu-role')?.value || 'consultor';
  if (!nome) return showToast('Nome é obrigatório', 'err');
  const id = nome.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') + '_' + Date.now().toString().slice(-4);
  const novoPerfil = {id, name:nome, email: email||'', role, hasPassword: false};

  if (senha && senha.length >= 6 && email) {
    try {
      await sbRequest('/auth/v1/signup', 'POST', { email, password: senha });
      novoPerfil.hasPassword = true;
    } catch(e) {
      showToast('Erro ao criar senha: ' + e.message, 'err');
    }
  }

  state.profiles.push(novoPerfil);
  if (!PROFILES.find(p=>p.id===id)) PROFILES.push({id, name:nome, email: email||'', hasPassword: novoPerfil.hasPassword});
  if (role === 'consultor' && !RESPONSAVEIS.includes(nome)) RESPONSAVEIS.push(nome);
  state.modal = null;
  scheduleSave();
  showToast(`${nome} adicionado`, 'ok');
  render();
}

function salvarEditTurma(el) {
  const tid = el.dataset.turmaId;
  const t = state.turmas.find(x=>x.id===tid);
  if (!t) return;
  t.nome         = document.getElementById('et-nome')?.value.trim()  || t.nome;
  t.inicio       = document.getElementById('et-inicio')?.value       || '';
  t.fim_previsto = document.getElementById('et-fim')?.value          || '';
  // Salva a data de cada aula (preservando resp/aux/hora) e o nome próprio da aula nesta turma
  if (!state.aulasDates[tid]) state.aulasDates[tid] = {};
  getAulasDaTurma(tid).forEach(ad => {
    const campo = document.getElementById('et-data-'+ad.id);
    if (campo) {
      const novaData = campo.value || '';
      const atual = state.aulasDates[tid][ad.id] || {};
      if (novaData) state.aulasDates[tid][ad.id] = { ...atual, data: novaData };
      else if (atual.data) state.aulasDates[tid][ad.id] = { ...atual, data: '' };
    }
    // nome próprio da aula nesta turma
    const campoLabel = document.getElementById('et-label-'+ad.id);
    if (campoLabel) {
      const novoLabel = campoLabel.value.trim();
      // label "base" da aula (global se existir; senão, o da aula extra da turma)
      const adGlobal = AULAS_DEF.find(a=>a.id===ad.id);
      let labelBase;
      if (adGlobal) labelBase = adGlobal.label;
      else {
        const ex = (t.aulasExtras||[]).find(e=>e.id===ad.id);
        labelBase = ex ? ex.label : ad.id;
      }
      if (novoLabel && novoLabel !== labelBase) {
        renomearAulaNaTurma(tid, ad.id, novoLabel); // cria/atualiza override
      } else {
        renomearAulaNaTurma(tid, ad.id, ''); // igual ao base ou vazio → remove override
      }
    }
  });
  state.modal = null;
  showToast('Turma atualizada');
  scheduleSave();
  render();
}

// Recalcula o cronograma da turma: agenda cada aula de conteúdo a cada 14 dias a partir do Início.
function recalcularCronograma(tid) {
  const t = state.turmas.find(x=>x.id===tid);
  if (!t) return;
  const inicio = document.getElementById('et-inicio')?.value || t.inicio || '';
  // sem data de início válida não dá pra calcular — avisa em vez de zerar tudo
  if (!inicio || !/^\d{4}-\d{2}-\d{2}$/.test(inicio)) {
    showToast('Preencha o campo "Início" primeiro para recalcular', 'err');
    return;
  }
  if (!confirm('Isso vai reagendar TODAS as aulas a cada 14 dias a partir do início, substituindo as datas atuais. Continuar?')) return;
  const aulaOrder = getAulasDaTurma(tid).filter(a=>a.bloco!=='11');
  aulaOrder.forEach((ad, i) => {
    const novaData = addDays(inicio, i * 14);
    const campo = document.getElementById('et-data-'+ad.id);
    if (campo) campo.value = novaData; // atualiza o input na tela (salva só ao clicar Salvar)
  });
  showToast('Datas recalculadas — confira e clique em Salvar');
}

let _importPending = [];

function processarImport() {
  if (!_importPending.length) return;
  let added=0, updated=0;
  _importPending.forEach(row => {
    const existing = state.alunos.find(a=>a.nome.trim().toLowerCase()===row.nome.trim().toLowerCase());
    if (existing) {
      Object.assign(existing, row);
      updated++;
    } else {
      const ep={};AULAS_DEF.forEach(a=>ep[a.label]=null);
      state.alunos.push({...row, id:'a_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        taxa_presenca:0, progress:ep, reunioes:[], notas:'', log_cs:'', status:'ativo'});

    }
  });
  _importPending = [];
  state.modal = null;
  scheduleSave();
  showToast(`${added} adicionados, ${updated} atualizados`);
  render();
}

function parseImportFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1});
      // Find header row (contains 'Nome')
      let hdr=-1;
      for(let i=0;i<Math.min(raw.length,10);i++){
        if(raw[i]&&raw[i].some(v=>String(v||'').trim()==='Nome')){hdr=i;break;}
      }
      if(hdr<0){showToast('Coluna "Nome" não encontrada','err');return;}
      const headers = raw[hdr].map(h=>String(h||'').trim());
      const get=(row,col)=>{const i=headers.indexOf(col);return i>=0?String(row[i]||'').trim():'';};
      _importPending = [];
      for(let i=hdr+1;i<raw.length;i++){
        const row=raw[i]; if(!row||!row.length) continue;
        const nome=get(row,'Nome'); if(!nome) continue;
        const turmaRaw=get(row,'Turma');
        const status = ['Churn','churn'].includes(turmaRaw)?'churn':['Pausado','pausado'].includes(turmaRaw)?'pausado':'-'===turmaRaw?'inativo':'ativo';
        const turma  = ['Churn','Pausado','-',''].includes(turmaRaw)?'':turmaRaw;
        const resp   = get(row,'Responsável Engenheiro')||get(row,'Responsável')||'';
        _importPending.push({nome, turma, status,
          responsavel: resp, especialidade:'', clinica:'', cidade:'',
          cep:'', endereco:'', whatsapp:'', instagram:'', cpf:'',
          nascimento:'', turnos:'', media_atend:'', preco_consulta:'',
          realiza_proc:'', desc_proc:'', convenios:'', desc_conv:'',
          outros_vinculos:'', inicio:'', fim_previsto:'', link_fin:'', link_leads:''});
      }
      // Show preview
      const preview = document.getElementById('import-preview');
      const count   = document.getElementById('import-preview-count');
      const list    = document.getElementById('import-preview-list');
      const btn     = document.getElementById('import-confirm-btn');
      if(preview&&count&&list&&btn){
        preview.style.display='block';
        count.textContent=`${_importPending.length} médicos encontrados`;
        list.innerHTML=_importPending.slice(0,10).map(r=>`
          <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
            <span style="color:var(--t1);font-weight:500;flex:1">${r.nome}</span>
            <span style="color:var(--t4)">${r.turma||'—'}</span>
            <span style="color:var(--brand-h)">${r.responsavel||'—'}</span>
          </div>`).join('')+(_importPending.length>10?`<div style="color:var(--t4);font-size:11.5px;padding:6px 0">...e mais ${_importPending.length-10}</div>`:'');
        btn.disabled=false; btn.style.opacity='1';
      }
    } catch(err){showToast('Erro ao ler arquivo: '+err.message,'err');}
  };
  reader.readAsBinaryString(file);
}


function buildDetailOKRs(a) {
  if (!a.okrs) a.okrs = [];
  const now_d  = new Date();
  const curMes = now_d.getMonth();
  const curAno = now_d.getFullYear();
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mesKey = `${curAno}-${String(curMes+1).padStart(2,'0')}`;

  // Performance chart — last 6 months
  const chartMonths = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(curAno, curMes-i, 1);
    chartMonths.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label:months[d.getMonth()]});
  }
  const monthScores = {};
  a.okrs.forEach(okr => {
    (okr.kpis||[]).forEach(kpi => {
      (kpi.meses||[]).forEach(m => {
        if (!monthScores[m.key]) monthScores[m.key]={total:0,done:0};
        monthScores[m.key].total++;
        if (m.done) monthScores[m.key].done++;
      });
    });
  });

  return `
  <div>
    <!-- Mini bar chart -->
    <div class="section-title" style="margin-bottom:10px">Desempenho Mensal</div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:72px;margin-bottom:22px">
      ${chartMonths.map(m => {
        const sc  = monthScores[m.key];
        const pct = sc&&sc.total ? Math.round(sc.done/sc.total*100) : 0;
        const col = pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
        const h   = Math.max(pct*0.55, pct?3:0);
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
          <div style="font-size:10px;color:var(--t4);min-height:14px">${pct?pct+'%':''}</div>
          <div style="width:100%;height:${h}px;border-radius:3px;background:${col}"></div>
          <div style="font-size:10px;color:var(--t4)">${m.label}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Metas header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-title" style="margin:0">Metas</div>
      <button class="btn btn-primary btn-sm" data-action="novo-okr" data-aluno-id="${a.id}">${I.plus} Nova Meta</button>
    </div>

    ${a.okrs.length===0 ? `
      <div class="empty-state" style="padding:20px 0"><p>Nenhuma meta cadastrada ainda</p></div>
    ` : ''}

    ${a.okrs.map((okr, oi) => {
      const totalKpis = (okr.kpis||[]).length;
      const doneKpis  = (okr.kpis||[]).filter(k => k.meses?.some(m=>m.key===mesKey&&m.done)).length;
      const pct = totalKpis ? Math.round(doneKpis/totalKpis*100) : 0;
      const pctColor = pct>=80?'var(--green-t)':pct>=50?'var(--amber-t)':'var(--red-t)';
      return `
      <div style="border:1px solid var(--border2);border-radius:var(--r2);margin-bottom:14px;overflow:hidden">
        <!-- Meta header -->
        <div style="padding:13px 16px;background:var(--bg-t);display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--fh);font-weight:600;font-size:14px;color:var(--t1);line-height:1.4">${okr.objetivo}</div>
            ${totalKpis ? `
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
                <div style="flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden">
                  <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:2px;transition:width .3s"></div>
                </div>
                <span style="font-size:11.5px;font-weight:600;color:${pctColor}">${doneKpis}/${totalKpis} este mês</span>

          <div style="display:flex;gap:5px;flex-shrink:0">

          </div>
        </div>

        <!-- KPIs list -->
        ${(okr.kpis||[]).length===0 ? `
          <div style="padding:10px 16px;font-size:12.5px;color:var(--t4)">Nenhum KPI — clique em "+ KPI" para adicionar</div>
        ` : (okr.kpis||[]).map((kpi, ki) => {

let _importTurmasPending = [];

function processarImportTurmas() {
  if (!_importTurmasPending.length) return;
  let turmasAdded=0, turmasExist=0, medAdded=0, medUpdated=0;

  _importTurmasPending.forEach(row => {
    // Create turma if not exists
    if (row.turma) {
      if (!state.turmas.find(t=>t.id===row.turma)) {
        state.turmas.push({id:row.turma, nome:row.turma, inicio:'', fim_previsto:'', concluida:false, engeId:''});
        turmasAdded++;
      } else {
        turmasExist++;
      }
    }
    // Create or update medico
    const existing = state.alunos.find(a=>a.nome.trim().toLowerCase()===row.nome.trim().toLowerCase());
    if (existing) {
      if (row.turma)       existing.turma       = row.turma;
      if (row.responsavel) existing.responsavel  = row.responsavel;
      if (row.status)      existing.status       = row.status;
      // Import presença
      if (row.turma && row.presencaRow && Object.keys(row.presencaRow).length) {
        if (!state.presenca[row.turma]) state.presenca[row.turma] = {};
        Object.entries(row.presencaRow).forEach(([aulaId, val]) => {
          if (!state.presenca[row.turma][aulaId]) state.presenca[row.turma][aulaId] = {};
          state.presenca[row.turma][aulaId][existing.id] = val;
          if (val==='nao') { if(!state.faltaLog[existing.id])state.faltaLog[existing.id]={}; if(!state.faltaLog[existing.id][aulaId])state.faltaLog[existing.id][aulaId]=[]; if(!state.faltaLog[existing.id][aulaId].includes('nao'))state.faltaLog[existing.id][aulaId].push('nao'); }
        });
      }
      // Import etapas
      if (row.etapasRow && Object.keys(row.etapasRow).length) {
        if (!state.etapas[existing.id]) state.etapas[existing.id] = {};
        Object.assign(state.etapas[existing.id], row.etapasRow);
      }
      medUpdated++;
    } else {
      const ep={}; AULAS_DEF.forEach(a=>ep[a.label]=null);
      state.alunos.push({...row, id:'a_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        especialidade:'', clinica:'', cidade:'', cep:'', endereco:'', whatsapp:'',
        instagram:'', cpf:'', nascimento:'', turnos:'', media_atend:'', preco_consulta:'',
        realiza_proc:'', desc_proc:'', convenios:'', desc_conv:'', outros_vinculos:'',
        inicio:'', fim_previsto:'', link_fin:'', link_leads:'',
        taxa_presenca:0, progress:ep, reunioes:[], notas:'', log_cs:'', okrs:[]});
      medAdded++;
    }
  });

  // Sort turmas by number
  state.turmas.sort((a,b)=>{
    const na=parseInt(a.id.replace(/\D/g,''))||0, nb=parseInt(b.id.replace(/\D/g,''))||0;
    return na-nb;
  });

  // Recalculate taxa_presenca for all alunos
  state.alunos.forEach(a => {
    const pTid = state.presenca[a.turma]||{};
    const aulaIds = getAulasDaTurma(a.turma).filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
    const realized = aulaIds.filter(id => Object.keys(pTid[id]||{}).length > 0);
    if (!realized.length) return;
    const presentes = realized.filter(id => ['sim','sim2','link'].includes((pTid[id]||{})[a.id])).length;
    a.taxa_presenca = Math.round(presentes/realized.length*100);
  });
  _importTurmasPending = [];
  state.modal = null;
  scheduleSave();
  const totalPres = Object.values(state.presenca).reduce((s,t)=>s+Object.values(t).reduce((s2,a)=>s2+Object.keys(a).length,0),0);
  showToast(`${turmasAdded} turmas · ${medAdded} adicionados · ${medUpdated} atualizados · ${totalPres} presenças`);
  render();
}

function parsePlanilhaTurmas(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1});
      // Find header row
      let hdr=-1;
      for(let i=0;i<Math.min(raw.length,10);i++){
        if(raw[i]&&raw[i].some(v=>String(v||'').trim()==='Nome')){hdr=i;break;}
      }
      if(hdr<0){showToast('Coluna "Nome" não encontrada','err');return;}
      const headers = raw[hdr].map(h=>String(h||'').trim());
      const get=(row,col)=>{const i=headers.indexOf(col);return i>=0?String(row[i]||'').trim():'';};

      _importTurmasPending = [];
      for(let i=hdr+1;i<raw.length;i++){
        const row=raw[i]; if(!row||!row.length) continue;
        const nome=get(row,'Nome'); if(!nome) continue;
        const turmaRaw=get(row,'Turma');
        const status=['Churn','churn'].includes(turmaRaw)?'churn':['Pausado','pausado'].includes(turmaRaw)?'pausado':'-'===turmaRaw?'inativo':'ativo';
        const turma=['Churn','Pausado','-',''].includes(turmaRaw)?'':turmaRaw;
        const resp=get(row,'Responsável Engenheiro')||get(row,'Responsável')||'';
        // Read presença for each aula
        const presencaRow = {};
        const etapasRow   = {};
        Object.entries(PLANILHA_AULA_MAP).forEach(([col, aulaId]) => {
          const i = headers.indexOf(col);
          if (i < 0) return;
          const vRaw = (row[i]!==undefined && row[i]!==null) ? String(row[i]).trim() : '';
          const v = vRaw.normalize('NFC');
          if (v==='Sim'||v==='sim'||v==='S') presencaRow[aulaId]='sim';
          else if (v==='Não'||v==='Nao'||v==='não'||v==='nao'||v==='N'||v==='não') presencaRow[aulaId]='nao';
          else if (v==='Link'||v==='link'||v==='L') presencaRow[aulaId]='link';
        });
        // Read etapas (bloco 0)
        Object.entries(PLANILHA_ETAPA_MAP).forEach(([col, etapaId]) => {
          const i = headers.indexOf(col);
          if (i < 0) return;
          const vE = (row[i]!==undefined && row[i]!==null) ? String(row[i]).trim().normalize('NFC') : '';
          if (vE==='Sim'||vE==='sim'||vE==='S') etapasRow[etapaId+'_done']=true;
        });
        _importTurmasPending.push({nome, turma, status, responsavel:resp, presencaRow, etapasRow});
      }

      // Build preview grouped by turma
      const byTurma={};
      _importTurmasPending.forEach(r=>{
        const t=r.turma||'Sem turma';
        if(!byTurma[t]) byTurma[t]=[];
        byTurma[t].push(r);
      });

      const preview=document.getElementById('import-turmas-preview');
      const count=document.getElementById('import-turmas-count');
      const list=document.getElementById('import-turmas-list');
      const btn=document.getElementById('import-turmas-confirm');
      if(preview&&count&&list&&btn){
        preview.style.display='block';
        const turmasNovas = Object.keys(byTurma).filter(t=>t!=='Sem turma'&&!state.turmas.find(x=>x.id===t));
        count.textContent=`${_importTurmasPending.length} médicos · ${Object.keys(byTurma).filter(t=>t!=='Sem turma').length} turmas (${turmasNovas.length} novas)`;
        list.innerHTML=Object.entries(byTurma).slice(0,8).map(([t,alunos])=>`
          <div style="padding:6px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:12px;font-weight:600;color:var(--brand-h);margin-bottom:3px">
              ${t} ${turmasNovas.includes(t)?'<span style="color:var(--green-t);font-size:10px">* nova</span>':''}
            </div>
            <div style="font-size:11.5px;color:var(--t4)">${alunos.slice(0,3).map(a=>a.nome.split(' ')[0]).join(', ')}${alunos.length>3?` +${alunos.length-3}`:''}</div>
          </div>`).join('');
        btn.disabled=false; btn.style.opacity='1';
      }
    } catch(err){showToast('Erro: '+err.message,'err');}
  };
  reader.readAsBinaryString(file);
}

// isRisco only for presença (excludes planilhas)
function isRiscoPresenca(a) {
  const {maxFaltas=2, maxConsec=2, maxConsecLink=3} = state.riscoCriteria||{};
  const aulaIds = getAulasDaTurma(a.turma).filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const fLog = state.faltaLog[a.id]||{};
  const faltas = aulaIds.filter(id => (fLog[id]||[]).includes('nao')).length;
  const pTid = state.presenca[a.turma]||{};
  const aulaVals = aulaIds.map(id => (pTid[id]||{})[a.id]||null);
  let consec=0,maxC=0; aulaVals.forEach(v=>{if(v==='nao'){consec++;maxC=Math.max(maxC,consec);}else consec=0;});
  let linkC=0,maxLink=0; aulaVals.forEach(v=>{if(v==='link'||v==='sim2'){linkC++;maxLink=Math.max(maxLink,linkC);}else linkC=0;});
  return faltas>=maxFaltas || maxC>=maxConsec || maxLink>=maxConsecLink;
}

// Recalculate taxa_presenca for all alunos in a turma from live state.presenca
function recalcTaxaPresenca(tid) {
  if (!tid) return;
  const pTid   = state.presenca[tid] || {};
  const aulaIds = getAulasDaTurma(tid).filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const held   = aulaIds.filter(id => Object.keys(pTid[id]||{}).length > 0);
  state.alunos.filter(a=>a.turma===tid).forEach(a => {
    if (!held.length) { a.taxa_presenca = 0; return; }
    const presentes = held.filter(id => ['sim','sim2','link'].includes((pTid[id]||{})[a.id])).length;
    a.taxa_presenca = Math.round(presentes / held.length * 100);
  });
}

async function init() {
  // Carrega profiles do Supabase antes de renderizar a tela de login
  // para que novos usuários criados apareçam imediatamente
  try {
    const rows = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=data');
    if (rows && rows[0]?.data?.profiles) {
      const dbProfiles = rows[0].data.profiles;
      dbProfiles.forEach(p => {
        if (!state.profiles.find(x=>x.id===p.id)) {
          state.profiles.push(p);
        } else {
          const existing = state.profiles.find(x=>x.id===p.id);
          existing.name       = p.name;
          existing.email      = p.email||'';
          existing.hasPassword = p.hasPassword||false;
        }
        if (!PROFILES.find(x=>x.id===p.id)) {
          PROFILES.push({id:p.id, name:p.name, email:p.email||'', hasPassword:p.hasPassword||false});
        } else {
          const pp = PROFILES.find(x=>x.id===p.id);
          pp.name       = p.name;
          pp.email      = p.email||'';
          pp.hasPassword = p.hasPassword||false;
        }
      });
    }
  } catch(e) {
    console.warn('init: erro ao carregar profiles', e.message);
  }
  render();
}

// KANBAN — Situação das Turmas
// ═══════════════════════════════════════════════════════
function buildKanbanPage() {
  // Coluna da turma = aula seguinte à ÚLTIMA aula preenchida (não o primeiro buraco no meio)
  function getNextAula(tid) {
    const pTid = state.presenca[tid] || {};
    const alunos = getAlunosByTurma(tid);
    if (!alunos.length) return null;
    const aulas = getAulasDaTurma(tid);

    // helper: uma aula "tem marca" se algum aluno tem presença registrada nela
    const temMarca = (ad) => {
      if (ad.bloco === '11') {
        return alunos.some(a => (a.reunioes||[]).some(r => r.tipo === ad.label));
      }
      const pMap = pTid[ad.id] || {};
      return alunos.some(a => pMap[a.id]);
    };

    // acha o índice da ÚLTIMA aula que tem marca
    let ultimaComMarca = -1;
    aulas.forEach((ad, i) => { if (temMarca(ad)) ultimaComMarca = i; });

    // nenhuma aula preenchida ainda → próxima é a primeira aula de conteúdo
    if (ultimaComMarca === -1) {
      return aulas.find(ad => ad.bloco !== '11') || null;
    }

    // próxima aula = a primeira DEPOIS da última preenchida (pulando buracos no meio)
    for (let i = ultimaComMarca + 1; i < aulas.length; i++) {
      const ad = aulas[i];
      if (ad.bloco === '11') {
        // 1:1: só vira coluna se algum aluno já tem essa reunião agendada e nem todos concluíram
        const anyScheduled = alunos.some(a => (a.reunioes||[]).some(r => r.tipo === ad.label));
        const allDone = alunos.every(a => (a.reunioes||[]).some(r => r.tipo === ad.label && r.realizada));
        if (anyScheduled && !allDone) return ad;
        continue;
      }
      return ad; // primeira aula de conteúdo após a última preenchida
    }
    return null; // já passou da última aula → concluída
  }

  // Map each turma to its next aula id
  const EMPTY_KEY = '__empty__';
  const DONE_KEY  = '__done__';
  const groups = {};

  state.turmas.forEach(t => {
    if (t.concluida) {
      groups[DONE_KEY] = groups[DONE_KEY]||[]; groups[DONE_KEY].push(t); return;
    }
    const alunos = getAlunosByTurma(t.id);
    if (!alunos.length) {
      groups[EMPTY_KEY] = groups[EMPTY_KEY]||[]; groups[EMPTY_KEY].push(t); return;
    }
    const next = getNextAula(t.id);
    const key  = next ? next.id : DONE_KEY;
    groups[key] = groups[key]||[];
    groups[key].push(t);
  });

  const getColor = (ad) =>
    !ad          ? '#6b7280' :
    ad.bloco==='11' ? '#7c3aed' :
    ad.bloco===1    ? '#2563eb' :
    ad.bloco===2    ? '#059669' : '#d97706';

  // Build ALL columns in order
  const cols = [
    ...(groups[EMPTY_KEY]?.length ? [{key:EMPTY_KEY, label:'Sem alunos', ad:null}] : []),
    ...AULAS_DEF.map(ad => ({key:ad.id, label:ad.label, ad})),
    {key:DONE_KEY, label:'Concluidas', ad:null},
  ];

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Situação das Turmas</div>
        <div class="page-sub">${state.turmas.length} turmas · próxima aula por turma</div>
      </div>
    </div>
    <div class="page-body" style="padding:20px">
      <div style="display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:12px">
        ${cols.map(col => {
          const turmas = groups[col.key]||[];
          const color  = getColor(col.ad);
          const bg     = color + '18';
          const border = color + '44';
          const hasPre = col.ad?.pre;
          const hasPos = col.ad?.pos;
          return `
          <div style="min-width:190px;width:190px;flex-shrink:0">
            <!-- Header -->
            <div style="padding:10px 12px;border-radius:var(--r2) var(--r2) 0 0;background:${color}28;border:1.5px solid ${border};border-bottom:none">
              <div style="font-family:var(--fh);font-weight:700;font-size:13px;color:${color};line-height:1.35">${col.label}</div>
              ${(hasPre||hasPos) ? `<div style="margin-top:5px;display:flex;flex-direction:column;gap:3px">
                ${hasPre ? `<span style="font-size:10.5px;color:#3730a3;display:flex;align-items:center;gap:4px"><span style="font-weight:700">pre:</span> ${col.ad.preName||'material pre-aula'}</span>` : ''}
                ${hasPos ? `<span style="font-size:10.5px;color:#92400e;display:flex;align-items:center;gap:4px"><span style="font-weight:700">pos:</span> ${col.ad.posName||'material pos-aula'}</span>` : ''}
              </div>` : ''}
              <div style="font-size:11px;color:${color};opacity:.65;margin-top:4px">${turmas.length} turma${turmas.length!==1?'s':''}</div>
            </div>
            <!-- Cards -->
            <div style="background:${bg};border:1.5px solid ${border};border-top:none;border-radius:0 0 var(--r2) var(--r2);padding:8px;min-height:80px">
              ${turmas.length===0
                ? `<div style="font-size:12px;color:var(--t4);text-align:center;padding:18px 0">—</div>`
                : turmas.map(t => {
                    const s = getTurmaStats(t.id);
                    const taxaColor = s.taxa>=75?'#059669':s.taxa>=50?'#d97706':'#dc2626';
                    const aulaDate = col.ad ? ((state.aulasDates||{})[t.id]?.[col.key]||{}).data : '';
                    return `
                    <div style="background:#fff;border:1.5px solid ${color}55;border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)"
                         data-open-turma="${t.id}">
                      <div style="font-family:var(--fh);font-weight:800;font-size:20px;color:${color};line-height:1">${t.nome}</div>
                      <div style="font-size:12px;color:#6b7280;margin-top:5px">${s.count} aluno${s.count!==1?'s':''}</div>
                      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">
                        <span style="font-size:14px;font-weight:700;color:${taxaColor}">${s.taxa}%</span>
                        ${s.risco>0?`<span style="font-size:11px;color:#d97706;font-weight:600">${s.risco} risco</span>`:''}
                      </div>
                      ${(() => {
                        const info = col.ad ? ((state.aulasDates||{})[t.id]?.[col.key]||{}) : {};
                        return `
                          ${info.data ? `<div style="font-size:11px;color:var(--t4);margin-top:5px">${info.data}</div>` : ''}
                          ${info.resp ? `<div style="font-size:11.5px;color:var(--t2);margin-top:4px;font-weight:500">${info.resp}</div>` : ''}
                        `;
                      })()}
                      ${t.inicio?`<div style="font-size:11px;color:var(--t4);margin-top:3px;opacity:.7">${fmt(t.inicio)} → ${t.fim_previsto?fmt(t.fim_previsto):'?'}</div>`:''}
                    </div>`;
                  }).join('')
              }
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

      section(h2('4. Importar Dados') + p('Em Admin, há opção de importar médicos e turmas via planilha Excel. Colunas: <strong>Nome, Turma, Responsável</strong> (+ Especialidade, Cidade, WhatsApp opcionais).')),

      section(h2('5. Aba Aulas — Editar Nomes') + p('Em <strong>Admin → Aulas</strong>, você pode renomear qualquer aula — o novo nome reflete em todas as turmas automaticamente. Também é possível adicionar novas aulas ao final da lista.') + tip('Renomear uma aula mantém toda a presença já registrada — nada é perdido.')),

      section(h2('6. Relatório de Acesso') + p('Em <strong>Admin → Relatório de Acesso</strong>, veja quais usuários estão usando a plataforma, com que frequência e qual aba mais acessam.')),

      section(h2('7. Critérios de Risco de Churn') + p('Em <strong>Monitoramento de Status</strong>, ajuste os critérios que definem um médico em risco:') + li([
        '<strong>Máx. faltas</strong> — total de faltas permitidas',
        '<strong>Máx. consecutivas</strong> — faltas seguidas',
        '<strong>Máx. links seguidos</strong> — aulas só pela gravação',
      ])),

      section(h2('Atalhos') + li([
        '<strong>ESC</strong> — fecha qualquer painel ou modal',
        '<strong>Ctrl+Z / Cmd+Z</strong> — desfaz última marcação de presença',
        'Lixeira nas tarefas — exclui permanentemente',
        'Clicar no nome do aluno na presença — abre o perfil',
      ])),
    ].join(''),
  };

  return `
  <div class="overlay" id="modal-overlay" style="align-items:stretch;padding:0;background:rgba(96,0,156,.15)">
    <div style="background:#fff;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div>
          <div style="font-family:var(--fh);font-size:20px;font-weight:700;color:var(--brand)">Manual de Uso</div>
          <div style="font-size:12.5px;color:var(--t4);margin-top:2px">Guia por perfil de usuário</div>
        </div>
        <button class="btn-icon" data-close-modal>${I.x}</button>
      </div>
      <div style="display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 32px">
        ${tabs.map(t=>`<div class="tab ${tab===t.id?'active':''}" style="cursor:pointer" data-manual-tab="${t.id}">${t.label}</div>`).join('')}
      </div>
      <div style="flex:1;overflow-y:auto;padding:32px;max-width:800px;width:100%;margin:0 auto">
        ${content[tab]||''}
      </div>
    </div>
  </div>`;
}


function buildCentralPage() {
  const u = state.user;
  const hoje = now();
  const fim7 = addDays(hoje, 7);
  const filtro = state.centralFiltro || '7dias';

  // --- TAREFAS ---
  const minhasTarefas = getMinhasTarefas();
  const tarefasSemana = minhasTarefas.filter(t => {
    if (t.done) return false;
    if (filtro === 'pendentes') return true;
    return t.prazo && t.prazo >= hoje && t.prazo <= fim7;
  }).sort((a,b)=>(a.prazo||'z').localeCompare(b.prazo||'z'));

  // --- AULAS DA SEMANA ---
  const DIAS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const MESES_PT2 = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const aulasSemana = [];
  for (const t of state.turmas.filter(t2=>!t2.concluida)) {
    for (const ad of getAulasDaTurma(t.id)) {
      if (ad.bloco === '11') continue;
      const info = ((state.aulasDates||{})[t.id]||{})[ad.id];
      if (!info?.data) continue;
      if (info.data >= hoje && info.data <= fim7) {
        aulasSemana.push({turma: t, ad, info});
      }
    }
  }
  aulasSemana.sort((a,b)=>(a.info.data||'').localeCompare(b.info.data||''));

  // --- REUNIÕES DA SEMANA ---
  const reunioesSemana = [];
  for (const a of state.alunos) {
    for (const r of (a.reunioes||[])) {
      if (r.realizada) continue;
      if (!r.data) continue;
      if (filtro === '7dias' && (r.data < hoje || r.data > fim7)) continue;
      if (filtro === 'pendentes' && r.data < hoje) continue;
      // Só minhas reuniões (responsavel ou colab)
      const respId = PROFILES.find(p=>p.name===a.responsavel)?.id;
      if (!isGod() && !isBruna() && respId !== u?.id) continue;
      reunioesSemana.push({aluno: a, reu: r});
    }
  }
  reunioesSemana.sort((a,b)=>(a.reu.data||'').localeCompare(b.reu.data||''));

  // --- Formatar data ---
  function fmtDia(d) {
    if (!d) return '—';
    const dt = new Date(d+'T12:00');
    return `${DIAS_PT[dt.getDay()]}, ${dt.getDate()} ${MESES_PT2[dt.getMonth()]}`;
  }

  // --- RENDER ---
  const greeting = () => {
    const h = new Date().getHours();
    if (h < 12) return 'Bom dia';
    if (h < 18) return 'Boa tarde';
    return 'Boa noite';
  };

  const pillTarefa = (t) => {
    const atrasada = t.prazo && t.prazo < hoje;
    const urgente = t.prazo && t.prazo <= addDays(hoje,2);
    if (atrasada) return '<span class="pill pill-red" style="font-size:10px">Atrasada</span>';
    if (urgente)  return '<span class="pill pill-amber" style="font-size:10px">Urgente</span>';
    return t.prazo ? `<span class="pill pill-gray" style="font-size:10px">${fmtDia(t.prazo)}</span>` : '';
  };

  return `
  <div class="page">
    <div class="page-hdr" style="padding-bottom:12px">
      <div>
        <div class="page-title">${greeting()}, ${u?.name?.split(' ')[0]||''}! 👋</div>
        <div class="page-sub">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn ${filtro==='7dias'?'btn-primary':'btn-ghost'} btn-sm" data-central-filtro="7dias">Próximos 7 dias</button>
        <button class="btn ${filtro==='pendentes'?'btn-primary':'btn-ghost'} btn-sm" data-central-filtro="pendentes">Todos pendentes</button>
      </div>
    </div>
    <div class="page-body" style="padding-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

      <!-- TAREFAS -->
      <div>
        <div class="section-title" style="margin-bottom:12px">Tarefas (${tarefasSemana.length})</div>
        ${tarefasSemana.length === 0 ? `
          <div style="padding:24px;text-align:center;color:var(--t4);font-size:13px;background:#fff;border:1px solid var(--border);border-radius:var(--r2)">
            Nenhuma tarefa ${filtro==='7dias'?'para os próximos 7 dias':'pendente'} 🎉
          </div>
        ` : tarefasSemana.map(t => `
          <div style="padding:12px 14px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;background:#fff;display:flex;align-items:flex-start;gap:10px">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                ${t.alunoNome ? `<span style="color:var(--brand-h);cursor:pointer;font-weight:600" data-open-aluno="${t.alunoId}" data-open-tab="reunioes">${t.alunoNome}</span> —` : ''}
                ${t.titulo}
              </div>
              <div style="margin-top:5px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                ${pillTarefa(t)}
                ${t.responsavel !== u?.id ? `<span style="font-size:11px;color:var(--amber-t)">↩ de ${PROFILES.find(p=>p.id===t.responsavel)?.name||t.responsavel}</span>` : ''}
              </div>
            </div>
            <div class="task-check ${t.done?'done':''}" data-toggle-task="${t.id}" style="flex-shrink:0;margin-top:2px"></div>
          </div>
        `).join('')}
      </div>

      <!-- COLUNA DIREITA: aulas + reuniões -->
      <div>
        <!-- AULAS -->
        <div class="section-title" style="margin-bottom:12px">Aulas da semana (${aulasSemana.length})</div>
        ${aulasSemana.length === 0 ? `
          <div style="padding:24px;text-align:center;color:var(--t4);font-size:13px;background:#fff;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:20px">
            Nenhuma aula nos próximos 7 dias
          </div>
        ` : aulasSemana.map(({turma: t2, ad, info}) => `
          <div style="padding:12px 14px;border:1px solid var(--border);border-left:3px solid var(--brand);border-radius:var(--r2);margin-bottom:8px;background:#fff;cursor:pointer" data-nav-turma="${t2.id}">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--t1)">${ad.label.split('—').slice(1).join('—').trim()||ad.label}</div>
                <div style="font-size:12px;color:var(--t4);margin-top:2px">Turma ${t2.nome} · ${info.hora||'Horário a definir'}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:12px;font-weight:600;color:var(--brand)">${fmtDia(info.data)}</div>
                ${info.resp ? `<div style="font-size:11px;color:var(--t4);margin-top:2px">${info.resp}</div>` : ''}
              </div>
            </div>
          </div>
        `).join('')}

        <!-- REUNIÕES -->
        <div class="section-title" style="margin-top:20px;margin-bottom:12px">Reuniões (${reunioesSemana.length})</div>
        ${reunioesSemana.length === 0 ? `
          <div style="padding:24px;text-align:center;color:var(--t4);font-size:13px;background:#fff;border:1px solid var(--border);border-radius:var(--r2)">
            Nenhuma reunião ${filtro==='7dias'?'para os próximos 7 dias':'pendente'}
          </div>
        ` : reunioesSemana.map(({aluno: a2, reu}) => `
          <div style="padding:12px 14px;border:1px solid var(--border);border-left:3px solid #06D4D4;border-radius:var(--r2);margin-bottom:8px;background:#fff;cursor:pointer" data-open-aluno="${a2.id}" data-open-tab="reunioes">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--t1)">${a2.nome.split(' ').slice(0,2).join(' ')}</div>
                <div style="font-size:12px;color:var(--t4);margin-top:2px">${reu.tipo||'Reunião'} ${reu.hora?'· '+reu.hora:''}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:12px;font-weight:600;color:#06D4D4">${fmtDia(reu.data)}</div>
                <div style="font-size:11px;color:var(--t4);margin-top:2px">Turma ${a2.turma||'—'}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>

    </div>
  </div>`;
}

</script>
</body>
</html>
