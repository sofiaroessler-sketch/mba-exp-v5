        <div class="prog-bar"><div class="prog-fill ${taxa>=75?'hi':taxa>=50?'mid':'lo'}" style="width:${taxa}%"></div></div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildAlunosTurma(t, alunos) {
  const rc = state.riscoCriteria||{maxFaltas:2, maxConsec:2, maxConsecLink:3};
  return `
  <div>
    <!-- Critérios de risco -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:13px;color:var(--t4)">${alunos.length} aluno${alunos.length!==1?'s':''} na turma</div>
      <div style="display:flex;gap:8px">
        ${isGod() || isBruna() ? `<button class="btn btn-ghost btn-sm" data-action="alocar-existente-turma">${I.userIcon} Adicionar existente</button>` : ''}
        ${isGod() ? `<button class="btn btn-primary btn-sm" data-action="novo-medico-turma">${I.plus} Novo Médico</button>` : ''}
      </div>
    </div>
    ${alunos.length===0 ? `<div class="empty-state"><p>Nenhum aluno nesta turma</p></div>` : ''}
    ${alunos.map(a => buildMedicoCard(a, false)).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════
// TAREFAS PAGE
// ═══════════════════════════════════════════════════════
function buildTarefasPage() {
  if (!state.tarefaFilter) state.tarefaFilter = 'pendentes';
  const minhas = getMinhasTarefas();
  const pendentes = minhas.filter(t=>!t.done);
  const feitas    = minhas.filter(t=>t.done);
  const urgentes   = pendentes.filter(t=>t.prazo&&t.prazo<=addDays(now(),3));
  const showing   = state.tarefaFilter === 'pendentes' ? pendentes : state.tarefaFilter === 'urgentes' ? urgentes : minhas;

  // Group pending by type for Bruna
  const linkTasks  = pendentes.filter(t=>t.tipo==='enviar-link');
  const videoTasks = pendentes.filter(t=>t.tipo==='cobrar-video');
  const outrasTasks= pendentes.filter(t=>!t.tipo||!['enviar-link','cobrar-video'].includes(t.tipo));

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Tarefas</div>
        <div class="page-sub">${pendentes.length} pendente${pendentes.length!==1?'s':''}</div>
      </div>
      <button class="btn btn-primary" data-action="nova-tarefa">${I.plus} Nova Tarefa</button>
    </div>
    <div style="padding:0 26px 10px;display:flex;gap:6px;flex-shrink:0">
      <div class="inner-tab ${state.tarefaFilter==='pendentes'?'active':''}" data-tarefa-filter="pendentes" style="cursor:pointer">Pendentes (${pendentes.length})</div>
      <div class="inner-tab ${state.tarefaFilter==='urgentes'?'active':''}" data-tarefa-filter="urgentes" style="cursor:pointer">Urgentes (${pendentes.filter(t=>t.prazo&&t.prazo<=addDays(now(),3)).length})</div>
      <div class="inner-tab ${state.tarefaFilter==='todas'?'active':''}" data-tarefa-filter="todas" style="cursor:pointer">Todas (${pendentes.length})</div>
    </div>
    <div class="page-body" style="padding-top:8px">
      ${state.tarefaFilter==='pendentes' && pendentes.length===0 ? `<div class="empty-state" style="padding:32px 0">${I.tasks}<p>Nenhuma tarefa pendente </p></div>` : ''}
      ${state.tarefaFilter==='pendentes' && isBruna() && (linkTasks.length||videoTasks.length) ? `
        ${linkTasks.length ? `
          <div style="font-size:11px;font-weight:600;color:var(--amber-t);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px"> Enviar Link (${linkTasks.length})</div>
          ${linkTasks.map(t=>buildTarefaItem(t,false)).join('')}
          <div class="divider"></div>` : ''}
        ${videoTasks.length ? `
          <div style="font-size:11px;font-weight:600;color:var(--brand-h);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px"> Cobrar Vídeo (${videoTasks.length})</div>
          ${videoTasks.map(t=>buildTarefaItem(t,false)).join('')}
          <div class="divider"></div>` : ''}
        ${outrasTasks.length ? `
          <div style="font-size:11px;font-weight:600;color:var(--t4);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Outras (${outrasTasks.length})</div>
          ${outrasTasks.map(t=>buildTarefaItem(t,false)).join('')}` : ''}
      ` : state.tarefaFilter==='pendentes' ? pendentes.map(t=>buildTarefaItem(t,false)).join('') : ''}
      ${state.tarefaFilter==='todas' ? `
        ${pendentes.map(t=>buildTarefaItem(t,false)).join('')}
        ${feitas.length>0 ? `<div class="divider"></div><div class="section-title" style="margin-bottom:10px">Concluídas</div>${feitas.slice(0,20).map(t=>buildTarefaItem(t,true)).join('')}` : ''}
      ` : ''}
    </div>
  </div>`;
}

function buildTarefaItem(t, done) {
  return `
  <div class="task-item" style="${done?'opacity:.55':''}">
    <div class="task-check ${done?'done':''}" data-toggle-task="${t.id}">
      ${done ? `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:500;font-size:13px;color:var(--t1);${done?'text-decoration:line-through;color:var(--t4)':''}">
        ${t.alunoNome ? `<span style="color:var(--brand-h);cursor:pointer" data-open-aluno="${t.alunoId}" data-open-tab="${(t.tipo==='enviar-forms'||t.tipo==='verificar-forms'||t.titulo?.startsWith('Mandar forms')||t.titulo?.startsWith('Verificar recebimento'))?'etapas':'reunioes'}">${t.alunoNome}</span> — ` : ''}${t.titulo}
      </div>
      <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
        ${t.prazo ? `<span style="font-size:11.5px;color:${t.prazo<=now()?'var(--red-t)':t.prazo<=addDays(now(),3)?'var(--amber-t)':'var(--t4)'}">${fmt(t.prazo)}${t.hora?' · '+t.hora:''}${t.prazo<=now()?' · vencida':''}` + '</span>' : ''}
        ${t.colab && t.colab!==state.user?.id ? `<span style="font-size:11.5px;color:var(--brand-h)">👥 Conjunto com ${PROFILES.find(p=>p.id===t.colab)?.name||t.colab}</span>` : ''}
        ${t.responsavel!==state.user?.id ? `<span style="font-size:11.5px;color:var(--amber-t)">↩ de ${PROFILES.find(p=>p.id===t.responsavel)?.name||t.responsavel}</span>` : ''}
      </div>
      ${t.descricao ? `<div style="font-size:12px;color:var(--t4);margin-top:4px">${t.descricao}</div>` : ''}
      ${!done ? `
      <div style="display:flex;gap:5px;margin-top:7px;align-items:center">
        <span style="font-size:10.5px;color:var(--t4)">Adiar:</span>
        <button class="btn btn-ghost btn-xs" data-adiar-task="${t.id}" data-adiar-dias="1">+1 dia</button>
        <button class="btn btn-ghost btn-xs" data-adiar-task="${t.id}" data-adiar-dias="3">+3 dias</button>
        <button class="btn btn-ghost btn-xs" data-adiar-task="${t.id}" data-adiar-dias="7">+1 semana</button>
      </div>` : ''}
    </div>
    <button class="btn-icon" data-del-tarefa="${t.id}" title="Excluir tarefa" style="flex-shrink:0;color:var(--t4);opacity:.5;width:24px;height:24px">${I.trash}</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// MÉDICOS PAGE
// ═══════════════════════════════════════════════════════
function buildMedicosPage() {
  // Default to 'meus' for consultores/medicos so they see their alunos first
  if (!state.filtroMedicosSet && !isGod() && !isBruna()) {
    state.filtroMedicos = 'meus';
    state.filtroMedicosSet = true;
  }
  const _turmasConclIds = new Set(state.turmas.filter(t=>t.concluida).map(t=>t.id));
  let lista = state.alunos.filter(a => !_turmasConclIds.has(a.turma));
  const uid = state.user?.id;

  // Filter
  if (state.filtroMedicos === 'meus') {
    if (isMedInt()) {
      // Médicos internos: veem alunos onde têm reuniões como responsável
      lista = lista.filter(a => (a.reunioes||[]).some(r => r.responsavelId === state.user?.id));
    } else {
      lista = lista.filter(a => a.responsavel?.toLowerCase() === state.user?.name?.toLowerCase());
    }
  } else if (state.filtroMedicos === 'risco') {
    lista = lista.filter(a => a.status==='ativo' && isRisco(a));
  } else if (state.filtroMedicos === 'churn') {
    lista = lista.filter(a => a.status==='churn');
  } else if (state.filtroMedicos === 'novos') {
    lista = lista.filter(a => a.status==='ativo' && !a.responsavel);
  }

  if (state.filtroEspecialidade && state.filtroEspecialidade !== 'todas') {
    lista = lista.filter(a => (a.especialidade||'').trim().toLowerCase() === state.filtroEspecialidade.trim().toLowerCase());
  }

  if (state.filtroTurma && state.filtroTurma !== 'todas') {
    lista = lista.filter(a => a.turma === state.filtroTurma);
  }

  // Search applies to all tabs
  if (state.searchMedicos) {
    const q = state.searchMedicos.toLowerCase();
    lista = lista.filter(a =>
      a.nome.toLowerCase().includes(q) ||
      (a.especialidade||'').toLowerCase().includes(q) ||
      (a.turma||'').toLowerCase().includes(q) ||
      (a.cidade||'').toLowerCase().includes(q) ||
      (a.responsavel||'').toLowerCase().includes(q)
    );
  }

  const novosCount = state.alunos.filter(a => a.status==='ativo' && !a.responsavel).length;

  const filtros = [
    {id:'todos', label:'Todos'},
    {id:'meus', label:'Meus'},
    {id:'novos', label:`Novos${novosCount>0?' ('+novosCount+')':''}`},
    {id:'risco', label:'Em risco'},
    {id:'churn', label:'Churn'},
  ];

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Médicos</div>
        <div class="page-sub">${lista.length} de ${state.alunos.filter(a=>!_turmasConclIds.has(a.turma)).length} alunos</div>
      </div>
      <div style="display:flex;gap:8px">
        ${isGod() ? `<button class="btn btn-primary" data-action="novo-medico">${I.plus} Novo Médico</button>` : ''}
      </div>
    </div>
    <div style="padding:0 26px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0">
      <div class="inner-tabs" style="margin:0">
        ${filtros.map(f=>`<div class="inner-tab ${state.filtroMedicos===f.id?'active':''}" data-filtro="${f.id}">${f.label}</div>`).join('')}
      </div>
      <select class="inp" style="padding:4px 8px;font-size:12px;width:auto" onchange="state.filtroEspecialidade=this.value;render()">
        <option value="todas" ${(state.filtroEspecialidade||'todas')==='todas'?'selected':''}>Todas especialidades</option>
        ${ESPECIALIDADES.map(s=>`<option value="${s}" ${state.filtroEspecialidade===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select class="inp" style="padding:4px 8px;font-size:12px;width:auto" onchange="state.filtroTurma=this.value;render()">
        <option value="todas" ${(state.filtroTurma||'todas')==='todas'?'selected':''}>Todas as turmas</option>
        ${state.turmas.map(t=>`<option value="${t.id}" ${state.filtroTurma===t.id?'selected':''}>${t.nome}</option>`).join('')}
      </select>
      <div style="margin-left:auto;position:relative">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t4);display:flex">${I.search}</span>
        <input class="inp" id="search-medicos" placeholder="Buscar..." value="${state.searchMedicos}" style="padding-left:32px;width:200px;padding-top:7px;padding-bottom:7px">
      </div>
    </div>
    <div class="page-body" style="padding-top:8px">
      ${lista.length > 0 ? `
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;padding:8px 16px;margin-bottom:2px;border-bottom:1px solid var(--border);background:var(--bg-s);border-radius:var(--r) var(--r) 0 0">
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Nome</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Turma</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Resp. Médico</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Resp. Consultor</div>
        <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase">Presença</div>
      </div>` : ''}
      ${lista.length === 0 ? `<div class="empty-state">${I.medicos}<p>Nenhum médico encontrado</p></div>` : ''}
      ${lista.map(a => buildMedicoCard(a, true)).join('')}
    </div>
  </div>`;
}

function buildMedicoCard(a, clickable=true) {
  const r = a.status==='ativo' && isRisco(a);
  const nc = a.status==='churn'?'#c084fc':r?'var(--amber-t)':'var(--t1)';
  const taxaCls = a.taxa_presenca>=75?'pill-green':a.taxa_presenca>=50?'pill-amber':'pill-red';
  // Find médico interno responsável (from reunioes)
  const reuIndiv = (a.reunioes||[]).find(r=>r.tipo==='Reunião Individual'||r.tipo==='Reunião de Onboarding');
  const medInt = reuIndiv?.responsavelId ? (PROFILES.find(p=>p.id===reuIndiv.responsavelId)?.name||'') : '';
  const respEng = a.responsavel||'—';
  return `
  <div class="card ${clickable?'card-click':''}" style="margin-bottom:6px;padding:12px 16px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;align-items:center;gap:12px" ${clickable?`data-open-aluno="${a.id}"`:''}">
    <div>
      <div style="font-family:var(--fh);font-weight:600;font-size:14px;color:${nc}">${a.nome}</div>
      <div style="font-size:12px;color:var(--t4);margin-top:2px">${a.especialidade||'—'}</div>
    </div>
    <div style="font-size:13px;color:var(--brand-h);font-weight:500">${a.turma||'—'}</div>
    <div style="font-size:12.5px;color:var(--t2)">${medInt||'—'}</div>
    <div style="font-size:12.5px;color:var(--t2)">${respEng}</div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <span class="pill ${taxaCls}" style="font-size:10.5px">${a.taxa_presenca}%</span>
      ${a.status!=='ativo'?`<span class="pill ${a.status==='churn'?'pill-red':a.status==='pausado'?'pill-amber':'pill-gray'}" style="font-size:10px">${a.status}</span>`:''}
      ${r?`<span class="pill pill-amber" style="font-size:10px">!</span>`:''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// DETAIL PANEL (ALUNO)
// ═══════════════════════════════════════════════════════
function buildDetailPanel() {
  const a = state.alunos.find(x=>x.id===state.selAluno);
  if (!a) return '';
  const tabs = ['info','etapas','aulas','onboarding','reunioes','okrs','notas'];
  const tabLabels = {info:'Informações',etapas:'Etapas Iniciais',aulas:'Aulas',onboarding:'Onboarding',reunioes:'Reuniões',okrs:'OKRs & KPIs',notas:'Notas'};
  return `
  <div class="detail-overlay" data-close-panel></div>
  <div class="detail-panel">
    <div class="detail-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:13px;color:var(--brand-h)">${ini(a.nome)}</div>
        <div>
          <div style="font-family:var(--fh);font-weight:600;font-size:15px;color:var(--t1)">${a.nome}</div>
          <div style="font-size:11.5px;color:var(--t4);margin-top:1px;display:flex;gap:6px;align-items:center">
            ${a.turma?`<span style="color:var(--brand-h)">${a.turma}</span>`:''}
            <span class="pill ${a.status==='ativo'?'pill-green':a.status==='churn'?'pill-red':a.status==='pausado'?'pill-amber':'pill-gray'}" style="font-size:10px">${a.status}</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-icon" data-action="editar-aluno" title="Editar">${I.edit}</button>
        <button class="btn-icon" data-close-panel title="Fechar">${I.x}</button>
      </div>
    </div>
    <div class="detail-tabs">
      ${tabs.map(t=>`<div class="detail-tab ${state.alunoTab===t?'active':''}" data-aluno-tab="${t}">${tabLabels[t]}</div>`).join('')}
    </div>
    <div class="detail-body">
      ${state.alunoTab==='info' ? buildDetailInfo(a) : ''}
      ${state.alunoTab==='etapas' ? buildDetailEtapas(a) : ''}
      ${state.alunoTab==='aulas' ? buildDetailAulas(a) : ''}
      ${state.alunoTab==='onboarding' ? buildDetailOnboarding(a) : ''}
      ${state.alunoTab==='reunioes' ? buildDetailReunioes(a) : ''}
      ${state.alunoTab==='okrs'  ? buildDetailOKRs(a)  : ''}
      ${state.alunoTab==='notas' ? buildDetailNotas(a) : ''}
    </div>
  </div>`;
}

function buildDetailOnboarding(a) {
  if (!Array.isArray(a.onboardingCards)) a.onboardingCards = [];
  const cards = a.onboardingCards;
  const editId = state.obEditId; // card em edição
  const ico = (t)=> /mapeados/i.test(t) && !/n[ãa]o/i.test(t) ? '✅'
    : /n[ãa]o mapeados/i.test(t) ? '🚧'
    : /dados/i.test(t) ? '👤'
    : /situa/i.test(t) ? '💼'
    : /v[íi]nculo/i.test(t) ? '🔗'
    : /resumo/i.test(t) ? '📋' : '📌';

  const addForm = state.obAdding ? `
    <div style="border:1px solid var(--brand-h);border-radius:var(--r2);background:var(--bg-s);padding:14px 16px;margin-bottom:14px">
      <div class="field" style="margin-bottom:8px"><label class="lbl">Título</label><input class="inp" id="ob-new-titulo" placeholder="Ex: Observações" style="padding:7px 10px"></div>
      <textarea class="note-area" id="ob-new-conteudo" placeholder="Conteúdo do card..." style="min-height:90px"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary btn-sm" data-ob-save-new data-aluno-id="${a.id}">Salvar</button>
        <button class="btn btn-ghost btn-sm" data-ob-cancel-new>Cancelar</button>
      </div>
    </div>` : '';

  const cardsHtml = cards.length === 0 && !state.obAdding
    ? `<div class="empty-state" style="padding:30px 0;text-align:center"><p style="color:var(--t4)">Nenhum card de onboarding ainda.</p></div>`
    : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">
        ${cards.map(c=>{
          if (editId === c.id) {
            return `
            <div style="border:1px solid var(--brand-h);border-radius:var(--r2);background:var(--bg-s);padding:13px 16px">
              <input class="inp" id="ob-edit-titulo-${c.id}" value="${(c.titulo||'').replace(/"/g,'&quot;')}" style="padding:6px 10px;margin-bottom:8px;font-weight:600">
              <textarea class="note-area" id="ob-edit-conteudo-${c.id}" style="min-height:120px">${(c.conteudo||'').replace(/</g,'&lt;')}</textarea>
              <div style="display:flex;gap:8px;margin-top:8px">
                <button class="btn btn-primary btn-xs" data-ob-save-edit="${c.id}" data-aluno-id="${a.id}">Salvar</button>
                <button class="btn btn-ghost btn-xs" data-ob-cancel-edit>Cancelar</button>
              </div>
            </div>`;
          }
          return `
          <div style="border:1px solid var(--border);border-radius:var(--r2);background:var(--bg-s);overflow:hidden">
            <div style="padding:11px 16px;border-bottom:1px solid var(--border);font-size:12.5px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px">
              <span>${ico(c.titulo)}</span> <span style="flex:1">${c.titulo}</span>
              <button class="btn-icon" style="width:24px;height:24px" data-ob-edit="${c.id}" title="Editar">${I.edit}</button>
              <button class="btn-icon" style="width:24px;height:24px;color:var(--red-t)" data-ob-del="${c.id}" data-aluno-id="${a.id}" title="Excluir">${I.trash}</button>
            </div>
            <div style="padding:13px 16px;font-size:12.5px;color:var(--t2);line-height:1.65;white-space:pre-wrap">${(c.conteudo||'').replace(/</g,'&lt;')}</div>
          </div>`;
        }).join('')}
      </div>`;

  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:11.5px;color:var(--t4)">Onboarding em cards</div>
      ${!state.obAdding ? `<button class="btn btn-primary btn-sm" data-ob-add>${I.plus} Adicionar card</button>` : ''}
    </div>
    ${addForm}
    ${cardsHtml}
  </div>`;
}

function buildDetailEtapas(a) {
  const et = state.etapas[a.id] || {};
  const canEdit = isGod() || isBruna();
  const etapas = [
    {id:'forms', label:'Formulário de Onboarding', desc:'1 clique: enviado · 2 cliques: médico recebeu/preencheu'},
    {id:'ind',   label:'Reunião Individual',              desc:'Reunião individual com o médico interno'},
    {id:'onb',   label:'Reunião de Onboarding',           desc:'Reunião inicial realizada com o consultor'},
    {id:'fin',   label:'Reunião Fin/Leads',               desc:'Acesso às planilhas financeira e de leads'},
  ];
  // forms tem 3 estados: '' (nada) / 'enviado' (amarelo) / 'recebido' (verde+done)
  const formsStatus = et.forms_status || (et.forms_done ? 'recebido' : '');
  const isEtapaDone = (id) => id==='forms' ? formsStatus==='recebido' : !!et[id+'_done'];
  const totalDone = etapas.filter(e => isEtapaDone(e.id)).length;
  const pct = Math.round((totalDone / etapas.length) * 100);

  return `
  <div>
    <div style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;color:var(--t4)">${totalDone} de ${etapas.length} etapas concluídas</span>
        <span style="font-size:12px;font-weight:600;color:${pct===100?'var(--green)':'var(--brand-h)'}">${pct}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':'var(--brand-h)'};border-radius:3px;transition:width .3s"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${etapas.map((e,i) => {
        if (e.id === 'forms') {
          // 3 estados visuais
          const st = formsStatus; // '' | 'enviado' | 'recebido'
          const cor = st==='recebido' ? 'var(--green)' : st==='enviado' ? 'var(--amber)' : 'var(--border)';
          const bg  = st==='recebido' ? 'rgba(34,197,94,.05)' : st==='enviado' ? 'rgba(217,119,6,.06)' : 'var(--bg-s)';
          const bd  = st==='recebido' ? 'rgba(34,197,94,.25)' : st==='enviado' ? 'rgba(217,119,6,.3)' : 'var(--border)';
          const ico = st==='recebido' ? '✓' : st==='enviado' ? '●' : (i+1);
          const txtCor = st==='recebido' ? '#fff' : st==='enviado' ? '#fff' : 'var(--t4)';
          const statusLabel = st==='recebido' ? 'Recebido/preenchido' : st==='enviado' ? 'Enviado — aguardando' : 'Não enviado';
          return `
          <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r2);border:1px solid ${bd};background:${bg}">
            <div style="width:28px;height:28px;border-radius:50%;background:${cor};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:${txtCor}">${ico}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:600;color:${st?'var(--t1)':'var(--t2)'}">${e.label}</div>
              <div style="font-size:11.5px;color:var(--t4);margin-top:2px">${e.desc}</div>
              <div style="font-size:11px;font-weight:600;margin-top:3px;color:${cor==='var(--border)'?'var(--t4)':cor}">${statusLabel}</div>
            </div>
            ${canEdit ? `
            <button class="btn btn-sm ${st?'btn-ghost':''}" style="${st?'color:var(--t4)':''}" data-etapa="forms" data-aluno-id="${a.id}">
              ${st==='recebido' ? 'Resetar' : st==='enviado' ? 'Marcar recebido' : 'Marcar enviado'}
            </button>` : `
            <span style="font-size:11px;color:${cor==='var(--border)'?'var(--t4)':cor}">${statusLabel}</span>`}
          </div>`;
        }
        const done = isEtapaDone(e.id);
        return `
        <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r2);border:1px solid ${done?'rgba(34,197,94,.25)':'var(--border)'};background:${done?'rgba(34,197,94,.05)':'var(--bg-s)'}">
          <div style="width:28px;height:28px;border-radius:50%;background:${done?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:${done?'#fff':'var(--t4)'}">
            ${done ? '✓' : (i+1)}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13.5px;font-weight:600;color:${done?'var(--t1)':'var(--t2)'}">${e.label}</div>
            <div style="font-size:11.5px;color:var(--t4);margin-top:2px">${e.desc}</div>
          </div>
          ${canEdit ? `
          <button class="btn btn-sm ${done?'btn-ghost':''}" 
            style="${done?'color:var(--t4)':''}"
            data-etapa="${e.id}" data-aluno-id="${a.id}">
            ${done ? 'Desfazer' : 'Marcar'}
          </button>` : `
          <span style="font-size:11px;color:${done?'var(--green)':'var(--t4)'}">
            ${done ? 'Concluído' : 'Pendente'}
          </span>`}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

    <div class="section-title">Dados Gerais</div>

          <div style="display:flex;gap:6px;flex-wrap:wrap">${cols}</div>
        </div>`;

      return buildGrid('fin', finOk, a.link_fin, 'Financeira') + buildGrid('leads', leadsOk, a.link_leads, 'Leads');
    })()}

    ${(() => {
      // Card "Informações fornecidas no pré-onboarding" (raio-x do consultório, vindo do Typeform)
      const linhas = [
        ['Instagram', a.instagram],
        ['Turnos no consultório', a.turnos],
        ['Média de atendimentos/mês', a.media_atend],
        ['Preço da consulta', a.preco_consulta],
        ['Realiza procedimentos?', a.realiza_proc],
        ['Quais / receita', a.desc_proc],
        ['Atende convênios?', a.convenios],
        ['Atend. e valor por convênio', a.desc_conv],
        ['Outros vínculos', a.outros_vinculos],
      ].filter(([k,v]) => v && String(v).trim());
      if (!linhas.length) return '';
      return `
      <div class="divider"></div>
      <div style="border:1px solid var(--border);border-radius:var(--r2);background:var(--bg-s);overflow:hidden;margin-top:4px">
        <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:7px">
          <span>📋</span> Informações fornecidas no pré-onboarding
        </div>
        <div style="padding:6px 14px 10px">
          ${linhas.map(([k,v])=>`<div class="kv"><span class="kv-k">${k}</span><span class="kv-v" style="white-space:pre-wrap">${String(v).replace(/</g,'&lt;')}</span></div>`).join('')}
        </div>
      </div>`;
    })()}
  </div>`;
}


function buildDetailAulas(a) {
  const taxa = a.taxa_presenca;
  const taxaCls = taxa>=75?'pill-green':taxa>=50?'pill-amber':'pill-red';
  const marcadas = state.presenca;

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin:0">Histórico de Aulas</div>
      <span class="pill ${taxaCls}">Presença: ${taxa}%</span>
    </div>
    ${getAulasDaTurma(a.turma).filter(ad=>ad.bloco!=='11').map(ad=>{
      // Find presenca for this aluno in any turma
      let pres = null;
      Object.entries(marcadas).forEach(([tid,aulaMap])=>{
        if (aulaMap[ad.id] && aulaMap[ad.id][a.id]) pres = aulaMap[ad.id][a.id];
      });
      const lbl = pres==='sim'?'Presente':pres==='nao'?'Faltou':pres==='link'?'Link':pres==='reset'?'Reset':'Não realizada';
      const cls = pres==='sim'?'pill-green':pres==='nao'?'pill-red':pres==='link'?'pill-amber':'pill-gray';
      const dAula = ((state.aulasDates||{})[a.turma]?.[ad.id]||{}).data||'';
      return `<div class="aula-row">
        <div style="flex:1;font-size:13px;color:var(--t2)">${ad.label}${dAula?`<span style="font-size:11px;color:var(--t4);margin-left:8px">${dAula}</span>`:''}</div>
        <span class="pill ${cls}" style="font-size:10.5px">${lbl}</span>
      </div>`;
    }).join('')}
    <div class="divider"></div>
    <div class="section-title">1:1s</div>
    ${getAulasDaTurma(a.turma).filter(ad=>ad.bloco==='11').map(ad=>{
      const r = (a.reunioes||[]).find(r=>r.tipo===ad.label);
      return `<div class="aula-row">
        <div style="flex:1;font-size:13px;color:var(--t2)">${ad.label}</div>
        ${r ? `<span class="pill pill-green" style="font-size:10.5px">${fmt(r.data)}</span>` : `<span class="pill pill-gray" style="font-size:10.5px">—</span>`}
      </div>`;
    }).join('')}
  </div>`;
}

function buildDetailReunioes(a) {
  const reunioes = (a.reunioes || []).slice().sort((x,y)=>y.data.localeCompare(x.data));
  // Last realizada with proxPassos
  const ultRealizada = reunioes.find(r=>r.realizada && r.proxPassos);
  return `
  <div>
    ${ultRealizada ? `
      <div style="background:var(--brand-dim);border:1px solid rgba(99,102,241,.3);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px">
        <div style="font-size:10.5px;font-weight:600;color:var(--brand-h);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">Próximos Passos — ${ultRealizada.tipo}</div>
        <div style="font-size:13px;color:var(--t1);line-height:1.6">${ultRealizada.proxPassos}</div>
      </div>
    ` : ''}

      <div class="section-title" style="margin:0">Reuniões</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" data-rnota-add>${I.plus} Anotação</button>
        <button class="btn btn-primary btn-sm" data-action="nova-reuniao">${I.plus} Agendar Reunião</button>
      </div>
    </div>
    ${(() => {
      // Pendências: tarefas "Marcar X com Y" que ainda não têm reunião agendada/realizada
      const tipos11 = ['1:1 — 0','1:1 — 1','1:1 — 2','1:1 — 3','1:1 — 4','Treinamento da Secretária'];
      const pendentes = tipos11.filter(tipo => {
        const temTarefa = state.tarefas.some(t => !t.done && t.alunoId===a.id && t.titulo.includes(tipo.replace('Treinamento da Secretária','Treinamento da Secretária')));
        const temReuniao = (a.reunioes||[]).some(r => r.tipo===tipo);
        return temTarefa && !temReuniao;
      });
      if (!pendentes.length) return '';
      return `<div style="margin-bottom:16px;border:1px solid rgba(245,158,11,.35);border-radius:var(--r2);background:rgba(245,158,11,.07);padding:12px 14px">
        <div style="font-size:11px;font-weight:600;color:var(--amber-t);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">Pendente de agendamento</div>
        ${pendentes.map(tipo => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(245,158,11,.15)">
            <span style="font-size:13px;color:var(--t2)">${tipo}</span>
            <button class="btn btn-primary btn-xs" data-agendar-tipo="${tipo}" data-aluno-id="${a.id}">Agendar</button>

        `).join('')}
      </div>`;
    })()}

    ${(() => {
      // Anotações avulsas de reunião (cardzinhos com data + autor)
      if (!Array.isArray(a.reuniaoNotas)) a.reuniaoNotas = [];
      const editId = state.rnotaEditId;
      const addForm = state.rnotaAdding ? `
        <div style="border:1px solid var(--brand-h);border-radius:var(--r2);background:var(--bg-s);padding:13px 16px;margin-bottom:12px">
          <div class="field" style="margin-bottom:8px"><label class="lbl">Data</label><input class="inp" id="rnota-new-data" placeholder="ex: 28/05/2026" style="padding:6px 10px"></div>
          <textarea class="note-area" id="rnota-new-texto" placeholder="Anotação da reunião..." style="min-height:80px"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-primary btn-sm" data-rnota-save-new data-aluno-id="${a.id}">Salvar</button>
            <button class="btn btn-ghost btn-sm" data-rnota-cancel-new>Cancelar</button>
          </div>
        </div>` : '';
      const lista = a.reuniaoNotas.slice().reverse().map(n=>{
        if (editId===n.id) {
          return `
          <div style="border:1px solid var(--brand-h);border-radius:var(--r2);background:var(--bg-s);padding:12px 16px;margin-bottom:10px">
            <input class="inp" id="rnota-edit-data-${n.id}" value="${(n.data||'').replace(/"/g,'&quot;')}" placeholder="data" style="padding:6px 10px;margin-bottom:8px">
            <textarea class="note-area" id="rnota-edit-texto-${n.id}" style="min-height:80px">${(n.texto||'').replace(/</g,'&lt;')}</textarea>
            <div style="display:flex;gap:8px;margin-top:8px">
              <button class="btn btn-primary btn-xs" data-rnota-save-edit="${n.id}" data-aluno-id="${a.id}">Salvar</button>
              <button class="btn btn-ghost btn-xs" data-rnota-cancel-edit>Cancelar</button>

        return `

    ${(() => {
      const visivel = reunioes;
      return visivel.length===0
        ? `<div class="empty-state" style="padding:24px 0"><p>Nenhuma reunião agendada</p></div>`
        : visivel.map((r,i) => `
      <div class="reuniao-card" style="border-color:${r.realizada ? 'var(--border)' : 'rgba(99,102,241,.3)'};background:${r.realizada ? '#f9fafb' : '#f5f0ff'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">

}

function buildDetailNotas(a) {
  // Migração: se a.notas for string antiga com conteúdo, converte em 1 bloco preservando o texto
  if (typeof a.notas === 'string') {
    const txt = a.notas.trim();
    a.notas = txt ? [{id:'nt_old', autorId:'', autorNome:'—', data:'', texto:txt, comentarios:[]}] : [];
  }
  if (!Array.isArray(a.notas)) a.notas = [];
  const uid = state.user?.id;
  const editId = state.notaEditId; // nota sendo editada inline

  const notasHtml = a.notas.length === 0
    ? `<div class="empty-state" style="padding:24px 0"><p>Nenhuma nota ainda</p></div>`
    : a.notas.slice().reverse().map(n => {
        const ehDono = n.autorId && n.autorId === uid;
        const emEdicao = editId === n.id;
        const coments = n.comentarios || [];
        if (emEdicao) {
          return `
          <div style="border:1px solid var(--brand-h);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;background:var(--bg-s)">
            <div class="field" style="margin-bottom:8px"><label class="lbl">Data</label><input class="inp" id="nota-edit-data-${n.id}" value="${n.data||''}" placeholder="ex: 28/05/2026" style="padding:6px 10px"></div>
            <textarea class="note-area" id="nota-edit-texto-${n.id}" style="min-height:80px">${n.texto||''}</textarea>
            <div style="display:flex;gap:8px;margin-top:8px">
              <button class="btn btn-primary btn-sm" data-nota-save-edit="${n.id}" data-aluno-id="${a.id}">Salvar</button>
              <button class="btn btn-ghost btn-sm" data-nota-cancel-edit="1">Cancelar</button>
            </div>
          </div>`;
        }
        return `
        <div style="border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;background:var(--bg-s)">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:24px;height:24px;border-radius:50%;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--brand-h)">${(n.autorNome||'—').charAt(0)}</div>
              <span style="font-size:12.5px;font-weight:600;color:var(--t1)">${n.autorNome||'—'}</span>
              ${n.data ? `<span style="font-size:11.5px;color:var(--t4)">· ${n.data}</span>` : ''}
            </div>
            ${ehDono ? `<button class="btn btn-ghost btn-xs" data-nota-edit="${n.id}">${I.edit}</button>` : ''}
          </div>
          <div style="font-size:13px;color:var(--t2);line-height:1.6;white-space:pre-wrap">${n.texto||''}</div>

          ${coments.length ? `
          <div style="margin-top:10px;padding-left:12px;border-left:2px solid var(--border);display:flex;flex-direction:column;gap:8px">
            ${coments.map(c => `
              <div>
                <span style="font-size:11.5px;font-weight:600;color:var(--brand-h)">${c.autorNome||'—'}</span>
                <span style="font-size:12.5px;color:var(--t3);margin-left:6px">${c.texto||''}</span>
              </div>`).join('')}
          </div>` : ''}

          <div style="margin-top:10px;display:flex;gap:6px">
            <input class="inp" id="nota-coment-${n.id}" placeholder="Comentar..." style="padding:6px 10px;font-size:12.5px;flex:1">
            <button class="btn btn-ghost btn-sm" data-nota-comentar="${n.id}" data-aluno-id="${a.id}">Comentar</button>
          </div>
        </div>`;
      }).join('');

  return `
  <div>
    <div class="section-title">Notas</div>
    <!-- Adicionar nota -->
    <div style="border:1px solid var(--border2);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;background:var(--bg-t)">
      <div class="field" style="margin-bottom:8px">
        <label class="lbl">Data</label>
        <input class="inp" id="nova-nota-data" placeholder="ex: 28/05/2026" style="padding:7px 10px" value="${new Date().toLocaleDateString('pt-BR')}">
      </div>
      <textarea class="note-area" id="nova-nota-texto" placeholder="Escreva uma nota..." style="min-height:70px"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:8px" data-nota-add data-aluno-id="${a.id}">Adicionar nota</button>
    </div>
    ${notasHtml}
  </div>`;
}

function buildModal() {
  const m = state.modal;
  if (!m) return '';
  if (m.type === 'switch-profile')  return buildModalSwitchProfile();
  if (m.type === 'change-password') return buildModalChangePwd();
  if (m.type === 'alocar-turma')           return buildModalAlocarTurma();
  if (m.type === 'alocar-existente-turma') return buildModalAlocarExistente();
  if (m.type === 'importar-planilha')        return buildModalImportarPlanilha();
  if (m.type === 'importar-planilha-turmas') return buildModalImportarPlanilhaTurmas();
  if (m.type === 'novo-okr')               return buildModalNovoOKR();
  if (m.type === 'novo-kpi')               return buildModalNovoKPI();
  if (m.type === 'edit-profile')    return buildModalEditProfile(m.profile);
  if (m.type === 'novo-usuario')    return buildModalNovoUsuario();
  if (m.type === 'edit-turma')      return buildModalEditTurma(m.turma);
  if (m.type === 'nova-turma') return buildModalNovaTurma();
  if (m.type === 'novo-medico') return buildModalNovoMedico();
  if (m.type === 'nova-tarefa') return buildModalNovaTarefa();
  if (m.type === 'manual') return buildModalManual();
  if (m.type === 'nova-reuniao') return buildModalNovaReuniao();
  if (m.type === 'marcar-aula') return buildModalMarcarAula();
  if (m.type === 'nova-reuniao-calendario') return buildModalNovaReuniaoCalendario();
  if (m.type === 'reagendar') return buildModalReagendar();
  if (m.type === 'realizar')  return buildModalRealizarReuniao();
  return '';
}

function addDays(dateStr, n) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}

function logAccess(page) {
  if (!state.user) return;
  const userId   = state.user.id;
  const userName = state.user.name;
  const ts       = new Date().toISOString();

  if (!state.accessStats) state.accessStats = { byUser: {}, byPage: {}, lastAccess: {} };

  if (!state.accessStats.byUser[userId]) state.accessStats.byUser[userId] = { name: userName, total: 0, pages: {} };
  state.accessStats.byUser[userId].total++;
  state.accessStats.byUser[userId].pages[page] = (state.accessStats.byUser[userId].pages[page] || 0) + 1;
  state.accessStats.byUser[userId].name = userName;

  if (page !== 'login') {
    state.accessStats.byPage[page] = (state.accessStats.byPage[page] || 0) + 1;
  }

  state.accessStats.lastAccess[userId] = ts;
}

function attachEvents() {
  // Login — clique no perfil
  document.querySelectorAll('[data-login]').forEach(el => {
    el.addEventListener('click', async () => {
      const pid = el.dataset.login;
      const p = state.profiles.find(x=>x.id===pid) || {id:pid, name:pid};
      if (p.hasPassword) {
        // Já definiu senha — pede email e senha
        state.setupProfile = pid;
        state.loginMode = 'signin';
        render();
      } else {
        // Sem senha definida — entra direto e mostra popup
        state.user = p;
        state.loginMode = null;
        state.setupProfile = null;
        state.showSetupPopup = true;
        await loadStateFromDb();
        logAccess('login');
        render();
      }
    });
  });

  // Setup: criar email+senha
  document.getElementById('btn-setup-save')?.addEventListener('click', async () => {
    const email = document.getElementById('setup-email')?.value.trim();
    const pass  = document.getElementById('setup-pass')?.value;
    const pass2 = document.getElementById('setup-pass2')?.value;
    const err   = document.getElementById('setup-err');
    if (!email || !pass) { err.textContent = 'Preencha email e senha.'; err.style.display='block'; return; }
    if (pass !== pass2)  { err.textContent = 'As senhas não coincidem.'; err.style.display='block'; return; }
    if (pass.length < 6) { err.textContent = 'Senha deve ter ao menos 6 caracteres.'; err.style.display='block'; return; }
    err.style.display = 'none';
    document.getElementById('btn-setup-save').textContent = 'Criando...';
    try {
      // Cria usuário no Supabase Auth
      await sbRequest('/auth/v1/signup', 'POST', { email, password: pass });
      // Faz login
      await sbSignIn(email, pass);
      // Salva email e hasPassword no perfil
      const pid = state.setupProfile;
      const p = state.profiles.find(x=>x.id===pid);
      if (p) { p.email = email; p.hasPassword = true; }
      // Atualizar também no PROFILES global
      const pp2 = PROFILES.find(x=>x.id===pid);
      if (pp2) { pp2.email = email; pp2.hasPassword = true; }
      if (!state.passwordSet) state.passwordSet = {};
      state.passwordSet[pid] = true;
      // Loga no app
      state.user = p || { id: pid, name: pid };
      state.loginMode = null;
      state.setupProfile = null;
      // Salva primeiro para persistir hasPassword=true, depois recarrega
      await saveStateToDb();
      await loadStateFromDb();
      // Garantir que hasPassword continua true após reload
      const pAfter = state.profiles.find(x=>x.id===pid);
      if (pAfter) pAfter.hasPassword = true;
      const ppAfter = PROFILES.find(x=>x.id===pid);
      if (ppAfter) ppAfter.hasPassword = true;
      await saveStateToDb();
      logAccess('login');
      render();
    } catch(e) {
      err.textContent = 'Erro: ' + e.message;
      err.style.display = 'block';
      document.getElementById('btn-setup-save').textContent = 'Criar acesso';
    }
  });

  // Signin: entrar com email+senha
  document.getElementById('btn-signin')?.addEventListener('click', async () => {
    const email = document.getElementById('signin-email')?.value.trim();
    const pass  = document.getElementById('signin-pass')?.value;
    const err   = document.getElementById('signin-err');
    if (!email || !pass) { err.textContent = 'Preencha email e senha.'; err.style.display='block'; return; }
    err.style.display = 'none';
    document.getElementById('btn-signin').textContent = 'Entrando...';
    try {
      await sbSignIn(email, pass);
      const pid = state.setupProfile;
      const p = state.profiles.find(x=>x.id===pid) || { id: pid, name: pid };
      if (p) p.hasPassword = true;
      const ppS = PROFILES.find(x=>x.id===pid);
      if (ppS) ppS.hasPassword = true;
      if (!state.passwordSet) state.passwordSet = {};
      state.passwordSet[pid] = true;
      state.user = p;
      state.loginMode = null;
      state.setupProfile = null;
      // Salva primeiro para persistir hasPassword=true, depois recarrega
      await saveStateToDb();
      await loadStateFromDb();
      // Garantir hasPassword após reload
      const pS2 = state.profiles.find(x=>x.id===pid);
      if (pS2) pS2.hasPassword = true;
      const ppS2 = PROFILES.find(x=>x.id===pid);
      if (ppS2) ppS2.hasPassword = true;
      await saveStateToDb();
      logAccess('login');
      render();
    } catch(e) {
      err.textContent = 'Email ou senha incorretos.';
      err.style.display = 'block';
      document.getElementById('btn-signin').textContent = 'Entrar';
    }
  });

  // Enter no campo de senha (e email) dispara o login
  ['signin-pass','signin-email'].forEach(campoId => {
    document.getElementById(campoId)?.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-signin')?.click(); }

  // Voltar para escolha de perfil
  document.getElementById('btn-setup-back')?.addEventListener('click', () => {

  // Setup popup

  document.getElementById('btn-cp-save')?.addEventListener('click', async () => {

  // Nav

        // Pre-aula notification for NEXT aula

        }
      }
      // Trigger 1:1 alerts (sim and sim2 both count)
      const al=state.alunos.find(a=>a.id===alunoId);
      const respId=PROFILES.find(p=>p.name===al?.responsavel)?.id||null;
      const trigT=(titulo)=>{ if(!respId) return; const ex=state.tarefas.some(t=>!t.done&&t.alunoId===alunoId&&t.titulo===titulo); if(!ex) addTarefa({titulo,responsavel:respId,alunoId,alunoNome:al?.nome,prio:'alta'}); };
      // alerta para a Bruna, por turma (não duplica por turma)

      if(next==='sim'||next==='sim2'||next==='nao'||next==='link'){
        const ok=(id)=>{const v=(state.presenca[tid][id]||{})[alunoId];return v==='sim'||v==='sim2'||v==='link'||v==='nao';};

      }

      const respId = PROFILES.find(p=>p.name===al?.responsavel)?.id || null;
      function triggerTask(titulo) {

        const exists = state.tarefas.some(t=>!t.done && t.alunoId===alunoId && t.titulo===titulo);

        });
      }
      // Link → task for Bruna to check if video was watched
      if (op === 'link') {
        // Remove enviar-link task since link was sent
        state.tarefas.forEach(t=>{ if(t.alunoId===alunoId && t.aulaId===aulaId && t.tipo==='enviar-link') t.done=true; });
        const exists = state.tarefas.some(t=>!t.done && t.alunoId===alunoId && t.aulaId===aulaId && t.tipo==='cobrar-video');
        if (!exists) addTarefa({
          titulo: `Cobrar vídeo — ${al?.nome?.split(' ')[0]||''}`,

      if (op === 'reset') {

        const pTidR = state.presenca[tid]||{};

        if(!okR('a10_2')) state.tarefas.forEach(t=>{ if(t.alunoId===alunoId&&t.titulo===('Marcar 1:1 — 4 com '+nomeAl2)) t.done=true; });
      }
      // Check 1:1 triggers — qualquer marca de presença (sim, sim2, nao, link)
      if (op === 'sim' || op === 'sim2' || op === 'nao' || op === 'link') {
        const pTid = state.presenca[tid];
        const marked = (id) => { const m = (pTid[id]||{})[alunoId]; return m==='sim'||m==='sim2'||m==='nao'||m==='link'; };
        const trigBruna=(titulo)=>{ const ex=state.tarefas.some(t=>!t.done&&t.responsavel==='bruna'&&t.titulo===titulo); if(!ex) addTarefa({titulo,responsavel:'bruna',prio:'alta'}); };
        // Pós Aula 2 → consultor marca Treinamento da Secretária
        if (['a1','a2'].includes(aulaId) && marked('a2'))
          triggerTask('Marcar Treinamento da Secretária com ' + (al?.nome||''));
        // After Aula 4 → trigger 1:1-0 + alerta Bruna sobre pausa
        if (['a1','a2','a3','a4'].includes(aulaId) && marked('a4')) {
          triggerTask('Marcar 1:1 — 0 com ' + (al?.nome||''));
          trigBruna('Avisar no grupo da '+tid+' sobre a pausa de 1 mês entre Aula 4 e 5');
        }
        // After Aula 9 → trigger 1:1-1
        if (['a5','a6','a7','a8','a9'].includes(aulaId) && marked('a9'))
          triggerTask('Marcar 1:1 — 1 com ' + (al?.nome||''));
        // After 1:1-1 done (tracked via reunioes) → 1:1-2 — handled separately
        // After Aula 10.1 → trigger 1:1-3
        if (aulaId==='a10_1') triggerTask('Marcar 1:1 — 3 com ' + (al?.nome||''));
        // After Aula 10.2 → trigger 1:1-4
        if (aulaId==='a10_2') triggerTask('Marcar 1:1 — 4 com ' + (al?.nome||''));
      }
      render();
    });
  });

  // Etapa ticks
  document.querySelectorAll('[data-etapa]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const {etapa, alunoId} = el.dataset;
      if (!state.etapas[alunoId]) state.etapas[alunoId] = {};
      const et = state.etapas[alunoId];
      const a  = state.alunos.find(x=>x.id===alunoId);
      const respId = PROFILES.find(p=>p.name===a?.responsavel)?.id || null;
      const nomeFirst = a?.nome?.split(' ')[0]||'';
      function triggerTask(titulo, responsavel, prazo) {
        const exists = state.tarefas.some(t=>!t.done && t.alunoId===alunoId && t.titulo===titulo);
        if (!exists) addTarefa({titulo, responsavel, alunoId, alunoNome:a?.nome, prio:'media', prazo:prazo||''});
      }

      // FORMS — 3 estados: '' → 'enviado' (amarelo) → 'recebido' (verde) → '' ...
      if (etapa === 'forms') {
        const cur = et.forms_status || (et.forms_done ? 'recebido' : '');
        const next = cur === '' ? 'enviado' : cur === 'enviado' ? 'recebido' : '';
        et.forms_status = next;
        et.forms_done   = (next === 'recebido'); // mantém compatibilidade com o resto do código
        scheduleSave();
        if (next === 'recebido') {
          // médico recebeu/preencheu → próximo passo: marcar Reunião Individual
          triggerTask('Marcar Reunião Individual com '+nomeFirst, 'bruna', addDays(now(),5));
        } else {
          // saiu de recebido → remove tarefa de individual pendente
          state.tarefas = state.tarefas.filter(t=>!(t.alunoId===alunoId && !t.done && t.titulo==='Marcar Reunião Individual com '+nomeFirst));
        }
        render();
        return;
      }

      // demais etapas (ind, onb, fin) — toggle done normal
      const key = etapa + '_done';
      const wasDone = et[key];
      et[key] = !wasDone;
      scheduleSave();
      if (!wasDone) {
        if (etapa==='ind' && et.forms_done) triggerTask('Marcar Reunião de Onboarding com '+nomeFirst, 'bruna', addDays(now(),5));
        if (etapa==='onb') triggerTask('Marcar Reunião Fin/Leads com '+nomeFirst, 'bruna', addDays(now(),7));
      } else {
        const toRemove = {
          ind: ['Marcar Reunião de Onboarding com '+nomeFirst],
          onb: ['Marcar Reunião Fin/Leads com '+nomeFirst],
          fin: [],
        }[etapa]||[];
        state.tarefas = state.tarefas.filter(t=>!(t.alunoId===alunoId && !t.done && toRemove.includes(t.titulo)));
      }
      render();
    });
  });

  // Tarefa filter tabs

  document.querySelectorAll('[data-cal-day]').forEach(el => {

  document.querySelectorAll('[data-link-toggle]').forEach(el => {
    el.addEventListener('click', e => {

        const al = state.alunos.find(a=>a.id===alunoId);
        const exists = state.tarefas.some(t=>!t.done&&t.alunoId===alunoId&&t.aulaId===aulaId&&t.tipo==='cobrar-video');
        if (!exists) addTarefa({titulo:`Cobrar vídeo — ${al?.nome?.split(' ')[0]||''}`, responsavel:'bruna', alunoId, alunoNome:al?.nome, aulaId, prio:'media', tipo:'cobrar-video', descricao:AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId});
      }
      render();
    });
  });

  // Tick 1:1 directly in cronograma — usando event delegation para garantir funcionamento
  document.querySelectorAll('[data-aula11]').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();
      const aulaId = el.dataset.aula11;
      const alunoId = el.dataset.alunoId;
      // Pegar label do ad na turma atual (suporta renames)
      const tid = state.selTurma;
      const adFound = getAulasDaTurma(tid).find(a=>a.id===aulaId);
      const aulaLabel = adFound?.label || AULAS_DEF.find(a=>a.id===aulaId)?.label || aulaId;
      const al = state.alunos.find(a=>a.id===alunoId);
      if (!al) return;
      if (!al.reunioes) al.reunioes = [];
      // Toggle simples: realizada ↔ não. Nunca cria reunião "agendada" pelo check.
      const existingIdx = al.reunioes.findIndex(r=>r.tipo===aulaLabel);
      if (existingIdx >= 0 && al.reunioes[existingIdx].realizada) {
        // já realizada → desmarcar (remove)
        al.reunioes.splice(existingIdx, 1);
      } else if (existingIdx >= 0) {
        // existe mas não realizada (agendada) → marcar como realizada
        al.reunioes[existingIdx].realizada = true;
        if (!al.reunioes[existingIdx].data) al.reunioes[existingIdx].data = new Date().toISOString().slice(0,10);
      } else {
        // não existe → criar e marcar
        al.reunioes.push({id:'r_'+Date.now(), tipo:aulaLabel, data:new Date().toISOString().slice(0,10), realizada:true, notas:'', proxPassos:''});

  // Turmas antigas
  document.querySelectorAll('[data-abrir-turma-antiga]').forEach(el => {

  document.querySelectorAll('[data-alocar-id]').forEach(el => {

  document.querySelectorAll('[data-del-aluno]').forEach(el => {

function salvarTurma() {
  const nome = document.getElementById('m-turma-nome')?.value.trim();
  if (!nome) return showToast('Nome é obrigatório', 'err');
  if (state.turmas.find(t=>t.id===nome)) return showToast('Turma já existe', 'err');
  const inicio = document.getElementById('m-turma-inicio')?.value || now();
  const fim    = document.getElementById('m-turma-fim')?.value    || addDays(inicio, 365);
  const engId = document.getElementById('m-turma-eng')?.value||'';
  state.turmas.push({id:nome, nome, inicio, fim_previsto:fim, concluida:false, engeId:engId});
  // Auto-schedule aulas biweekly from start date
  if (!state.aulasDates[nome]) state.aulasDates[nome] = {};
  const aulaOrder = getAulasDaTurma(nome).filter(a=>a.bloco!=='11');
  aulaOrder.forEach((ad, i) => {
    state.aulasDates[nome][ad.id] = {data: addDays(inicio, i * 14), resp:'', aux:''};
  });
  state.modal = null;
  state.selTurma = nome;
  state.turmaBView = 'agenda';
  showToast(`Turma ${nome} criada — verifique e ajuste as datas`);
  scheduleSave();
  render();
}

function salvarMedico() {
  const nome = document.getElementById('m-nome')?.value.trim();
  const turma = document.getElementById('m-turma')?.value;
  const resp = document.getElementById('m-resp')?.value;
  if (!nome) return showToast('Nome é obrigatório', 'err');
  if (!turma) return showToast('Selecione uma turma', 'err');
  if (!resp) return showToast('Selecione um responsável', 'err');
  const ep = {};
  AULAS_DEF.forEach(a => ep[a.label] = null);
  const novo = {
    id: 'a_' + Date.now(),
    nome, turma, responsavel: resp, status: 'ativo',
    especialidade: document.getElementById('m-esp')?.value.trim()||'',
    clinica: document.getElementById('m-clinica')?.value.trim()||'',
    cidade: document.getElementById('m-cidade')?.value.trim()||'',
    cep: document.getElementById('m-cep')?.value.trim()||'',
    endereco: document.getElementById('m-end')?.value.trim()||'',
    whatsapp: document.getElementById('m-wpp')?.value.trim()||'',
    instagram: document.getElementById('m-insta')?.value.trim()||'',
    cpf: document.getElementById('m-cpf')?.value.trim()||'',
    nascimento: document.getElementById('m-nasc')?.value||'',
    inicio: document.getElementById('m-inicio')?.value||'',
    fim_previsto: document.getElementById('m-fim')?.value||'',
    taxa_presenca: 0, progress: ep, reunioes: [], notas: '', log_cs: '', okrs: [],
    link_fin: '', link_leads: '',
  };
  state.alunos.push(novo);
  // Trigger task for Bruna — mandar forms de onboarding (cadeia segue após forms recebido)
  const prazoForms = addDays(now(), 3);
  addTarefa({titulo:'Mandar forms de onboarding para ' + nome.split(' ')[0], responsavel:'bruna', alunoId:novo.id, alunoNome:nome, prio:'alta', prazo:prazoForms, tipo:'enviar-forms', descricao:'Novo médico cadastrado — enviar formulário de onboarding'});
  state.modal = null;
  showToast(`${nome} cadastrado`);
  scheduleSave();
}

function salvarTarefa() {
  const titulo = document.getElementById('m-tk-titulo')?.value.trim();
  if (!titulo) return showToast('Título é obrigatório', 'err');
  addTarefa({
    titulo,

    prazo: document.getElementById('m-tk-prazo')?.value||'',

    colab: document.getElementById('m-tk-colab')?.value||'',
    descricao: document.getElementById('m-tk-desc')?.value.trim()||'',
  });
  state.modal = null;
  showToast('Tarefa criada');
  scheduleSave();
  render();
}

function salvarReuniao() {
  const tipo = document.getElementById('m-reu-tipo')?.value;
  const data = document.getElementById('m-reu-data')?.value;
  if (!tipo) return showToast('Selecione o tipo', 'err');
  if (!data) return showToast('Informe a data', 'err');
  const a = state.alunos.find(x=>x.id===state.selAluno);
  if (!a) return;
  if (!a.reunioes) a.reunioes = [];
  const medInt  = document.getElementById('m-reu-medint')?.value || '';
  const respId  = document.getElementById('m-reu-resp')?.value || '';
  const hora = document.getElementById('m-reu-hora')?.value||'';
  const horaFim = document.getElementById('m-reu-hora-fim')?.value||'';
  const reu = {
    id: 'r_' + Date.now(),
    tipo, data, hora, horaFim,
    responsavelId: respId,
    medicoInt: medInt,
    realizada: false,
    notas: '',
    proxPassos: '',
  };
  a.reunioes.push(reu);
  // Reunião Individual → alert Bruna to coordinate with médico interno
  if (tipo === 'Reunião Individual') {
    const medNome = medInt ? (PROFILES.find(p=>p.id===medInt)?.name||medInt) : 'médico interno';
    const titulo = `Confirmar Reunião Individual de ${a.nome.split(' ')[0]} com ${medNome}`;
    const exists = state.tarefas.some(t=>!t.done && t.alunoId===a.id && t.titulo===titulo);
    if (!exists) addTarefa({titulo, responsavel:'bruna', alunoId:a.id, alunoNome:a.nome, prio:'media', descricao:`Reunião agendada para ${fmt(data)}`});
  }
  // Reunião de Planilhas → alert Bruna to collect planilhas
  if (tipo === 'Reunião de Planilhas') {
    const titulo = 'Cobrar planilhas de '+a.nome.split(' ')[0];
    const exists = state.tarefas.some(t=>!t.done && t.alunoId===a.id && t.titulo===titulo);
    if (!exists) addTarefa({titulo, responsavel:'bruna', alunoId:a.id, alunoNome:a.nome, prio:'alta', descricao:'Planilha financeira e de leads'});
  }
  state.modal = null;
  showToast('Reunião agendada para ' + fmt(data));
  scheduleSave();
  render();

  // Criar evento no Google Calendar do responsável
  if (respId && data) {
    const token = gcalGetToken(respId);
    if (token) {
      const event = gcalBuildReuniaoEvent(reu, a);
      gcalCreateEvent(respId, event).then(ev => {
        if (ev?.id) showToast('Evento criado no Google Calendar ✓', 'ok');
      });
    }
  }
}

function salvarAula() {
  const aulaId = document.getElementById('m-aula-id')?.value;
  if (!aulaId) return showToast('Selecione a aula', 'err');
  const tid = state.selTurma || document.getElementById('m-aula-turma')?.value;
  if (!tid) return showToast('Selecione a turma', 'err');
  const resp = document.getElementById('m-aula-resp')?.value || '';
  const aux = document.getElementById('m-aula-aux')?.value || '';
  const data = document.getElementById('m-aula-data')?.value || '';
  const hora = document.getElementById('m-aula-hora')?.value || '19:30';
  const horaFim = document.getElementById('m-aula-hora-fim')?.value || '21:30';
  if (!state.presenca[tid]) state.presenca[tid] = {};
  if (!state.presenca[tid][aulaId]) state.presenca[tid][aulaId] = {};
  // Store date + responsible + horário
  if (!state.aulasDates[tid]) state.aulasDates[tid] = {};
  state.aulasDates[tid][aulaId] = {data, resp, aux, hora, horaFim};
  // If auxiliar selected → add task for them
  if (aux) {
    const auxProfile = PROFILES.find(p=>p.name===aux);
    if (auxProfile) {
      const aulaLabel = AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId;
      const turmaLabel = state.turmas.find(t=>t.id===tid)?.nome||tid;
      const exists = state.tarefas.some(t=>!t.done && t.responsavel===auxProfile.id && t.titulo===`Auxiliar em ${aulaLabel}`);
      if (!exists) addTarefa({titulo:`Auxiliar em ${aulaLabel}`, responsavel:auxProfile.id, prazo:data, descricao:`Turma ${turmaLabel}${data?' · '+data:''}`, prio:'media'});
    }
  }
  // Also add to responsavel's calendar if different from current user
  if (resp) {
    const respProfile = PROFILES.find(p=>p.name===resp);
    if (respProfile && respProfile.id !== state.user?.id) {
      const aulaLabel = AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId;
      const turmaLabel = state.turmas.find(t=>t.id===tid)?.nome||tid;
      const exists = state.tarefas.some(t=>!t.done && t.responsavel===respProfile.id && t.titulo===`Responsável em ${aulaLabel}`);
      if (!exists) addTarefa({titulo:`Responsável em ${aulaLabel}`, responsavel:respProfile.id, prazo:data, descricao:`Turma ${turmaLabel}${data?' · '+data:''}`, prio:'media'});
    }
  }
  state.modal = null;
  showToast('Aula marcada');
  scheduleSave();

  // Criar evento no Google Calendar do responsável da aula
  if (data && resp) {
    const respProf = PROFILES.find(p=>p.name===resp);
    if (respProf) {
      const token = gcalGetToken(respProf.id);
      if (token) {
        const aulaLabel2 = AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId;
        const turmaLabel2 = state.turmas.find(t=>t.id===tid)?.nome||tid;
        const event = gcalBuildAulaEvent(aulaLabel2, turmaLabel2, data, hora, horaFim);
        gcalCreateEvent(respProf.id, event).then(ev => {
          if (ev?.id) showToast('Evento de aula criado no Google Calendar ✓', 'ok');
        });
      }
    }
  }
  render();
}

function _getAluno() { return state.alunos.find(x=>x.id===state.selAluno); }
function _ensureNotasArray(a) {
  if (typeof a.notas === 'string') {
    const txt = a.notas.trim();
    a.notas = txt ? [{id:'nt_old', autorId:'', autorNome:'—', data:'', texto:txt, comentarios:[]}] : [];
  }
  if (!Array.isArray(a.notas)) a.notas = [];
}

function adicionarNota() {
  const a = _getAluno(); if (!a) return;
  _ensureNotasArray(a);
  const texto = document.getElementById('nova-nota-texto')?.value.trim();
  const data  = document.getElementById('nova-nota-data')?.value.trim() || '';
  if (!texto) return showToast('Escreva a nota', 'err');
  a.notas.push({
    id: 'nt_' + Date.now() + Math.random().toString(36).slice(2,5),
    autorId: state.user?.id || '',
    autorNome: state.user?.name || '—',
    data, texto, comentarios: []
  });
  // Notifica o consultor responsável do médico (se não for quem escreveu)
  const respProf = PROFILES.find(p=>p.name===a.responsavel);
  if (respProf && respProf.id !== state.user?.id) {
    addTarefa({titulo:`Nova nota em ${a.nome.split(' ')[0]}`, responsavel:respProf.id, alunoId:a.id, alunoNome:a.nome, prio:'media', descricao:`${state.user?.name||'Alguém'} adicionou uma nota`});

  showToast('Nota adicionada');
  scheduleSave();
  render();
}

function buildCalendario(t, alunos) {
  // All aulas with dates, sorted by date
  const aulasDatesT = state.aulasDates[t.id] || {};
  const agendadas = [];
  getAulasDaTurma(t.id).forEach(ad => {
    const info = aulasDatesT[ad.id];
    if (info && info.data) {
      agendadas.push({...ad, ...info});
    }
  });
  agendadas.sort((a,b) => a.data.localeCompare(b.data));

  // Aulas sem data = sem agendar ainda
  const semData = getAulasDaTurma(t.id).filter(ad => ad.bloco !== '11' && !aulasDatesT[ad.id]?.data);

  // Build a simple monthly calendar view for current month + next
  const today = new Date();
  const months = [];
  for (let mi = 0; mi < 3; mi++) {
    const d = new Date(today.getFullYear(), today.getMonth()+mi, 1);
    months.push({year: d.getFullYear(), month: d.getMonth()});
  }

  function buildMonth(year, month) {
    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const pad = firstDay === 0 ? 6 : firstDay - 1; // Mon-start
    const todayStr = today.toISOString().slice(0,10);

    // Map aulas to dates in this month
    const aulasByDate = {};
    agendadas.forEach(a => {
      const d = new Date(a.data);
      if (d.getFullYear()===year && d.getMonth()===month) {
        if (!aulasByDate[d.getDate()]) aulasByDate[d.getDate()] = [];
        aulasByDate[d.getDate()].push(a);
      }
    });

    let cells = '';
    for (let i=0; i<pad; i++) cells += '<div></div>';
    for (let d=1; d<=daysInMonth; d++) {
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const aulasHoje = aulasByDate[d] || [];
      cells += `<div style="min-height:60px;padding:4px;border-radius:var(--r);border:1px solid ${isToday?'var(--brand-h)':aulasHoje.length?'rgba(99,102,241,.3)':'var(--border)'};background:${isToday?'var(--brand-dim)':aulasHoje.length?'rgba(99,102,241,.06)':'transparent'};position:relative">
        <div style="font-size:11px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--brand-h)':'var(--t4)'};margin-bottom:2px">${d}</div>
        ${aulasHoje.map(a=>`<div style="font-size:9.5px;background:var(--brand);color:#fff;border-radius:3px;padding:1px 5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${a.label}">${a.label.split('—')[0].trim()}</div>`).join('')}
      </div>`;
    }
    return `
    <div style="margin-bottom:24px">
      <div style="font-family:var(--fh);font-weight:600;font-size:15px;color:var(--t1);margin-bottom:12px">${monthNames[month]} ${year}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">
        ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div style="font-size:10px;font-weight:600;color:var(--t4);text-align:center;padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
    </div>`;
  }

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="section-title" style="margin:0">Calendário de Aulas — Turma ${t.nome}</div>
      <button class="btn btn-primary btn-sm" data-action="marcar-aula">${I.plus} Agendar Aula</button>
    </div>

    ${agendadas.length > 0 ? `
    <div style="margin-bottom:20px">
      <div class="section-title">Próximas Aulas Agendadas</div>
      ${agendadas.filter(a=>a.data>=today.toISOString().slice(0,10)).slice(0,5).map(a=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;background:var(--bg-s)">
          <div style="width:44px;height:44px;border-radius:var(--r);background:var(--brand-dim);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:16px;font-weight:700;font-family:var(--fh);color:var(--brand-h)">${new Date(a.data+'T12:00').getDate()}</span>
            <span style="font-size:9px;color:var(--brand-h)">${new Date(a.data+'T12:00').toLocaleDateString('pt-BR',{month:'short'}).toUpperCase()}</span>
          </div>
          <div style="flex:1">
            <div style="font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)">${a.label}</div>
            <div style="font-size:12px;color:var(--t4);margin-top:2px">
              ${a.resp ? `Responsável: ${a.resp}` : ''}${a.aux ? ` · Auxiliar: ${a.aux}` : ''}
            </div>
          </div>
          <span class="pill pill-blue" style="font-size:10px">${a.data}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${months.map(({year,month}) => buildMonth(year,month)).join('')}

    <!-- Turma color legend -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      ${state.turmas.map(t => {
        const col = turmaColor(t.id);
        return `<div style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--t2)">
          <div style="width:12px;height:12px;border-radius:3px;background:${col.bg};flex-shrink:0"></div>
          ${t.nome}
        </div>`;
      }).join('')}
    </div>

    ${semData.length > 0 ? `
    <div class="divider"></div>
    <div class="section-title">Aulas Sem Data Definida</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${semData.map(ad=>`<span class="pill pill-gray" style="font-size:11.5px">${ad.label}</span>`).join('')}
    </div>` : ''}
  </div>`;
}
