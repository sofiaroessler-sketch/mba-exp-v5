        if (confirm('Apagar TODAS as turmas? Esta ação não pode ser desfeita.')) {
          state.turmas = [];
          state.presenca = {};
          state.aulasDates = {};
          showToast('Todas as turmas foram apagadas');
  scheduleSave();
        }
      }
      if (a === 'apagar-todos-medicos')  {
        if (confirm('Apagar TODOS os médicos? Esta ação não pode ser desfeita.')) {
          state.alunos = [];
          state.etapas = {};
          showToast('Todos os médicos foram apagados');
  scheduleSave();
        }
      }
    });
  });

  // Close modal
  // Reuniao tipo change → show medico interno field
  document.getElementById('m-reu-tipo')?.addEventListener('change', function() {
    const f = document.getElementById('field-medico-int');
    if (f) f.style.display = this.value === 'Reunião Individual' ? 'flex' : 'none';
  });

  // Import TURMAS drop zone
  const dropZoneTurmas  = document.getElementById('import-turmas-zone');
  const fileInputTurmas = document.getElementById('import-turmas-input');
  const browseBtnTurmas = document.getElementById('import-turmas-browse');
  if (dropZoneTurmas) {
    dropZoneTurmas.addEventListener('dragover',e=>{e.preventDefault();dropZoneTurmas.style.borderColor='var(--brand-h)';});
    dropZoneTurmas.addEventListener('dragleave',()=>{dropZoneTurmas.style.borderColor='';});
    dropZoneTurmas.addEventListener('drop',e=>{e.preventDefault();dropZoneTurmas.style.borderColor='';if(e.dataTransfer.files[0])parsePlanilhaTurmas(e.dataTransfer.files[0]);});
  }
  if (browseBtnTurmas&&fileInputTurmas) browseBtnTurmas.addEventListener('click',e=>{e.stopPropagation();fileInputTurmas.click();});
  if (fileInputTurmas) fileInputTurmas.addEventListener('change',e=>{if(e.target.files[0])parsePlanilhaTurmas(e.target.files[0]);});

  // Import file drop zone
  const dropZone  = document.getElementById('import-drop-zone');
  const fileInput = document.getElementById('import-file-input');
  const browseBtn = document.getElementById('import-browse-btn');
  if (dropZone) {
    dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.style.borderColor='var(--brand-h)';dropZone.style.background='var(--brand-dim)';});
    dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor='';dropZone.style.background='';});
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.style.borderColor='';dropZone.style.background='';if(e.dataTransfer.files[0])parseImportFile(e.dataTransfer.files[0]);});
  }
  if (browseBtn&&fileInput) browseBtn.addEventListener('click',e=>{e.stopPropagation();fileInput.click();});
  if (fileInput) fileInput.addEventListener('change',e=>{if(e.target.files[0])parseImportFile(e.target.files[0]);});

  document.querySelectorAll('[data-close-modal]').forEach(el => {
    el.addEventListener('click', () => { state.modal = null; render(); });
  });
  document.getElementById('modal-overlay')?.addEventListener('click', () => { state.modal = null; render(); });

  // Close panel
  document.querySelector('[data-close-panel]')?.addEventListener('click', () => {
    state.selAluno = null; state.editandoAluno = false; render();

  // Open aluno panel
  document.querySelectorAll('[data-open-aluno]').forEach(el => {
    el.addEventListener('click', e => {

      state.alunoTab = el.dataset.openTab || 'info';
      state.editandoAluno = false;
      render();
    });

  // Quick-edit turma/resp/status in aluno info tab
  document.querySelectorAll('[data-quickedit-turma]').forEach(el => {

  document.querySelectorAll('[data-quickedit-resp]').forEach(el => {

      const a = state.alunos.find(x=>x.id===el.dataset.quickeditResp);
      if (a) { a.responsavel = el.value; scheduleSave(); render(); }
    });
  });
  document.querySelectorAll('[data-quickedit-status]').forEach(el => {
    el.addEventListener('change', () => {

      if (a) { a.status = el.value; scheduleSave(); render(); }
    });
  });

  // Admin tabs
  document.querySelectorAll('[data-admin-tab]').forEach(el => {
    el.addEventListener('click', () => { state.adminTab = el.dataset.adminTab; render(); });
  });

  // OKR events
  document.querySelectorAll('[data-kpi-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const [oi,ki] = el.dataset.kpiToggle.split('-').map(Number);
      const a = state.alunos.find(x=>x.id===el.dataset.alunoId);
      if (!a||!a.okrs[oi]) return;
      const kpi = a.okrs[oi].kpis[ki];
      if (!kpi.meses) kpi.meses = [];
      const now_d = new Date();
      const key = `${now_d.getFullYear()}-${String(now_d.getMonth()+1).padStart(2,'0')}`;
      const existing = kpi.meses.find(m=>m.key===key);
      if (existing) existing.done = !existing.done;
      else kpi.meses.push({key, done:true});

      render();
    });

    });

      render();

  document.querySelectorAll('[data-del-kpi]').forEach(el => {

      const a = state.alunos.find(x=>x.id===el.dataset.alunoId);
      if(a&&a.okrs[oi]) a.okrs[oi].kpis.splice(ki,1);
      scheduleSave();
      render();

  document.querySelectorAll('[data-aluno-tab]').forEach(el => {
    el.addEventListener('click', () => { state.alunoTab = el.dataset.alunoTab; render(); });

  document.querySelectorAll('[data-toggle-task]').forEach(el => {
    el.addEventListener('click', () => {
      const t = state.tarefas.find(x=>x.id===el.dataset.toggleTask);
      if (!t) return;
      t.done = !t.done;
      scheduleSave();
      if (t.done && t.tipo === 'enviar-link' && t.alunoId && t.aulaId) {
        // Mark presença as 'link' automatically
        const tid = state.alunos.find(a=>a.id===t.alunoId)?.turma;
        if (tid) {
          if (!state.presenca[tid]) state.presenca[tid] = {};
          if (!state.presenca[tid][t.aulaId]) state.presenca[tid][t.aulaId] = {};
          state.presenca[tid][t.aulaId][t.alunoId] = 'link';
          // Trigger cobrar-video task
          const exists2 = state.tarefas.some(x=>!x.done && x.alunoId===t.alunoId && x.aulaId===t.aulaId && x.tipo==='cobrar-video');
          if (!exists2) {
            const al = state.alunos.find(a=>a.id===t.alunoId);
            addTarefa({titulo:`Cobrar vídeo — ${al?.nome?.split(' ')[0]||''}`, responsavel:'bruna', alunoId:t.alunoId, alunoNome:al?.nome, aulaId:t.aulaId, prio:'media', tipo:'cobrar-video', descricao:t.descricao});
          }
        }
      }
      if (t.done && t.tipo === 'cobrar-video' && t.alunoId && t.aulaId) {
        // Mark presença as 'reset' automatically
        const tid = state.alunos.find(a=>a.id===t.alunoId)?.turma;
        if (tid) {
          if (!state.presenca[tid]) state.presenca[tid] = {};
          if (!state.presenca[tid][t.aulaId]) state.presenca[tid][t.aulaId] = {};
          state.presenca[tid][t.aulaId][t.alunoId] = 'sim2'; // watched video = yellow
        }
      }
      render();
    });
  });

  // Filtro médicos
  document.querySelectorAll('[data-filtro]').forEach(el => {
    el.addEventListener('click', () => { state.filtroMedicos = el.dataset.filtro; render(); });
  });

  // Search médicos
  document.getElementById('search-medicos')?.addEventListener('input', e => {
    state.searchMedicos = e.target.value;
    const q = state.searchMedicos.toLowerCase();
    // Filtra os cards diretamente no DOM sem re-render completo
    document.querySelectorAll('.page-body .card').forEach(card => {
      const text = card.textContent.toLowerCase();
      card.style.display = (!q || text.includes(q)) ? '' : 'none';
    });
  });

  document.getElementById('search-admin-medicos')?.addEventListener('input', e => {
    state.searchAdminMedicos = e.target.value;
    render();
  });

  // Presença CYCLE: Presente→sim(green)→sim2(yellow)→off
  document.querySelectorAll('[data-pres-cycle]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const aulaId=el.dataset.aula, alunoId=el.dataset.alunoId, tid=el.dataset.turma;
      if(!state.presenca[tid]) state.presenca[tid]={};
      if(!state.presenca[tid][aulaId]) state.presenca[tid][aulaId]={};
      const cur = state.presenca[tid][aulaId][alunoId];
      const next = (!cur||cur==='nao'||cur==='link') ? 'sim' : cur==='sim' ? 'sim2' : null;
      if(next) state.presenca[tid][aulaId][alunoId]=next;
      else delete state.presenca[tid][aulaId][alunoId];
      scheduleSave();
      // Permanent falta log — record nao/link even if later changed
      if(next==='nao'||next==='link') {
        if(!state.faltaLog[alunoId]) state.faltaLog[alunoId]={};
        if(!state.faltaLog[alunoId][aulaId]) state.faltaLog[alunoId][aulaId]=[];
        if(!state.faltaLog[alunoId][aulaId].includes(next)) state.faltaLog[alunoId][aulaId].push(next);
      }
      // Notify about pre/post aula material
      const aulaDefCur = AULAS_DEF.find(a=>a.id===aulaId);
      if (aulaDefCur && (next==='sim'||next==='sim2')) {
        // Post-aula notification for current aula
        if (aulaDefCur.pos) {
          const aulaInfo = (state.aulasDates[tid]||{})[aulaId];
          const resp = aulaInfo?.resp;
          const respProf = PROFILES.find(p=>p.name===resp);
          if (respProf) addTarefa({titulo:` Enviar material pós-aula: ${aulaDefCur.label.split('—')[0].trim()}`, responsavel:respProf.id, prio:'media', prazo:addDays(now(),2)});
        }
        // Pre-aula notification for NEXT aula
        const aulaIdx = AULAS_DEF.findIndex(a=>a.id===aulaId);
        const nextAula = AULAS_DEF[aulaIdx+1];
        if (nextAula && nextAula.pre) {
          const nextInfo = (state.aulasDates[tid]||{})[nextAula.id];
          const respNext = nextInfo?.resp;
          const respNextProf = PROFILES.find(p=>p.name===respNext);
          if (respNextProf) addTarefa({titulo:` Enviar material pré-aula: ${nextAula.label.split('—')[0].trim()}`, responsavel:respNextProf.id, prio:'media', prazo:nextInfo?.data||addDays(now(),14)});
        }
      }
      // Trigger 1:1 alerts (sim and sim2 both count)
      const al=state.alunos.find(a=>a.id===alunoId);
      const respId=PROFILES.find(p=>p.name===al?.responsavel)?.id||'otavio';
      const trigT=(titulo)=>{ const ex=state.tarefas.some(t=>!t.done&&t.alunoId===alunoId&&t.titulo===titulo); if(!ex) addTarefa({titulo,responsavel:respId,alunoId,alunoNome:al?.nome,prio:'alta'}); };
      if(next==='sim'||next==='sim2'){
        const ok=(id)=>{const v=(state.presenca[tid][id]||{})[alunoId];return v==='sim'||v==='sim2'||v==='link';};
        if(['a1','a2','a3','a4'].includes(aulaId)&&ok('a4')) trigT('Marcar 1:1 — 0 com '+(al?.nome||''));
        if(['a5','a6','a7','a9'].includes(aulaId)&&ok('a9')) trigT('Marcar 1:1 — 1 com '+(al?.nome||''));
        if(aulaId==='a10_1') trigT('Marcar 1:1 — 3 com '+(al?.nome||''));
        if(aulaId==='a10_2') trigT('Marcar 1:1 — 4 com '+(al?.nome||''));
      }
      recalcTaxaPresenca(tid);
      scheduleSave();
      render();
    });
  });

  // Presença buttons
  document.querySelectorAll('[data-presenca]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const {presenca: op, aula: aulaId, alunoId, turma: tid} = el.dataset;
      if (!state.presenca[tid]) state.presenca[tid] = {};
      if (!state.presenca[tid][aulaId]) state.presenca[tid][aulaId] = {};
      state.presenca[tid][aulaId][alunoId] = op;
      scheduleSave();
      const al = state.alunos.find(a=>a.id===alunoId);
      const respId = PROFILES.find(p=>p.name===al?.responsavel)?.id || 'otavio';
      function triggerTask(titulo) {
        const exists = state.tarefas.some(t=>!t.done && t.alunoId===alunoId && t.titulo===titulo);
        if (!exists) addTarefa({titulo, responsavel:respId, alunoId, alunoNome:al?.nome, prio:'alta'});
      }
      // Permanent falta log
      if (op==='nao'||op==='link') {
        if(!state.faltaLog[alunoId]) state.faltaLog[alunoId]={};
        if(!state.faltaLog[alunoId][aulaId]) state.faltaLog[alunoId][aulaId]=[];
        if(!state.faltaLog[alunoId][aulaId].includes(op)) state.faltaLog[alunoId][aulaId].push(op);
      }
      // Ausente → task for Bruna to send link
      if (op === 'nao') {
        const exists = state.tarefas.some(t=>!t.done && t.alunoId===alunoId && t.aulaId===aulaId && t.tipo==='enviar-link');
        if (!exists) addTarefa({
          titulo: `Enviar link para ${al?.nome?.split(' ')[0]||''}`,
          responsavel: 'bruna', alunoId, alunoNome: al?.nome,
          aulaId, prio:'alta', tipo:'enviar-link',
          descricao: `Faltou: ${AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId}`
        });
      }
      // Link → task for Bruna to check if video was watched
      if (op === 'link') {
        // Remove enviar-link task since link was sent
        state.tarefas.forEach(t=>{ if(t.alunoId===alunoId && t.aulaId===aulaId && t.tipo==='enviar-link') t.done=true; });
        const exists = state.tarefas.some(t=>!t.done && t.alunoId===alunoId && t.aulaId===aulaId && t.tipo==='cobrar-video');
        if (!exists) addTarefa({
          titulo: `Cobrar vídeo — ${al?.nome?.split(' ')[0]||''}`,
          responsavel: 'bruna', alunoId, alunoNome: al?.nome,
          aulaId, prio:'media', tipo:'cobrar-video',
          descricao: `Verificar se assistiu: ${AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId}`
        });
      }
      // Reset → auto-complete cobrar-video task
      if (op === 'reset') {
        state.tarefas.forEach(t=>{ if(t.alunoId===alunoId && t.aulaId===aulaId && t.tipo==='cobrar-video') t.done=true; });
      }
      // Check 1:1 triggers — only on 'sim' or meaningful mark
      if (op === 'sim' || op === 'link') {
        const pTid = state.presenca[tid];
        const marked = (id) => { const m = (pTid[id]||{})[alunoId]; return m==='sim'||m==='link'; };
        // After Aula 4 → trigger 1:1-0
        if (['a1','a2','a3','a4'].includes(aulaId) && marked('a4'))
          triggerTask('Marcar 1:1 — 0 com ' + (al?.nome||''));
        // After Aula 9 → trigger 1:1-1
        if (['a5','a6','a7','a9'].includes(aulaId) && marked('a9'))
          triggerTask('Marcar 1:1 — 1 com ' + (al?.nome||''));
        // After 1:1-1 done (tracked via reunioes) → 1:1-2 — handled separately
        // After Aula 10.1 → trigger 1:1-3
        if (aulaId==='a10_1') triggerTask('Marcar 1:1 — 3 com ' + (al?.nome||''));
        // After Aula 10.2 → trigger 1:1-4
        if (aulaId==='a10_2') triggerTask('Marcar 1:1 — 4 com ' + (al?.nome||''));
      }
      render();
    });
  });

  // Etapa ticks
  document.querySelectorAll('[data-etapa]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const {etapa, alunoId} = el.dataset;
      if (!state.etapas[alunoId]) state.etapas[alunoId] = {};
      const key = etapa + '_done';
      const wasDone = state.etapas[alunoId][key];
      state.etapas[alunoId][key] = !wasDone;
      const et = state.etapas[alunoId];
      const a  = state.alunos.find(x=>x.id===alunoId);
      const respId = PROFILES.find(p=>p.name===a?.responsavel)?.id || 'otavio';
      // helper: only add task if no pending task with same titulo+alunoId exists
      function triggerTask(titulo, responsavel, prazo) {
        const exists = state.tarefas.some(t=>!t.done && t.alunoId===alunoId && t.titulo===titulo);
        if (!exists) addTarefa({titulo, responsavel, alunoId, alunoNome:a?.nome, prio:'media', prazo:prazo||''});
      }
      const nomeFirst = a?.nome?.split(' ')[0]||'';
      scheduleSave();
      if (!wasDone) {
        // CHECK — create tasks for Bruna
        if (etapa==='forms')                triggerTask('Marcar Reunião de Onboarding com '+nomeFirst, 'bruna', addDays(now(),5));
        if (etapa==='onb' && et.forms_done) triggerTask('Marcar Reunião Fin/Leads com '+nomeFirst,     'bruna', addDays(now(),7));
        if (etapa==='fin' && et.onb_done)   triggerTask('Treinamento da Secretária — '+nomeFirst,      'bruna', addDays(now(),7));
      } else {
        // UNCHECK — remove corresponding pending tasks
        const toRemove = {
          forms: ['Marcar Reunião de Onboarding com '+nomeFirst, 'Onboarding: acompanhar forms de '+nomeFirst],
          onb:   ['Marcar Reunião Fin/Leads com '+nomeFirst],
          fin:   ['Treinamento da Secretária — '+nomeFirst],
          sec:   [],
        }[etapa]||[];
        state.tarefas = state.tarefas.filter(t=>!(t.alunoId===alunoId && !t.done && toRemove.includes(t.titulo)));
      }
      render();
    });
  });

  // Tarefa filter tabs
  document.querySelectorAll('[data-tarefa-filter]').forEach(el => {
    el.addEventListener('click', () => { state.tarefaFilter = el.dataset.tarefaFilter; render(); });
  });

  // Calendar: click reuniao to realize it
  document.querySelectorAll('[data-cal-realizar]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const alunoId  = el.dataset.alunoId;
      const reuniaoId = el.dataset.calRealizar;
      // open realize modal; also switch to aluno detail
      state.selAluno = alunoId;
      state.alunoTab = 'reunioes';
      state.modal = {type:'realizar', reuniaoId, alunoId};
      render();
    });
  });

  // Toggle turma concluída
  document.querySelectorAll('[data-toggle-turma-concluida]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const t = state.turmas.find(x=>x.id===el.dataset.toggleTurmaConcluida);
      if (!t) return;
      t.concluida = !t.concluida;
      if (t.concluida) state.showConcluidas = true; // auto-show section when first one is concluded
      scheduleSave();
      showToast(t.concluida ? `Turma ${t.nome} concluída` : `Turma ${t.nome} reaberta`);
      render();
    });
  });

  // Toggle show/hide concluidas section
  document.querySelector('[data-toggle-concluidas]')?.addEventListener('click', () => {
    state.showConcluidas = !state.showConcluidas;
    render();
  });

  // Cronograma: Bruna opens aula for presença
  document.querySelectorAll('[data-abrir-aula]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const key = el.dataset.turmaId + el.dataset.abrirAula;
      if (!state.aulaAberta) state.aulaAberta = {};
      state.aulaAberta[key] = !state.aulaAberta[key];
      render();
    });
  });

  // Cronograma: expand collapsed done aula
  document.querySelectorAll('[data-expand-aula]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const key = state.selTurma;
      if (!state.expandedAulas) state.expandedAulas = {};
      if (!state.expandedAulas[key]) state.expandedAulas[key] = {};
      const aid = el.dataset.expandAula;
      state.expandedAulas[key][aid] = !state.expandedAulas[key][aid];
      render();
    });
  });

  // Calendar: click aula → go to turma cronograma
  document.querySelectorAll('[data-cal-aula]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.selTurma = el.dataset.calTurma;
      state.turmaBView = 'cronograma';
      state.page = 'turmas';
      render();
      // Scroll to aula section after render
      setTimeout(() => {
        const target = document.querySelector(`[data-aula-section="${el.dataset.calAula}"]`);
        if (target) target.scrollIntoView({behavior:'smooth', block:'start'});
      }, 100);
    });
  });

  // Calendar month navigation
  document.querySelectorAll('[data-cal-nav]').forEach(el => {
    el.addEventListener('click', () => {
      const delta = parseInt(el.dataset.calNav);
      state.calMonth += delta;
      if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
      if (state.calMonth < 0)  { state.calMonth = 11; state.calYear--; }
      state.calWeek = 0;
      render();
    });
  });

  document.querySelectorAll('[data-cal-view]').forEach(el => {
    el.addEventListener('click', () => {
      state.calView = el.dataset.calView;
      render();
    });
  });

  document.querySelectorAll('[data-cal-week]').forEach(el => {
    el.addEventListener('click', () => {
      state.calWeek = (state.calWeek||0) + parseInt(el.dataset.calWeek);
      render();
    });
  });

  document.querySelectorAll('[data-cal-turma-filter]').forEach(el => {
    el.addEventListener('click', () => {
      state.calTurmaFilter = el.dataset.calTurmaFilter;
      render();
    });
  });

  document.getElementById('cal-turma-filter')?.addEventListener('change', e => {
    state.calTurmaFilter = e.target.value;
    render();
  });

  document.querySelectorAll('[data-cal-day]').forEach(el => {
    el.addEventListener('click', () => {
      const delta = parseInt(el.dataset.calDay);
      const d = new Date((state.calDay || new Date().toISOString().slice(0,10)) + 'T12:00');
      d.setDate(d.getDate() + delta);
      state.calDay = d.toISOString().slice(0,10);
      state.calYear  = d.getFullYear();
      state.calMonth = d.getMonth();
      render();
    });
  });

  // Link toggle — independent of presença (Bruna marks absent + sends link)
  document.querySelectorAll('[data-link-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const {aula:aulaId, alunoId, turma:tid} = el.dataset;
      if (!state.linkEnviado[tid]) state.linkEnviado[tid]={};
      if (!state.linkEnviado[tid][aulaId]) state.linkEnviado[tid][aulaId]={};
      const cur = state.linkEnviado[tid][aulaId][alunoId];
      state.linkEnviado[tid][aulaId][alunoId] = !cur;
      if (!cur) {
        // Link being sent — create cobrar-video task
        const al = state.alunos.find(a=>a.id===alunoId);
        const exists = state.tarefas.some(t=>!t.done&&t.alunoId===alunoId&&t.aulaId===aulaId&&t.tipo==='cobrar-video');
        if (!exists) addTarefa({titulo:`Cobrar vídeo — ${al?.nome?.split(' ')[0]||''}`, responsavel:'bruna', alunoId, alunoNome:al?.nome, aulaId, prio:'media', tipo:'cobrar-video', descricao:AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId});
      }
      render();
    });
  });

  // Tick 1:1 directly in cronograma
  document.querySelectorAll('[data-tick-11]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const {tick11: aulaId, alunoId} = el.dataset;
      const aulaLabel = AULAS_DEF.find(a=>a.id===aulaId)?.label || aulaId;
      const al = state.alunos.find(a=>a.id===alunoId);
      if (!al) return;
      if (!al.reunioes) al.reunioes = [];
      // Check if already has a realizada for this tipo
      const existing = al.reunioes.find(r=>r.tipo===aulaLabel);
      if (existing && existing.realizada) {
        // untick — remove realizada flag
        existing.realizada = false;
      } else if (existing) {
        existing.realizada = true;
      } else {
        // create and mark done
        al.reunioes.push({id:'r_'+Date.now(), tipo:aulaLabel, data:new Date().toISOString().slice(0,10), realizada:true, notas:'', proxPassos:''});
      }
      scheduleSave();
      render();
    });
  });

  // Alocar médico existente na turma
  document.querySelectorAll('[data-alocar-id]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const a = state.alunos.find(x=>x.id===el.dataset.alocarId);
      if (!a) return;
      const tid = state.selTurma;
      a.turma = tid;
      // Update the button to show success
      el.textContent = '✓';
      el.disabled = true;
      el.style.background = 'var(--green-bg)';
      el.style.color = 'var(--green-t)';
      showToast(`${a.nome.split(' ')[0]} adicionado à turma ${tid}`);
  scheduleSave();
    });
  });

  // Realizar reunião button
  document.querySelectorAll('[data-realizar]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.modal = {type:'realizar', reuniaoId:el.dataset.realizar, alunoId:el.dataset.alunoId};
      render();
    });
  });

  // Admin: edit profile


  document.querySelectorAll('[data-edit-profile]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const p = state.profiles.find(x=>x.id===el.dataset.editProfile);
      if (p) { state.modal = {type:'edit-profile', profile:p}; render(); }
    });
  });

  // Admin: delete profile
  document.querySelectorAll('[data-del-profile]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Remover este usuário da plataforma?')) return;
      state.profiles = state.profiles.filter(p=>p.id!==el.dataset.delProfile);
      showToast('Usuário removido');
  scheduleSave();
    });
  });

  // Admin: marcar aula for specific turma
  document.querySelectorAll('[data-marcar-aula-turma]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.selTurma = el.dataset.marcarAulaTurma;
      state.modal = {type:'marcar-aula'};
      render();
    });
  });

  // Admin: edit turma
  document.querySelectorAll('[data-edit-turma]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const t = state.turmas.find(x=>x.id===el.dataset.editTurma);
      if (t) { state.modal = {type:'edit-turma', turma:t}; render(); }
    });
  });

  // Admin: delete turma
  document.querySelectorAll('[data-del-turma]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Excluir esta turma? Os alunos não serão deletados.')) return;
      state.turmas = state.turmas.filter(t=>t.id!==el.dataset.delTurma);
      showToast('Turma excluída');
  scheduleSave();
    });
  });

  // Admin: delete aluno
  document.querySelectorAll('[data-del-aluno]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Remover este médico da plataforma?')) return;
      state.alunos = state.alunos.filter(a=>a.id!==el.dataset.delAluno);
      showToast('Médico removido');
  scheduleSave();
    });
  });

  // Apagar reunião
  document.querySelectorAll('[data-del-reuniao]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Apagar esta reunião permanentemente?')) return;
      const a = state.alunos.find(x=>x.id===el.dataset.alunoId);
      if (!a) return;
      a.reunioes = (a.reunioes||[]).filter(r=>r.id!==el.dataset.delReuniao);
      showToast('Reunião apagada');
      scheduleSave();
      render();
    });
  });

  // Desmarcar reunião
  document.querySelectorAll('[data-desmarcar]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const a = state.alunos.find(x=>x.id===el.dataset.alunoId);
      if (!a) return;
      const r = (a.reunioes||[]).find(x=>x.id===el.dataset.desmarcar);
      if (!r) return;
      if (!confirm('Desmarcar esta reunião como não realizada?')) return;
      r.realizada = false;
      r.notas = '';
      r.proxPassos = '';
      showToast('Reunião desmarcada');
      scheduleSave();
      render();
    });
  });

  // Reagendar
  document.querySelectorAll('[data-reagendar]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.modal = {type:'reagendar', reuniaoId: el.dataset.reagendar, alunoId: el.dataset.alunoId};
      render();
    });
  });
}

// SAVE ACTIONS
// ═══════════════════════════════════════════════════════
function salvarTurma() {
  const nome = document.getElementById('m-turma-nome')?.value.trim();
  if (!nome) return showToast('Nome é obrigatório', 'err');
  if (state.turmas.find(t=>t.id===nome)) return showToast('Turma já existe', 'err');
  const inicio = document.getElementById('m-turma-inicio')?.value || now();
  const fim    = document.getElementById('m-turma-fim')?.value    || addDays(inicio, 365);
  const engId = document.getElementById('m-turma-eng')?.value||'';
  state.turmas.push({id:nome, nome, inicio, fim_previsto:fim, concluida:false, engeId:engId});
  // Auto-schedule aulas biweekly from start date
  if (!state.aulasDates[nome]) state.aulasDates[nome] = {};
  const aulaOrder = AULAS_DEF.filter(a=>a.bloco!=='11');
  aulaOrder.forEach((ad, i) => {
    state.aulasDates[nome][ad.id] = {data: addDays(inicio, i * 14), resp:'', aux:''};
  });
  state.modal = null;
  state.selTurma = nome;
  state.turmaBView = 'agenda';
  showToast(`Turma ${nome} criada — verifique e ajuste as datas`);
  scheduleSave();
  render();
}

function salvarMedico() {
  const nome = document.getElementById('m-nome')?.value.trim();
  const turma = document.getElementById('m-turma')?.value;
  const resp = document.getElementById('m-resp')?.value;
  if (!nome) return showToast('Nome é obrigatório', 'err');
  if (!turma) return showToast('Selecione uma turma', 'err');
  if (!resp) return showToast('Selecione um responsável', 'err');
  const ep = {};
  AULAS_DEF.forEach(a => ep[a.label] = null);
  const novo = {
    id: 'a_' + Date.now(),

function salvarReuniao() {
  const tipo = document.getElementById('m-reu-tipo')?.value;
  const data = document.getElementById('m-reu-data')?.value;
  if (!tipo) return showToast('Selecione o tipo', 'err');
  if (!data) return showToast('Informe a data', 'err');
  const a = state.alunos.find(x=>x.id===state.selAluno);
  if (!a) return;
  if (!a.reunioes) a.reunioes = [];
  const medInt  = document.getElementById('m-reu-medint')?.value || '';
  const respId  = document.getElementById('m-reu-resp')?.value || '';
  const hora = document.getElementById('m-reu-hora')?.value||'';
  const horaFim = document.getElementById('m-reu-hora-fim')?.value||'';
  const reu = {
    id: 'r_' + Date.now(),
    tipo, data, hora, horaFim,
    responsavelId: respId,
    medicoInt: medInt,
    realizada: false,
    notas: '',
    proxPassos: '',
  };
  a.reunioes.push(reu);
  // Reunião Individual → alert Bruna to coordinate with médico interno
  if (tipo === 'Reunião Individual') {
    const medNome = medInt ? (PROFILES.find(p=>p.id===medInt)?.name||medInt) : 'médico interno';
    const titulo = `Confirmar Reunião Individual de ${a.nome.split(' ')[0]} com ${medNome}`;
    const exists = state.tarefas.some(t=>!t.done && t.alunoId===a.id && t.titulo===titulo);
    if (!exists) addTarefa({titulo, responsavel:'bruna', alunoId:a.id, alunoNome:a.nome, prio:'media', descricao:`Reunião agendada para ${fmt(data)}`});
  }
  // Reunião de Planilhas → alert Bruna to collect planilhas
  if (tipo === 'Reunião de Planilhas') {
    const titulo = 'Cobrar planilhas de '+a.nome.split(' ')[0];
    const exists = state.tarefas.some(t=>!t.done && t.alunoId===a.id && t.titulo===titulo);
    if (!exists) addTarefa({titulo, responsavel:'bruna', alunoId:a.id, alunoNome:a.nome, prio:'alta', descricao:'Planilha financeira e de leads'});
  }
  state.modal = null;
  showToast('Reunião agendada para ' + fmt(data));
  scheduleSave();
  render();

  // Criar evento no Google Calendar do responsável
  if (respId && data) {
    const token = gcalGetToken(respId);
    if (token) {
      const event = gcalBuildReuniaoEvent(reu, a);
      gcalCreateEvent(respId, event).then(ev => {
        if (ev?.id) showToast('Evento criado no Google Calendar ✓', 'ok');
      });
    }
  }
}

function salvarAula() {
  const aulaId = document.getElementById('m-aula-id')?.value;
  if (!aulaId) return showToast('Selecione a aula', 'err');
  const tid = state.selTurma || document.getElementById('m-aula-turma')?.value;
  if (!tid) return showToast('Selecione a turma', 'err');
  const resp = document.getElementById('m-aula-resp')?.value || '';
  const aux = document.getElementById('m-aula-aux')?.value || '';
  const data = document.getElementById('m-aula-data')?.value || '';
  if (!state.presenca[tid]) state.presenca[tid] = {};
  if (!state.presenca[tid][aulaId]) state.presenca[tid][aulaId] = {};
  // Store date + responsible
  if (!state.aulasDates[tid]) state.aulasDates[tid] = {};
  state.aulasDates[tid][aulaId] = {data, resp, aux};
  // If auxiliar selected → add task for them
  if (aux) {
    const auxProfile = PROFILES.find(p=>p.name===aux);
    if (auxProfile) {
      const aulaLabel = AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId;
      const turmaLabel = state.turmas.find(t=>t.id===tid)?.nome||tid;
      const exists = state.tarefas.some(t=>!t.done && t.responsavel===auxProfile.id && t.titulo===`Auxiliar em ${aulaLabel}`);
      if (!exists) addTarefa({titulo:`Auxiliar em ${aulaLabel}`, responsavel:auxProfile.id, prazo:data, descricao:`Turma ${turmaLabel}${data?' · '+data:''}`, prio:'media'});
    }
  }
  // Also add to responsavel's calendar if different from current user
  if (resp) {
    const respProfile = PROFILES.find(p=>p.name===resp);
    if (respProfile && respProfile.id !== state.user?.id) {
      const aulaLabel = AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId;
      const turmaLabel = state.turmas.find(t=>t.id===tid)?.nome||tid;
      const exists = state.tarefas.some(t=>!t.done && t.responsavel===respProfile.id && t.titulo===`Responsável em ${aulaLabel}`);
      if (!exists) addTarefa({titulo:`Responsável em ${aulaLabel}`, responsavel:respProfile.id, prazo:data, descricao:`Turma ${turmaLabel}${data?' · '+data:''}`, prio:'media'});
    }
  }
  state.modal = null;
  showToast('Aula marcada');
  scheduleSave();

  // Criar evento no Google Calendar do responsável da aula
  if (data && resp) {
    const respProf = PROFILES.find(p=>p.name===resp);
    if (respProf) {
      const token = gcalGetToken(respProf.id);
      if (token) {
        const aulaLabel2 = AULAS_DEF.find(a=>a.id===aulaId)?.label||aulaId;
        const turmaLabel2 = state.turmas.find(t=>t.id===tid)?.nome||tid;
        const event = gcalBuildAulaEvent(aulaLabel2, turmaLabel2, data);
        gcalCreateEvent(respProf.id, event).then(ev => {
          if (ev?.id) showToast('Evento de aula criado no Google Calendar ✓', 'ok');
        });
      }
    }
  }
  render();
}

function buildCalendario(t, alunos) {
  // All aulas with dates, sorted by date
  const aulasDatesT = state.aulasDates[t.id] || {};
  const agendadas = [];
  AULAS_DEF.forEach(ad => {
    const info = aulasDatesT[ad.id];
    if (info && info.data) {
      agendadas.push({...ad, ...info});
    }
  });
  agendadas.sort((a,b) => a.data.localeCompare(b.data));

  // Aulas sem data = sem agendar ainda
  const semData = AULAS_DEF.filter(ad => ad.bloco !== '11' && !aulasDatesT[ad.id]?.data);

  // Build a simple monthly calendar view for current month + next
  const today = new Date();
  const months = [];
  for (let mi = 0; mi < 3; mi++) {
    const d = new Date(today.getFullYear(), today.getMonth()+mi, 1);
    months.push({year: d.getFullYear(), month: d.getMonth()});
  }

  function buildMonth(year, month) {
    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const pad = firstDay === 0 ? 6 : firstDay - 1; // Mon-start
    const todayStr = today.toISOString().slice(0,10);

    // Map aulas to dates in this month
    const aulasByDate = {};
    agendadas.forEach(a => {
      const d = new Date(a.data);
      if (d.getFullYear()===year && d.getMonth()===month) {
        if (!aulasByDate[d.getDate()]) aulasByDate[d.getDate()] = [];
        aulasByDate[d.getDate()].push(a);
      }
    });

    let cells = '';
    for (let i=0; i<pad; i++) cells += '<div></div>';
    for (let d=1; d<=daysInMonth; d++) {
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const aulasHoje = aulasByDate[d] || [];
      cells += `<div style="min-height:60px;padding:4px;border-radius:var(--r);border:1px solid ${isToday?'var(--brand-h)':aulasHoje.length?'rgba(99,102,241,.3)':'var(--border)'};background:${isToday?'var(--brand-dim)':aulasHoje.length?'rgba(99,102,241,.06)':'transparent'};position:relative">
        <div style="font-size:11px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--brand-h)':'var(--t4)'};margin-bottom:2px">${d}</div>
        ${aulasHoje.map(a=>`<div style="font-size:9.5px;background:var(--brand);color:#fff;border-radius:3px;padding:1px 5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${a.label}">${a.label.split('—')[0].trim()}</div>`).join('')}
      </div>`;
    }
    return `
    <div style="margin-bottom:24px">
      <div style="font-family:var(--fh);font-weight:600;font-size:15px;color:var(--t1);margin-bottom:12px">${monthNames[month]} ${year}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">
        ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div style="font-size:10px;font-weight:600;color:var(--t4);text-align:center;padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
    </div>`;
  }

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="section-title" style="margin:0">Calendário de Aulas — Turma ${t.nome}</div>
      <button class="btn btn-primary btn-sm" data-action="marcar-aula">${I.plus} Agendar Aula</button>
    </div>

    ${agendadas.length > 0 ? `
    <div style="margin-bottom:20px">
      <div class="section-title">Próximas Aulas Agendadas</div>
      ${agendadas.filter(a=>a.data>=today.toISOString().slice(0,10)).slice(0,5).map(a=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;background:var(--bg-s)">
          <div style="width:44px;height:44px;border-radius:var(--r);background:var(--brand-dim);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:16px;font-weight:700;font-family:var(--fh);color:var(--brand-h)">${new Date(a.data+'T12:00').getDate()}</span>
            <span style="font-size:9px;color:var(--brand-h)">${new Date(a.data+'T12:00').toLocaleDateString('pt-BR',{month:'short'}).toUpperCase()}</span>
          </div>
          <div style="flex:1">
            <div style="font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)">${a.label}</div>
            <div style="font-size:12px;color:var(--t4);margin-top:2px">
              ${a.resp ? `Responsável: ${a.resp}` : ''}${a.aux ? ` · Auxiliar: ${a.aux}` : ''}
            </div>
          </div>
          <span class="pill pill-blue" style="font-size:10px">${a.data}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${months.map(({year,month}) => buildMonth(year,month)).join('')}

    <!-- Turma color legend -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      ${state.turmas.map(t => {
        const col = turmaColor(t.id);
        return `<div style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--t2)">
          <div style="width:12px;height:12px;border-radius:3px;background:${col.bg};flex-shrink:0"></div>
          ${t.nome}
        </div>`;
      }).join('')}
    </div>

    ${semData.length > 0 ? `
    <div class="divider"></div>
    <div class="section-title">Aulas Sem Data Definida</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${semData.map(ad=>`<span class="pill pill-gray" style="font-size:11.5px">${ad.label}</span>`).join('')}
    </div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════════════════════
// CALENDÁRIO PAGE (global — todas as turmas)
// ═══════════════════════════════════════════════════════
function buildCalendarioPage() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const monthShort = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dayNames = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

  // Init state
  if (!state.calYear)  state.calYear  = today.getFullYear();
  if (!state.calMonth) state.calMonth = today.getMonth();
  if (!state.calView)  state.calView  = 'month';
  if (state.calWeek === undefined) state.calWeek = 0;
  if (!state.calTurmaFilter) state.calTurmaFilter = 'todas';

  const year  = state.calYear;
  const month = state.calMonth;
  const view  = state.calView;

  // Collect all aulas across all turmas
  let allAulas = [];
  state.turmas.forEach(t => {
    const datesMap = state.aulasDates[t.id] || {};
    Object.entries(datesMap).forEach(([aulaId, info]) => {
      if (!info.data) return;
      const def = AULAS_DEF.find(a => a.id === aulaId);
      if (!def) return;
      allAulas.push({...def, ...info, turma: t.id, turmaName: t.nome});
    });
  });

  // Apply turma filter
  const filteredAulas = state.calTurmaFilter === 'todas'
    ? allAulas
    : allAulas.filter(a => a.turma === state.calTurmaFilter);

  // Build day→events map
  function buildByDate(aulasList) {
    const map = {};
    aulasList.forEach(a => {
      const d = new Date(a.data + 'T12:00');
      if (d.getFullYear() === year && d.getMonth() === month) {
        const key = d.getDate();
        if (!map[key]) map[key] = [];
        map[key].push(a);
      }
    });
    return map;
  }

  function eventChip(a, size='sm') {
    const fs = size==='lg' ? '11px' : '9.5px';
    const pad = size==='lg' ? '4px 8px' : '2px 5px';
    return `<div style="font-size:${fs};background:${turmaColor(a.turma).bg};color:${turmaColor(a.turma).text};border-radius:3px;padding:${pad};margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.label} — ${a.turmaName}">
      <b>${a.turmaName}</b> ${a.label.split('—')[0].trim()}
    </div>`;
  }

  // ── MONTH VIEW ──────────────────────────────────────────
  function renderMonth() {
    const byDate = buildByDate(filteredAulas);
    const daysInMonth = new Date(year, month+1, 0).getDate();
    let firstDay = new Date(year, month, 1).getDay();
    const pad = firstDay === 0 ? 6 : firstDay - 1;

    let cells = '';
    for (let i = 0; i < pad; i++) cells += '<div style="min-height:80px"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const events  = byDate[d] || [];
      const isPast  = dateStr < todayStr;
      cells += `<div style="min-height:80px;padding:5px 6px;border-radius:6px;border:1px solid ${isToday?'var(--brand-h)':events.length?'rgba(99,102,241,.3)':'var(--border)'};background:${isToday?'var(--brand-dim)':events.length?'rgba(99,102,241,.04)':'transparent'};opacity:${isPast&&!events.length?'.4':'1'}">
        <div style="font-size:11px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--brand-h)':'var(--t4)'};margin-bottom:3px;text-align:right">${d}</div>
        ${events.map(a => eventChip(a)).join('')}
      </div>`;
    }

    return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>`;
  }

  // ── WEEK VIEW ───────────────────────────────────────────
  function renderWeek() {
    const byDate = buildByDate(filteredAulas);
    const daysInMonth = new Date(year, month+1, 0).getDate();
    let firstDay = new Date(year, month, 1).getDay();
    const pad = firstDay === 0 ? 6 : firstDay - 1;

    const allCells = [];
    for (let i = 0; i < pad; i++) allCells.push(null);
    for (let d = 1; d <= daysInMonth; d++) allCells.push(d);
    const totalWeeks = Math.ceil(allCells.length / 7);
    const wk = Math.min(state.calWeek||0, totalWeeks-1);
    const weekCells = allCells.slice(wk*7, wk*7+7);

    const cells = weekCells.map(d => {
      if (!d) return '<div style="min-height:120px;border-radius:6px;border:1px solid var(--border);opacity:.3"></div>';
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const events  = byDate[d] || [];
      const isPast  = dateStr < todayStr;
      return `<div style="min-height:120px;padding:8px;border-radius:6px;border:1px solid ${isToday?'var(--brand-h)':events.length?'rgba(99,102,241,.3)':'var(--border)'};background:${isToday?'var(--brand-dim)':events.length?'rgba(99,102,241,.04)':'transparent'};opacity:${isPast&&!events.length?'.4':'1'}">
        <div style="font-size:13px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--brand-h)':'var(--t2)'};margin-bottom:6px">${d}</div>
        ${events.map(a => eventChip(a,'lg')).join('')}
        ${!events.length?'<div style="font-size:10px;color:var(--t4);margin-top:4px">—</div>':''}
      </div>`;
    }).join('');

    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <button class="btn btn-ghost btn-sm" data-cal-week="-1" ${wk<=0?'disabled':''}>← Anterior</button>
        <span style="font-size:12px;color:var(--t3)">Semana ${wk+1} de ${totalWeeks}</span>
        <button class="btn btn-ghost btn-sm" data-cal-week="1" ${wk>=totalWeeks-1?'disabled':''}>Próxima →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>`;
  }

  // ── DAY VIEW ────────────────────────────────────────────
  function renderDay() {
    if (!state.calDay) state.calDay = todayStr;
    const d = new Date(state.calDay + 'T12:00');
    const events = filteredAulas.filter(a => a.data === state.calDay);
    const dayNames2 = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button class="btn btn-ghost btn-sm" data-cal-day="-1">← Anterior</button>
        <div style="text-align:center">
          <div style="font-family:var(--fh);font-weight:700;font-size:22px;color:var(--t1)">${d.getDate()}</div>
          <div style="font-size:12px;color:var(--t4)">${dayNames2[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getFullYear()}</div>
        </div>
        <button class="btn btn-ghost btn-sm" data-cal-day="1">Próximo →</button>
      </div>
      ${events.length ? events.map(a => `
        <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r2);border:1px solid ${turmaColor(a.turma).bg}44;background:${turmaColor(a.turma).bg}18;margin-bottom:10px">
          <div style="width:44px;height:44px;border-radius:var(--r);background:${turmaColor(a.turma).bg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:13px;font-weight:700;color:${turmaColor(a.turma).text}">${a.turmaName}</span>
          </div>
          <div>
            <div style="font-family:var(--fh);font-weight:600;font-size:14px;color:var(--t1)">${a.label}</div>
            <div style="font-size:12px;color:var(--t4);margin-top:2px">${a.turmaName}</div>
          </div>
        </div>`).join('')
      : `<div class="empty-state">${I.calendar}<p>Nenhuma aula neste dia</p></div>`}`;
  }

  // ── TURMA FILTER OPTIONS ────────────────────────────────
  const turmaOptions = state.turmas.filter(t => {
    const hasDates = Object.values(state.aulasDates[t.id]||{}).some(v=>v.data);
    return hasDates;
  });

  const upcomingAll = filteredAulas.filter(a => a.data >= todayStr).sort((a,b)=>a.data.localeCompare(b.data));

  return `
  <div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Calendário de Aulas</div>
        <div class="page-sub">${filteredAulas.length} aula${filteredAulas.length!==1?'s':''} agendada${filteredAulas.length!==1?'s':''}</div>
      </div>
    </div>
    <div class="page-body">

      <!-- Controls -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">

        <!-- Nav + Month title -->
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost btn-sm" data-cal-nav="-1">${I.back}</button>
          <span style="font-family:var(--fh);font-weight:600;font-size:15px;color:var(--t1);min-width:140px;text-align:center">${monthNames[month]} ${year}</span>
          <button class="btn btn-ghost btn-sm" data-cal-nav="1">›</button>
        </div>

        <!-- View toggle -->
        <div class="inner-tabs" style="margin:0">
          <div class="inner-tab ${view==='day'?'active':''}" data-cal-view="day" style="font-size:12px;padding:4px 12px">Dia</div>
          <div class="inner-tab ${view==='week'?'active':''}" data-cal-view="week" style="font-size:12px;padding:4px 12px">Semana</div>
          <div class="inner-tab ${view==='month'?'active':''}" data-cal-view="month" style="font-size:12px;padding:4px 12px">Mês</div>
        </div>

        <!-- Turma filter -->
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--t4)">Turma:</span>
          <select id="cal-turma-filter" class="inp" style="padding:4px 8px;font-size:12px;width:auto">
            <option value="todas" ${state.calTurmaFilter==='todas'?'selected':''}>Todas</option>
            ${turmaOptions.map(t=>`<option value="${t.id}" ${state.calTurmaFilter===t.id?'selected':''}>${t.nome}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- Day headers (not for day view) -->
      ${view !== 'day' ? `
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
        ${dayNames.map(d=>`<div style="font-size:10px;font-weight:600;color:var(--t4);text-align:center;padding:4px 0">${d}</div>`).join('')}
      </div>` : ''}

      <!-- Grid -->
      ${view==='month' ? renderMonth() : view==='week' ? renderWeek() : renderDay()}

      <!-- Upcoming list -->
      ${upcomingAll.length > 0 ? `
      <div class="divider" style="margin-top:24px"></div>
      <div class="section-title" style="margin-bottom:12px">Próximas Aulas</div>
      ${upcomingAll.slice(0,8).map(a => {
        const d = new Date(a.data + 'T12:00');
        return `<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid ${turmaColor(a.turma).bg}44;border-radius:var(--r2);margin-bottom:8px;background:${turmaColor(a.turma).bg}11">
          <div style="width:44px;height:44px;border-radius:var(--r);background:${turmaColor(a.turma).bg};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:16px;font-weight:700;font-family:var(--fh);color:${turmaColor(a.turma).text};line-height:1">${d.getDate()}</span>
            <span style="font-size:9px;color:${turmaColor(a.turma).text};opacity:.8;text-transform:uppercase">${monthShort[d.getMonth()]}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--fh);font-weight:600;font-size:13.5px;color:var(--t1)">${a.label}</div>
            <div style="font-size:12px;color:var(--brand-h);margin-top:2px">${a.turmaName}</div>
          </div>
          <span style="font-size:12px;color:var(--t4);flex-shrink:0">${a.data}</span>
        </div>`;
      }).join('')}
      ${upcomingAll.length > 8 ? `<div style="text-align:center;font-size:12.5px;color:var(--t4);padding:8px">+ ${upcomingAll.length-8} mais</div>` : ''}
      ` : `<div class="divider" style="margin-top:24px"></div><div class="empty-state" style="padding:24px 0">${I.calendar}<p>Nenhuma aula agendada</p></div>`}

    </div>
  </div>`;
}

  // Collect all scheduled aulas across all turmas
  const allAulas = [];
  state.turmas.forEach(t => {
    const datesMap = state.aulasDates[t.id] || {};
    Object.entries(datesMap).forEach(([aulaId, info]) => {
      if (!info.data) return;
      const def = AULAS_DEF.find(a => a.id === aulaId);
      if (!def) return;
      allAulas.push({...def, ...info, turma: t.id, turmaName: t.nome});
    });
  });

// ── Visão Geral ──
function buildAdminGeral() {
  const totalAlunos  = state.alunos.length;
  const ativos       = state.alunos.filter(a=>a.status==='ativo').length;
  const churn        = state.alunos.filter(a=>a.status==='churn').length;
  const pausado      = state.alunos.filter(a=>a.status==='pausado').length;

  const turmasCount  = state.turmas.length;
  const tarefasPend  = state.tarefas.filter(t=>!t.done).length;

  // Last access per user from stats
  const recentUsers = Object.entries(state.accessStats?.lastAccess || {})
    .map(([uid, ts]) => ({ uid, ts, name: (state.accessStats?.byUser?.[uid]?.name || uid) }))
    .sort((a, b) => b.ts.localeCompare(a.ts))
    .slice(0, 5);

  return `
  <div>
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-val">${totalAlunos}</div><div class="stat-lbl">Total alunos</div></div>

      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${churn}</div><div class="stat-lbl">Churn</div></div>
    </div>
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-val">${turmasCount}</div><div class="stat-lbl">Turmas</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${tarefasPend}</div><div class="stat-lbl">Tarefas pendentes</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${semPlanilha}</div><div class="stat-lbl">Sem planilhas</div></div>
    </div>

    <div class="divider"></div>
    <div class="section-title">Último Acesso por Pessoa</div>
    ${recentUsers.length===0 ? '<div style="color:var(--t4);font-size:13px">Nenhuma atividade registrada ainda.</div>' : ''}
    ${recentUsers.map(u => {
      const dt = new Date(u.ts);
      const time = dt.toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:var(--brand-h);flex-shrink:0">${u.name.charAt(0)}</div>
        <div style="flex:1">
          <span style="font-weight:500;color:var(--t1)">${u.name}</span>
        </div>
        <span style="font-size:11.5px;color:var(--t4)">${time}</span>
      </div>`;
    }).join('')}

    <div class="divider"></div>
    <div class="section-title">Alunos sem Planilhas</div>
    ${state.alunos.filter(a=>!a.link_fin||!a.link_leads).slice(0,8).map(a=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;background:var(--bg-s)">
        <span style="font-size:13px;color:var(--t1)">${a.nome}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:11px;color:var(--brand-h)">${a.turma||'—'}</span>
          ${!a.link_fin   ? '<span class="pill pill-red" style="font-size:10px">Fin</span>'   : ''}
          ${!a.link_leads ? '<span class="pill pill-red" style="font-size:10px">Leads</span>' : ''}
        </div>
      </div>
    `).join('')}
  </div>`;
}

function buildAdminRelatorio() {
  const stats    = state.accessStats || { byUser: {}, byPage: {}, lastAccess: {} };
  const userStats = Object.entries(stats.byUser || {})
    .map(([id, d]) => ({ id, ...d }))
    .filter(u => u.total > 0)
    .sort((a, b) => b.total - a.total);
  const totalAcessos = userStats.reduce((s, u) => s + u.total, 0) || 1;

  const pageStats = Object.entries(stats.byPage || {}).sort((a, b) => b[1] - a[1]);
  const totalPages = pageStats.reduce((s, [, v]) => s + v, 0) || 1;

  const pageLabels = {
    turmas: 'Turmas', tarefas: 'Tarefas', medicos: 'Médicos',
    calendario: 'Calendário', admin: 'Admin', monitoramento: 'Monitoramento',
    'minhas-reunioes': 'Minhas Reuniões', kanban: 'Kanban', login: 'Login'
  };

  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div class="section-title" style="margin:0">Relatório de Uso</div>
      <span class="pill pill-gray" style="font-size:11px">${totalAcessos} acessos registrados</span>
    </div>

    ${userStats.length === 0 ? `<div class="empty-state" style="padding:24px 0"><p>Nenhum acesso registrado ainda</p></div>` : `

    <!-- Por usuário -->
    <div class="section-title" style="margin-bottom:12px">Uso por pessoa</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:28px">
      ${userStats.map(u => {
        const pct = Math.round(u.total / totalAcessos * 100);
        const topPage = Object.entries(u.pages||{}).sort((a,b)=>b[1]-a[1])[0];
        return `
        <div style="padding:12px 16px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg-s)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:30px;height:30px;border-radius:50%;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--brand-h)">${u.name.charAt(0)}</div>
              <span style="font-weight:600;color:var(--t1)">${u.name}</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              ${topPage ? `<span style="font-size:11px;color:var(--t4)">Mais usa: <b style="color:var(--t2)">${pageLabels[topPage[0]]||topPage[0]}</b></span>` : ''}
              <span style="font-size:13px;font-weight:700;color:var(--brand-h)">${pct}%</span>
              <span style="font-size:12px;color:var(--t4)">${u.total} acessos</span>
            </div>
          </div>
          <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--brand-h);border-radius:3px;transition:width .3s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Por aba -->
    <div class="section-title" style="margin-bottom:12px">Uso por funcionalidade</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${pageStats.map(([page, cnt]) => {
        const pct = Math.round(cnt / totalPages * 100);
        return `
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:13px;color:var(--t2);width:140px;flex-shrink:0">${pageLabels[page]||page}</span>
          <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--brand-h);border-radius:3px"></div>
          </div>
          <span style="font-size:12px;color:var(--t4);width:60px;text-align:right">${cnt} (${pct}%)</span>
        </div>`;
      }).join('')}

    `}
  </div>`;

let _importPending = [];

function processarImport() {
  if (!_importPending.length) return;
  let added=0, updated=0;
  _importPending.forEach(row => {
    const existing = state.alunos.find(a=>a.nome.trim().toLowerCase()===row.nome.trim().toLowerCase());
    if (existing) {
      Object.assign(existing, row);
      updated++;
    } else {
      const ep={};AULAS_DEF.forEach(a=>ep[a.label]=null);
      state.alunos.push({...row, id:'a_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        taxa_presenca:0, progress:ep, reunioes:[], notas:'', log_cs:'', status:'ativo'});
      added++;
    }
  });
  _importPending = [];
  state.modal = null;
  scheduleSave();
  showToast(`${added} adicionados, ${updated} atualizados`);
  render();
}

function parseImportFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1});
      // Find header row (contains 'Nome')
      let hdr=-1;
      for(let i=0;i<Math.min(raw.length,10);i++){
        if(raw[i]&&raw[i].some(v=>String(v||'').trim()==='Nome')){hdr=i;break;}
      }
      if(hdr<0){showToast('Coluna "Nome" não encontrada','err');return;}
      const headers = raw[hdr].map(h=>String(h||'').trim());
      const get=(row,col)=>{const i=headers.indexOf(col);return i>=0?String(row[i]||'').trim():'';};
      _importPending = [];
      for(let i=hdr+1;i<raw.length;i++){
        const row=raw[i]; if(!row||!row.length) continue;
        const nome=get(row,'Nome'); if(!nome) continue;
        const turmaRaw=get(row,'Turma');
        const status = ['Churn','churn'].includes(turmaRaw)?'churn':['Pausado','pausado'].includes(turmaRaw)?'pausado':'-'===turmaRaw?'inativo':'ativo';
        const turma  = ['Churn','Pausado','-',''].includes(turmaRaw)?'':turmaRaw;
        const resp   = get(row,'Responsável Engenheiro')||get(row,'Responsável')||'';
        _importPending.push({nome, turma, status,
          responsavel: resp, especialidade:'', clinica:'', cidade:'',
          cep:'', endereco:'', whatsapp:'', instagram:'', cpf:'',
          nascimento:'', turnos:'', media_atend:'', preco_consulta:'',
          realiza_proc:'', desc_proc:'', convenios:'', desc_conv:'',
          outros_vinculos:'', inicio:'', fim_previsto:'', link_fin:'', link_leads:''});
      }
      // Show preview
      const preview = document.getElementById('import-preview');
      const count   = document.getElementById('import-preview-count');
      const list    = document.getElementById('import-preview-list');
      const btn     = document.getElementById('import-confirm-btn');
      if(preview&&count&&list&&btn){
        preview.style.display='block';
        count.textContent=`${_importPending.length} médicos encontrados`;
        list.innerHTML=_importPending.slice(0,10).map(r=>`
          <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
            <span style="color:var(--t1);font-weight:500;flex:1">${r.nome}</span>
            <span style="color:var(--t4)">${r.turma||'—'}</span>
            <span style="color:var(--brand-h)">${r.responsavel||'—'}</span>
          </div>`).join('')+(_importPending.length>10?`<div style="color:var(--t4);font-size:11.5px;padding:6px 0">...e mais ${_importPending.length-10}</div>`:'');
        btn.disabled=false; btn.style.opacity='1';
      }
    } catch(err){showToast('Erro ao ler arquivo: '+err.message,'err');}
  };

}


function buildDetailOKRs(a) {
  if (!a.okrs) a.okrs = [];
  const now_d  = new Date();
  const curMes = now_d.getMonth();
  const curAno = now_d.getFullYear();
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mesKey = `${curAno}-${String(curMes+1).padStart(2,'0')}`;

  // Performance chart — last 6 months
  const chartMonths = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(curAno, curMes-i, 1);
    chartMonths.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label:months[d.getMonth()]});
  }
  const monthScores = {};
  a.okrs.forEach(okr => {
    (okr.kpis||[]).forEach(kpi => {
      (kpi.meses||[]).forEach(m => {
        if (!monthScores[m.key]) monthScores[m.key]={total:0,done:0};
        monthScores[m.key].total++;
        if (m.done) monthScores[m.key].done++;
      });
    });
  });

  return `
  <div>
    <!-- Mini bar chart -->
    <div class="section-title" style="margin-bottom:10px">Desempenho Mensal</div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:72px;margin-bottom:22px">
      ${chartMonths.map(m => {
        const sc  = monthScores[m.key];
        const pct = sc&&sc.total ? Math.round(sc.done/sc.total*100) : 0;
        const col = pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
        const h   = Math.max(pct*0.55, pct?3:0);
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
          <div style="font-size:10px;color:var(--t4);min-height:14px">${pct?pct+'%':''}</div>
          <div style="width:100%;height:${h}px;border-radius:3px;background:${col}"></div>
          <div style="font-size:10px;color:var(--t4)">${m.label}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Metas header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-title" style="margin:0">Metas</div>
      <button class="btn btn-primary btn-sm" data-action="novo-okr" data-aluno-id="${a.id}">${I.plus} Nova Meta</button>
    </div>

    ${a.okrs.length===0 ? `
      <div class="empty-state" style="padding:20px 0"><p>Nenhuma meta cadastrada ainda</p></div>
    ` : ''}

    ${a.okrs.map((okr, oi) => {
      const totalKpis = (okr.kpis||[]).length;
      const doneKpis  = (okr.kpis||[]).filter(k => k.meses?.some(m=>m.key===mesKey&&m.done)).length;
      const pct = totalKpis ? Math.round(doneKpis/totalKpis*100) : 0;
      const pctColor = pct>=80?'var(--green-t)':pct>=50?'var(--amber-t)':'var(--red-t)';
      return `
      <div style="border:1px solid var(--border2);border-radius:var(--r2);margin-bottom:14px;overflow:hidden">
        <!-- Meta header -->
        <div style="padding:13px 16px;background:var(--bg-t);display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--fh);font-weight:600;font-size:14px;color:var(--t1);line-height:1.4">${okr.objetivo}</div>
            ${totalKpis ? `
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
                <div style="flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden">
                  <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:2px;transition:width .3s"></div>
                </div>
                <span style="font-size:11.5px;font-weight:600;color:${pctColor}">${doneKpis}/${totalKpis} este mês</span>
              </div>

          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button class="btn btn-ghost btn-xs" data-novo-kpi="${oi}" data-aluno-id="${a.id}">+ KPI</button>

        ` : (okr.kpis||[]).map((kpi, ki) => {

            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              <span style="font-size:11px;color:var(--t4)">${months[curMes]}</span>
              <button class="btn btn-xs" style="background:var(--red-bg);color:var(--red-t);border:1px solid var(--red-b)" data-del-kpi="${oi}-${ki}" data-aluno-id="${a.id}">${I.trash}</button>

    }).join('')}
  </div>`;
}

let _importTurmasPending = [];

function processarImportTurmas() {
  if (!_importTurmasPending.length) return;
  let turmasAdded=0, turmasExist=0, medAdded=0, medUpdated=0;

  _importTurmasPending.forEach(row => {
    // Create turma if not exists
    if (row.turma) {
      if (!state.turmas.find(t=>t.id===row.turma)) {
        state.turmas.push({id:row.turma, nome:row.turma, inicio:'', fim_previsto:'', concluida:false, engeId:''});
        turmasAdded++;
      } else {
        turmasExist++;
      }
    }
    // Create or update medico
    const existing = state.alunos.find(a=>a.nome.trim().toLowerCase()===row.nome.trim().toLowerCase());
    if (existing) {
      if (row.turma)       existing.turma       = row.turma;
      if (row.responsavel) existing.responsavel  = row.responsavel;
      if (row.status)      existing.status       = row.status;
      // Import presença
      if (row.turma && row.presencaRow && Object.keys(row.presencaRow).length) {
        if (!state.presenca[row.turma]) state.presenca[row.turma] = {};
        Object.entries(row.presencaRow).forEach(([aulaId, val]) => {
          if (!state.presenca[row.turma][aulaId]) state.presenca[row.turma][aulaId] = {};
          state.presenca[row.turma][aulaId][existing.id] = val;
          if (val==='nao') { if(!state.faltaLog[existing.id])state.faltaLog[existing.id]={}; if(!state.faltaLog[existing.id][aulaId])state.faltaLog[existing.id][aulaId]=[]; if(!state.faltaLog[existing.id][aulaId].includes('nao'))state.faltaLog[existing.id][aulaId].push('nao'); }
        });
      }
      // Import etapas
      if (row.etapasRow && Object.keys(row.etapasRow).length) {
        if (!state.etapas[existing.id]) state.etapas[existing.id] = {};
        Object.assign(state.etapas[existing.id], row.etapasRow);
      }
      medUpdated++;
    } else {
      const ep={}; AULAS_DEF.forEach(a=>ep[a.label]=null);
      state.alunos.push({...row, id:'a_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        especialidade:'', clinica:'', cidade:'', cep:'', endereco:'', whatsapp:'',
        instagram:'', cpf:'', nascimento:'', turnos:'', media_atend:'', preco_consulta:'',
        realiza_proc:'', desc_proc:'', convenios:'', desc_conv:'', outros_vinculos:'',
        inicio:'', fim_previsto:'', link_fin:'', link_leads:'',
        taxa_presenca:0, progress:ep, reunioes:[], notas:'', log_cs:'', okrs:[]});
      medAdded++;
    }
  });

  // Sort turmas by number
  state.turmas.sort((a,b)=>{
    const na=parseInt(a.id.replace(/\D/g,''))||0, nb=parseInt(b.id.replace(/\D/g,''))||0;
    return na-nb;
  });

  // Recalculate taxa_presenca for all alunos
  state.alunos.forEach(a => {
    const pTid = state.presenca[a.turma]||{};
    const aulaIds = AULAS_DEF.filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
    const realized = aulaIds.filter(id => Object.keys(pTid[id]||{}).length > 0);
    if (!realized.length) return;
    const presentes = realized.filter(id => ['sim','sim2','link'].includes((pTid[id]||{})[a.id])).length;
    a.taxa_presenca = Math.round(presentes/realized.length*100);
  });
  _importTurmasPending = [];
  state.modal = null;
  scheduleSave();
  const totalPres = Object.values(state.presenca).reduce((s,t)=>s+Object.values(t).reduce((s2,a)=>s2+Object.keys(a).length,0),0);
  showToast(`${turmasAdded} turmas · ${medAdded} adicionados · ${medUpdated} atualizados · ${totalPres} presenças`);
  render();
}

function parsePlanilhaTurmas(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1});
      // Find header row
      let hdr=-1;
      for(let i=0;i<Math.min(raw.length,10);i++){
        if(raw[i]&&raw[i].some(v=>String(v||'').trim()==='Nome')){hdr=i;break;}
      }
      if(hdr<0){showToast('Coluna "Nome" não encontrada','err');return;}
      const headers = raw[hdr].map(h=>String(h||'').trim());
      const get=(row,col)=>{const i=headers.indexOf(col);return i>=0?String(row[i]||'').trim():'';};

      _importTurmasPending = [];
      for(let i=hdr+1;i<raw.length;i++){
        const row=raw[i]; if(!row||!row.length) continue;
        const nome=get(row,'Nome'); if(!nome) continue;
        const turmaRaw=get(row,'Turma');
        const status=['Churn','churn'].includes(turmaRaw)?'churn':['Pausado','pausado'].includes(turmaRaw)?'pausado':'-'===turmaRaw?'inativo':'ativo';
        const turma=['Churn','Pausado','-',''].includes(turmaRaw)?'':turmaRaw;
        const resp=get(row,'Responsável Engenheiro')||get(row,'Responsável')||'';
        // Read presença for each aula
        const presencaRow = {};
        const etapasRow   = {};
        Object.entries(PLANILHA_AULA_MAP).forEach(([col, aulaId]) => {
          const i = headers.indexOf(col);
          if (i < 0) return;
          const vRaw = (row[i]!==undefined && row[i]!==null) ? String(row[i]).trim() : '';
          const v = vRaw.normalize('NFC');
          if (v==='Sim'||v==='sim'||v==='S') presencaRow[aulaId]='sim';
          else if (v==='Não'||v==='Nao'||v==='não'||v==='nao'||v==='N'||v==='não') presencaRow[aulaId]='nao';
          else if (v==='Link'||v==='link'||v==='L') presencaRow[aulaId]='link';
        });
        // Read etapas (bloco 0)
        Object.entries(PLANILHA_ETAPA_MAP).forEach(([col, etapaId]) => {
          const i = headers.indexOf(col);
          if (i < 0) return;
          const vE = (row[i]!==undefined && row[i]!==null) ? String(row[i]).trim().normalize('NFC') : '';
          if (vE==='Sim'||vE==='sim'||vE==='S') etapasRow[etapaId+'_done']=true;
        });
        _importTurmasPending.push({nome, turma, status, responsavel:resp, presencaRow, etapasRow});
      }

      // Build preview grouped by turma
      const byTurma={};
      _importTurmasPending.forEach(r=>{
        const t=r.turma||'Sem turma';

      const preview=document.getElementById('import-turmas-preview');

          </div>`).join('');
        btn.disabled=false; btn.style.opacity='1';
      }
    } catch(err){showToast('Erro: '+err.message,'err');}

// isRisco only for presença (excludes planilhas)
function isRiscoPresenca(a) {
  const {maxFaltas=2, maxConsec=2, maxConsecLink=3} = state.riscoCriteria||{};
  const aulaIds = AULAS_DEF.filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const fLog = state.faltaLog[a.id]||{};
  const faltas = aulaIds.filter(id => (fLog[id]||[]).includes('nao')).length;
  const pTid = state.presenca[a.turma]||{};
  const aulaVals = aulaIds.map(id => (pTid[id]||{})[a.id]||null);
  let consec=0,maxC=0; aulaVals.forEach(v=>{if(v==='nao'){consec++;maxC=Math.max(maxC,consec);}else consec=0;});
  let linkC=0,maxLink=0; aulaVals.forEach(v=>{if(v==='link'||v==='sim2'){linkC++;maxLink=Math.max(maxLink,linkC);}else linkC=0;});
  return faltas>=maxFaltas || maxC>=maxConsec || maxLink>=maxConsecLink;
}

// Recalculate taxa_presenca for all alunos in a turma from live state.presenca
function recalcTaxaPresenca(tid) {
  if (!tid) return;
  const pTid   = state.presenca[tid] || {};
  const aulaIds = AULAS_DEF.filter(ad=>ad.bloco!=='11').map(ad=>ad.id);
  const held   = aulaIds.filter(id => Object.keys(pTid[id]||{}).length > 0);
  state.alunos.filter(a=>a.turma===tid).forEach(a => {
    if (!held.length) { a.taxa_presenca = 0; return; }
    const presentes = held.filter(id => ['sim','sim2','link'].includes((pTid[id]||{})[a.id])).length;
    a.taxa_presenca = Math.round(presentes / held.length * 100);
  });
}

async function init() {
  // Carrega profiles do Supabase antes de renderizar a tela de login
  // para que novos usuários criados apareçam imediatamente
  try {
    const rows = await dbSelect('mba_exp_presenca_state', 'id=eq.main&select=data');
    if (rows && rows[0]?.data?.profiles) {
      const dbProfiles = rows[0].data.profiles;
      // Merge com PROFILES hardcoded — novos do banco que não existem no código
      dbProfiles.forEach(p => {
        if (!state.profiles.find(x=>x.id===p.id)) {
          state.profiles.push(p);
        } else {
          // Atualiza nome/email se mudou
          const existing = state.profiles.find(x=>x.id===p.id);
          existing.name  = p.name;
          existing.email = p.email||'';
        }
        // Sync PROFILES global (usado na tela de login)
        if (!PROFILES.find(x=>x.id===p.id)) {
          PROFILES.push({id:p.id, name:p.name, email:p.email||''});
        } else {
          const pp = PROFILES.find(x=>x.id===p.id);
          pp.name  = p.name;
          pp.email = p.email||'';
        }
      });
    }
  } catch(e) {
    console.warn('init: erro ao carregar profiles', e.message);
  }
  render();
}
